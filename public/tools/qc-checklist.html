<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>QC Checklist / ITP / NCR</title>
<!--
  Civil Construction Engineering Suite — Modul "QC Checklist, ITP & NCR".
  Membaca daftar item pekerjaan dari BOQ/RAB (localStorage key:
  civilhub_boq_result), membuat checklist QC per item berdasarkan jenis
  pekerjaan (galian/urugan/beton/bekisting/besi), mencatat status
  ITP (Hold/Witness Point), NCR (Non-Conformance Report), dan punch list.
  Hasil disimpan ke localStorage (civilhub_qc_result) untuk dipakai pada
  modul Project Dashboard.
-->
<style>
  .qc-root{
    --c-bg:#F5F7FA; --c-card:#FFFFFF; --c-border:#E3E7EE; --c-border-soft:#EDF0F5;
    --c-text:#101828; --c-muted:#667085; --c-faint:#98A2B3;
    --c-blue:#2563EB; --c-blue-light:#EFF6FF;
    --c-green:#0F9D58; --c-green-light:#E9F9F0;
    --c-amber:#B54708; --c-amber-light:#FFF6E5;
    --c-red:#B42318; --c-red-light:#FEF3F2;
    --c-radius-lg:20px; --c-radius-md:14px;
    --c-shadow-sm:0 1px 2px rgba(16,24,40,.04);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:var(--c-bg); color:var(--c-text); min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .qc-root *{box-sizing:border-box;}
  .qc-shell{max-width:1040px;margin:0 auto;padding:14px 14px 64px;}
  .qc-breadcrumb{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12.5px;color:var(--c-muted);margin-bottom:10px;}
  .qc-breadcrumb b{color:var(--c-text);font-weight:600;}
  .qc-breadcrumb .sep{color:var(--c-faint);}
  .qc-title h1{font-size:21px;font-weight:700;margin:0 0 4px;letter-spacing:-0.01em;}
  .qc-title p{margin:0 0 16px;color:var(--c-muted);font-size:13px;}
  .qc-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .qc-tab{border:1px solid var(--c-border);background:var(--c-card);border-radius:999px;padding:7px 14px;font-size:12.5px;font-weight:600;color:var(--c-muted);cursor:pointer;}
  .qc-tab.active{background:var(--c-blue);color:#fff;border-color:var(--c-blue);}
  .qc-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--c-radius-lg);padding:16px;margin-bottom:12px;box-shadow:var(--c-shadow-sm);}
  .qc-card h2{font-size:15px;font-weight:700;margin:0 0 10px;}
  .qc-card h3{font-size:13.5px;font-weight:700;margin:0 0 6px;}
  .qc-hidden{display:none;}
  .qc-note{font-size:12.5px;border-radius:12px;padding:9px 11px;margin:6px 0;background:var(--c-blue-light);color:#1D4ED8;}
  .qc-btn{border:1px solid var(--c-border);background:#fff;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;color:var(--c-text);}
  .qc-btn.primary{background:var(--c-blue);border-color:var(--c-blue);color:#fff;}
  .qc-btn.sm{padding:5px 10px;font-size:12px;}
  .qc-btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
  .qc-item{border:1px solid var(--c-border-soft);border-radius:14px;padding:12px;margin-bottom:10px;}
  .qc-item-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
  .qc-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;border-radius:999px;padding:3px 10px;}
  .qc-pill.pass{background:var(--c-green-light);color:var(--c-green);}
  .qc-pill.fail{background:var(--c-red-light);color:var(--c-red);}
  .qc-pill.pending{background:var(--c-amber-light);color:var(--c-amber);}
  .qc-check-row{display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 0;border-bottom:1px solid var(--c-border-soft);}
  .qc-check-row input[type=checkbox]{width:16px;height:16px;flex-shrink:0;}
  .qc-check-row select{margin-left:auto;border:1px solid var(--c-border);border-radius:8px;padding:3px 6px;font-size:12px;}
  .qc-photo-row{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;}
  .qc-photo-thumb{width:64px;height:64px;border-radius:10px;object-fit:cover;border:1px solid var(--c-border);}
  table.qc-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.qc-table th,table.qc-table td{border-bottom:1px solid var(--c-border-soft);padding:7px 8px;text-align:left;vertical-align:top;}
  table.qc-table th{color:var(--c-muted);font-weight:600;font-size:11.5px;text-transform:uppercase;}
  table.qc-table input,table.qc-table select,table.qc-table textarea{width:100%;border:1px solid var(--c-border);border-radius:8px;padding:5px 7px;font-size:12.5px;}
  .qc-sig-box{border:1px dashed var(--c-border);border-radius:12px;padding:10px;margin-top:8px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .qc-sig-box input{border:1px solid var(--c-border);border-radius:8px;padding:6px 9px;font-size:12.5px;}
  .qc-pre{white-space:pre-wrap;font-family:ui-monospace,Consolas,monospace;font-size:12px;background:#0B1220;color:#D7E2F2;border-radius:12px;padding:14px;max-height:420px;overflow:auto;}
  .qc-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#101828;color:#fff;padding:9px 16px;border-radius:10px;font-size:12.5px;z-index:50;}
  .qc-disclaimer{font-size:11.5px;color:var(--c-faint);border-top:1px dashed var(--c-border);padding-top:10px;margin-top:10px;line-height:1.5;}
  .qc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;}
  .qc-kpi{border:1px solid var(--c-border-soft);border-radius:14px;padding:10px 12px;background:#FAFBFC;}
  .qc-kpi small{display:block;color:var(--c-muted);font-size:11px;}
  .qc-kpi b{font-size:16px;}
</style>
</head>
<body>
<div class="qc-root">
  <div class="qc-shell">
    <div class="qc-breadcrumb"><span>Home</span><span class="sep">/</span><span>Tools</span><span class="sep">/</span><span>Civil</span><span class="sep">/</span><b>QC Checklist / ITP / NCR</b></div>
    <div class="qc-title">
      <h1>QC Checklist, ITP &amp; NCR</h1>
      <p>Checklist mutu per item pekerjaan, status ITP, log NCR, dan punch list — terhubung dengan item BOQ/RAB.</p>
    </div>

    <div class="qc-tabs">
      <button class="qc-tab active" data-tab="checklist">Checklist &amp; ITP</button>
      <button class="qc-tab" data-tab="ncr">NCR</button>
      <button class="qc-tab" data-tab="punch">Punch List</button>
      <button class="qc-tab" data-tab="report">Report</button>
    </div>

    <!-- ===================== TAB: CHECKLIST ===================== -->
    <section id="qc-view-checklist">
      <div class="qc-card">
        <h2>Ringkasan QC</h2>
        <div class="qc-grid" id="qcSummaryKpi"></div>
      </div>
      <div id="qcSourceNote"></div>
      <div id="qcChecklistBox"></div>
      <div class="qc-btn-row">
        <button class="qc-btn" id="qcReloadSource">Muat Ulang Item dari BOQ/RAB</button>
      </div>
    </section>

    <!-- ===================== TAB: NCR ===================== -->
    <section id="qc-view-ncr" class="qc-hidden">
      <div class="qc-card">
        <h2>Non-Conformance Report (NCR)</h2>
        <div style="overflow-x:auto;">
          <table class="qc-table" id="qcNcrTable"></table>
        </div>
        <div class="qc-btn-row">
          <button class="qc-btn" id="qcAddNcr">+ Tambah NCR</button>
        </div>
      </div>
    </section>

    <!-- ===================== TAB: PUNCH LIST ===================== -->
    <section id="qc-view-punch" class="qc-hidden">
      <div class="qc-card">
        <h2>Punch List</h2>
        <div style="overflow-x:auto;">
          <table class="qc-table" id="qcPunchTable"></table>
        </div>
        <div class="qc-btn-row">
          <button class="qc-btn" id="qcAddPunch">+ Tambah Punch Item</button>
        </div>
      </div>
    </section>

    <!-- ===================== TAB: REPORT ===================== -->
    <section id="qc-view-report" class="qc-hidden">
      <div class="qc-card">
        <div class="qc-btn-row">
          <button class="qc-btn primary" id="qcGenReport">Generate Report</button>
          <button class="qc-btn" id="qcCopyReport">Copy</button>
          <button class="qc-btn" id="qcDownloadTxt">Export TXT</button>
          <button class="qc-btn" id="qcDownloadJson">Export JSON</button>
          <button class="qc-btn primary" id="qcToDashboard">Kirim ke Dashboard</button>
        </div>
        <div class="qc-pre" id="qcReportBox">Klik "Generate Report" untuk membuat ringkasan QC.</div>
      </div>
    </section>

  </div>
</div>

<script>
(function(){
  var $ = function(id){ return document.getElementById(id); };
  function toast(msg){
    var t=document.createElement('div'); t.className='qc-toast'; t.textContent=msg;
    document.body.appendChild(t); setTimeout(function(){ t.remove(); },1800);
  }
  function downloadFile(name, content, mime){
    var blob=new Blob([content],{type:mime}); var url=URL.createObjectURL(blob);
    var a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },200);
  }
  function uid(){ return 'q'+Math.random().toString(36).slice(2,9); }
  function nowStr(){ return new Date().toLocaleString('id-ID'); }

  /* =========================== TEMPLATE CHECKLIST PER JENIS PEKERJAAN =========================== */
  var QC_TEMPLATES = {
    galian: ['Elevasi dasar galian sesuai gambar', 'Tidak ada genangan air pada dasar galian', 'Dimensi galian sesuai rencana', 'Tidak ada longsoran/keruntuhan tebing galian'],
    urugan: ['Material urugan sesuai spesifikasi (bebas organik)', 'Pemadatan per layer sesuai tebal hampar rencana', 'Hasil sand cone/test kepadatan mencapai target', 'Elevasi akhir urugan sesuai rencana'],
    beton: ['Bekisting bersih & rapat sebelum cor', 'Pembesian sesuai gambar (jumlah, jarak, selimut)', 'Slump test memenuhi spesifikasi', 'Curing beton dilakukan minimum 7 hari', 'Tidak ada keropos/honeycomb pada permukaan beton'],
    bekisting: ['Bekisting kokoh & tidak bocor', 'Vertikalitas/kelurusan bekisting sesuai toleransi', 'Release agent/minyak bekisting diaplikasikan', 'Bracing/support cukup menahan tekanan beton'],
    besi: ['Diameter & jumlah tulangan sesuai gambar', 'Jarak tulangan sesuai gambar', 'Selimut beton sesuai spesifikasi (cover block terpasang)', 'Sambungan/overlap tulangan sesuai panjang penyaluran', 'Tulangan bebas karat berlebih/kotoran'],
    default: ['Pekerjaan sesuai gambar kerja/spesifikasi', 'Material sesuai approval material', 'Dimensi sesuai rencana', 'Dokumentasi foto before/after lengkap']
  };
  function matchTemplate(uraian){
    var u = (uraian||'').toLowerCase();
    if(/galian/.test(u)) return {key:'galian', points:QC_TEMPLATES.galian};
    if(/urugan|timbunan/.test(u)) return {key:'urugan', points:QC_TEMPLATES.urugan};
    if(/beton/.test(u)) return {key:'beton', points:QC_TEMPLATES.beton};
    if(/bekisting/.test(u)) return {key:'bekisting', points:QC_TEMPLATES.bekisting};
    if(/besi|pembesian|tulangan/.test(u)) return {key:'besi', points:QC_TEMPLATES.besi};
    return {key:'default', points:QC_TEMPLATES.default};
  }

  /* =========================== STATE =========================== */
  var state = { checklists: [], ncr: [], punch: [] };

  function loadSourceData(){
    var d = null;
    try{ var raw = localStorage.getItem('civilhub_boq_result'); if(raw) d = JSON.parse(raw); }catch(e){}
    return d;
  }

  function checklistsFromSource(src){
    if(!src || !src.items) return [];
    return src.items.map(function(it){
      var tpl = matchTemplate(it.uraian);
      return {
        id: uid(), uraian: it.uraian, satuan: it.satuan, volume: it.volume, templateKey: tpl.key,
        points: tpl.points.map(function(p){ return {text:p, checked:false, result:'pending'}; }),
        photoBefore: null, photoAfter: null,
        itp: 'witness', // 'hold' | 'witness' | 'surveillance'
        signature: {name:'', role:'', date:''}
      };
    });
  }

  /* =========================== PHOTO COMPRESSION =========================== */
  function compressImage(file, cb){
    var reader = new FileReader();
    reader.onload = function(e){
      var img = new Image();
      img.onload = function(){
        var maxW = 240;
        var scale = Math.min(1, maxW/img.width);
        var canvas = document.createElement('canvas');
        canvas.width = img.width*scale; canvas.height = img.height*scale;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        cb(canvas.toDataURL('image/jpeg', 0.6));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  /* =========================== RENDER: CHECKLIST =========================== */
  function statusOf(item){
    var total = item.points.length;
    var checked = item.points.filter(function(p){ return p.checked; }).length;
    var anyFail = item.points.some(function(p){ return p.result==='fail'; });
    if(anyFail) return 'fail';
    if(checked===total && total>0) return 'pass';
    return 'pending';
  }

  function renderSummary(){
    var total = state.checklists.length;
    var pass = state.checklists.filter(function(c){ return statusOf(c)==='pass'; }).length;
    var fail = state.checklists.filter(function(c){ return statusOf(c)==='fail'; }).length;
    var pending = total-pass-fail;
    var openNcr = state.ncr.filter(function(n){ return n.status==='open'; }).length;
    var openPunch = state.punch.filter(function(p){ return p.status==='open'; }).length;
    $('qcSummaryKpi').innerHTML =
      '<div class="qc-kpi"><small>Total Item</small><b>'+total+'</b></div>'+
      '<div class="qc-kpi"><small>PASS</small><b style="color:var(--c-green);">'+pass+'</b></div>'+
      '<div class="qc-kpi"><small>FAIL</small><b style="color:var(--c-red);">'+fail+'</b></div>'+
      '<div class="qc-kpi"><small>Pending</small><b style="color:var(--c-amber);">'+pending+'</b></div>'+
      '<div class="qc-kpi"><small>NCR Open</small><b>'+openNcr+'</b></div>'+
      '<div class="qc-kpi"><small>Punch Open</small><b>'+openPunch+'</b></div>';
  }

  function renderChecklistTab(){
    var src = loadSourceData();
    $('qcSourceNote').innerHTML = src
      ? ''
      : '<div class="qc-note">Belum ada item dari BOQ/RAB. Buka modul tersebut, lalu klik "Kirim ke Schedule/Kurva S" (data item yang sama dipakai di sini), atau gunakan tombol "Muat Ulang Item dari BOQ/RAB".</div>';

    renderSummary();

    $('qcChecklistBox').innerHTML = state.checklists.map(function(item){
      var st = statusOf(item);
      var pillClass = st==='pass'?'pass':(st==='fail'?'fail':'pending');
      var pillLabel = st==='pass'?'PASS':(st==='fail'?'FAIL':'PENDING');
      return '<div class="qc-item" data-id="'+item.id+'">'+
        '<div class="qc-item-head">'+
          '<div><h3>'+item.uraian+'</h3><small style="color:var(--c-muted);">'+item.satuan+' · '+(item.volume||0)+' · Template: '+item.templateKey+'</small></div>'+
          '<div style="display:flex;gap:6px;align-items:center;">'+
            '<select class="qc-f-itp"><option value="hold"'+(item.itp==='hold'?' selected':'')+'>Hold Point</option><option value="witness"'+(item.itp==='witness'?' selected':'')+'>Witness Point</option><option value="surveillance"'+(item.itp==='surveillance'?' selected':'')+'>Surveillance</option></select>'+
            '<span class="qc-pill '+pillClass+'">'+pillLabel+'</span>'+
          '</div>'+
        '</div>'+
        item.points.map(function(p, idx){
          return '<div class="qc-check-row" data-idx="'+idx+'">'+
            '<input type="checkbox" class="qc-f-check"'+(p.checked?' checked':'')+'>'+
            '<span>'+p.text+'</span>'+
            '<select class="qc-f-result"><option value="pending"'+(p.result==='pending'?' selected':'')+'>Pending</option><option value="pass"'+(p.result==='pass'?' selected':'')+'>OK</option><option value="fail"'+(p.result==='fail'?' selected':'')+'>FAIL</option></select>'+
          '</div>';
        }).join('')+
        '<div class="qc-photo-row">'+
          '<label class="qc-btn sm">Foto Before<input type="file" accept="image/*" class="qc-f-photo-before" hidden></label>'+
          (item.photoBefore ? '<img class="qc-photo-thumb" src="'+item.photoBefore+'">' : '')+
          '<label class="qc-btn sm">Foto After<input type="file" accept="image/*" class="qc-f-photo-after" hidden></label>'+
          (item.photoAfter ? '<img class="qc-photo-thumb" src="'+item.photoAfter+'">' : '')+
        '</div>'+
        '<div class="qc-sig-box">'+
          '<input type="text" class="qc-f-sig-name" placeholder="Nama" value="'+(item.signature.name||'')+'" style="width:140px;">'+
          '<input type="text" class="qc-f-sig-role" placeholder="Jabatan" value="'+(item.signature.role||'')+'" style="width:140px;">'+
          '<button class="qc-btn sm qc-f-sign" type="button">'+(item.signature.date ? ('Ditandatangani '+item.signature.date) : 'Tanda Tangan Digital')+'</button>'+
        '</div>'+
      '</div>';
    }).join('') || '<div class="qc-note">Belum ada checklist. Muat item dari BOQ/RAB.</div>';

    bindChecklistEvents();
  }

  function bindChecklistEvents(){
    Array.prototype.forEach.call($('qcChecklistBox').querySelectorAll('.qc-item'), function(box){
      var id = box.getAttribute('data-id');
      var item = state.checklists.find(function(x){ return x.id===id; });

      box.querySelector('.qc-f-itp').addEventListener('change', function(e){ item.itp = e.target.value; });

      Array.prototype.forEach.call(box.querySelectorAll('.qc-check-row'), function(row){
        var idx = parseInt(row.getAttribute('data-idx'),10);
        row.querySelector('.qc-f-check').addEventListener('change', function(e){
          item.points[idx].checked = e.target.checked;
          renderChecklistTab();
        });
        row.querySelector('.qc-f-result').addEventListener('change', function(e){
          item.points[idx].result = e.target.value;
          renderChecklistTab();
        });
      });

      var beforeInput = box.querySelector('.qc-f-photo-before');
      beforeInput.addEventListener('change', function(e){
        var f = e.target.files && e.target.files[0];
        if(!f) return;
        compressImage(f, function(dataUrl){ item.photoBefore = dataUrl; renderChecklistTab(); });
      });
      var afterInput = box.querySelector('.qc-f-photo-after');
      afterInput.addEventListener('change', function(e){
        var f = e.target.files && e.target.files[0];
        if(!f) return;
        compressImage(f, function(dataUrl){ item.photoAfter = dataUrl; renderChecklistTab(); });
      });

      box.querySelector('.qc-f-sig-name').addEventListener('input', function(e){ item.signature.name = e.target.value; });
      box.querySelector('.qc-f-sig-role').addEventListener('input', function(e){ item.signature.role = e.target.value; });
      box.querySelector('.qc-f-sign').addEventListener('click', function(){
        if(!item.signature.name){ toast('Isi nama penandatangan terlebih dahulu.'); return; }
        item.signature.date = nowStr();
        renderChecklistTab();
        toast('Checklist ditandatangani.');
      });
    });
  }

  /* =========================== NCR =========================== */
  function renderNcrTab(){
    var rows = '<tr><th style="width:18%;">Item</th><th>Deskripsi</th><th>Root Cause</th><th>Corrective Action</th><th style="width:90px;">Status</th><th></th></tr>';
    state.ncr.forEach(function(n){
      rows += '<tr data-id="'+n.id+'">'+
        '<td><select class="qc-ncr-item">'+
          '<option value="">- pilih item -</option>'+
          state.checklists.map(function(c){ return '<option value="'+c.id+'"'+(n.item===c.id?' selected':'')+'>'+c.uraian+'</option>'; }).join('')+
        '</select></td>'+
        '<td><textarea class="qc-ncr-desc" rows="2">'+(n.desc||'')+'</textarea></td>'+
        '<td><textarea class="qc-ncr-cause" rows="2">'+(n.rootCause||'')+'</textarea></td>'+
        '<td><textarea class="qc-ncr-action" rows="2">'+(n.correctiveAction||'')+'</textarea></td>'+
        '<td><select class="qc-ncr-status"><option value="open"'+(n.status==='open'?' selected':'')+'>OPEN</option><option value="closed"'+(n.status==='closed'?' selected':'')+'>CLOSED</option></select></td>'+
        '<td><button class="qc-btn sm qc-ncr-del" type="button">Hapus</button></td>'+
      '</tr>';
    });
    $('qcNcrTable').innerHTML = rows;
    Array.prototype.forEach.call($('qcNcrTable').querySelectorAll('tr[data-id]'), function(tr){
      var id = tr.getAttribute('data-id');
      var n = state.ncr.find(function(x){ return x.id===id; });
      tr.querySelector('.qc-ncr-item').addEventListener('change', function(e){ n.item = e.target.value; });
      tr.querySelector('.qc-ncr-desc').addEventListener('input', function(e){ n.desc = e.target.value; });
      tr.querySelector('.qc-ncr-cause').addEventListener('input', function(e){ n.rootCause = e.target.value; });
      tr.querySelector('.qc-ncr-action').addEventListener('input', function(e){ n.correctiveAction = e.target.value; });
      tr.querySelector('.qc-ncr-status').addEventListener('change', function(e){ n.status = e.target.value; renderSummary(); });
      tr.querySelector('.qc-ncr-del').addEventListener('click', function(){
        state.ncr = state.ncr.filter(function(x){ return x.id!==id; });
        renderNcrTab(); renderSummary();
      });
    });
  }

  /* =========================== PUNCH LIST =========================== */
  function renderPunchTab(){
    var rows = '<tr><th style="width:18%;">Item</th><th>Deskripsi</th><th style="width:130px;">Due Date</th><th style="width:90px;">Status</th><th></th></tr>';
    state.punch.forEach(function(p){
      rows += '<tr data-id="'+p.id+'">'+
        '<td><select class="qc-punch-item">'+
          '<option value="">- pilih item -</option>'+
          state.checklists.map(function(c){ return '<option value="'+c.id+'"'+(p.item===c.id?' selected':'')+'>'+c.uraian+'</option>'; }).join('')+
        '</select></td>'+
        '<td><textarea class="qc-punch-desc" rows="2">'+(p.desc||'')+'</textarea></td>'+
        '<td><input type="date" class="qc-punch-due" value="'+(p.dueDate||'')+'"></td>'+
        '<td><select class="qc-punch-status"><option value="open"'+(p.status==='open'?' selected':'')+'>OPEN</option><option value="closed"'+(p.status==='closed'?' selected':'')+'>CLOSED</option></select></td>'+
        '<td><button class="qc-btn sm qc-punch-del" type="button">Hapus</button></td>'+
      '</tr>';
    });
    $('qcPunchTable').innerHTML = rows;
    Array.prototype.forEach.call($('qcPunchTable').querySelectorAll('tr[data-id]'), function(tr){
      var id = tr.getAttribute('data-id');
      var p = state.punch.find(function(x){ return x.id===id; });
      tr.querySelector('.qc-punch-item').addEventListener('change', function(e){ p.item = e.target.value; });
      tr.querySelector('.qc-punch-desc').addEventListener('input', function(e){ p.desc = e.target.value; });
      tr.querySelector('.qc-punch-due').addEventListener('input', function(e){ p.dueDate = e.target.value; });
      tr.querySelector('.qc-punch-status').addEventListener('change', function(e){ p.status = e.target.value; renderSummary(); });
      tr.querySelector('.qc-punch-del').addEventListener('click', function(){
        state.punch = state.punch.filter(function(x){ return x.id!==id; });
        renderPunchTab(); renderSummary();
      });
    });
  }

  /* =========================== REPORT =========================== */
  function buildReportText(){
    var lines = [];
    lines.push('LAPORAN QC CHECKLIST, ITP & NCR');
    lines.push('Civil Construction Engineering Suite');
    lines.push('======================================================');
    lines.push('');
    lines.push('1. CHECKLIST PER ITEM');
    state.checklists.forEach(function(item){
      var st = statusOf(item);
      lines.push('  '+item.uraian+' ['+st.toUpperCase()+'] — ITP: '+item.itp);
      item.points.forEach(function(p){
        lines.push('    - '+p.text+' : '+(p.checked?'sudah diperiksa':'belum diperiksa')+' ('+p.result+')');
      });
      lines.push('    Tanda tangan: '+(item.signature.date ? (item.signature.name+' / '+item.signature.role+' — '+item.signature.date) : '(belum ditandatangani)'));
      lines.push('');
    });
    lines.push('2. NCR');
    if(!state.ncr.length) lines.push('  Tidak ada NCR.');
    state.ncr.forEach(function(n){
      var it = state.checklists.find(function(c){ return c.id===n.item; });
      lines.push('  ['+n.status.toUpperCase()+'] '+(it?it.uraian:'(item tidak dipilih)')+': '+n.desc);
      lines.push('    Root cause: '+(n.rootCause||'-'));
      lines.push('    Corrective action: '+(n.correctiveAction||'-'));
    });
    lines.push('');
    lines.push('3. PUNCH LIST');
    if(!state.punch.length) lines.push('  Tidak ada punch list.');
    state.punch.forEach(function(p){
      var it = state.checklists.find(function(c){ return c.id===p.item; });
      lines.push('  ['+p.status.toUpperCase()+'] '+(it?it.uraian:'(item tidak dipilih)')+': '+p.desc+' (due: '+(p.dueDate||'-')+')');
    });
    lines.push('');
    lines.push('DISCLAIMER');
    lines.push('Checklist ini adalah alat bantu pencatatan QC lapangan. Keputusan PASS/FAIL final dan');
    lines.push('penutupan NCR/punch list tetap menjadi tanggung jawab QA/QC Engineer & pihak berwenang');
    lines.push('proyek sesuai ITP dan spesifikasi teknis kontrak.');
    return lines.join('\n');
  }

  function buildReportJson(){
    return JSON.stringify({ generatedAt:new Date().toISOString(), checklists:state.checklists, ncr:state.ncr, punch:state.punch }, null, 2);
  }

  /* =========================== TAB SWITCH =========================== */
  function showTab(key){
    ['checklist','ncr','punch','report'].forEach(function(k){
      $('qc-view-'+k).classList.toggle('qc-hidden', k!==key);
    });
    Array.prototype.forEach.call(document.querySelectorAll('.qc-tab'), function(btn){
      btn.classList.toggle('active', btn.getAttribute('data-tab')===key);
    });
    if(key==='ncr') renderNcrTab();
    if(key==='punch') renderPunchTab();
  }
  Array.prototype.forEach.call(document.querySelectorAll('.qc-tab'), function(btn){
    btn.addEventListener('click', function(){ showTab(btn.getAttribute('data-tab')); });
  });

  $('qcReloadSource').addEventListener('click', function(){
    var src = loadSourceData();
    var newChecklists = checklistsFromSource(src);
    if(!newChecklists.length){ toast('Tidak ada item dari BOQ/RAB.'); return; }
    state.checklists = newChecklists;
    renderChecklistTab();
    toast('Checklist dimuat ulang dari BOQ/RAB.');
  });

  $('qcAddNcr').addEventListener('click', function(){
    state.ncr.push({id:uid(), item:'', desc:'', rootCause:'', correctiveAction:'', status:'open'});
    renderNcrTab(); renderSummary();
  });
  $('qcAddPunch').addEventListener('click', function(){
    state.punch.push({id:uid(), item:'', desc:'', dueDate:'', status:'open'});
    renderPunchTab(); renderSummary();
  });

  $('qcGenReport').addEventListener('click', function(){ $('qcReportBox').textContent = buildReportText(); });
  $('qcCopyReport').addEventListener('click', function(){
    var txt = buildReportText();
    $('qcReportBox').textContent = txt;
    navigator.clipboard && navigator.clipboard.writeText(txt).then(function(){ toast('Disalin.'); }).catch(function(){ toast('Gagal menyalin.'); });
  });
  $('qcDownloadTxt').addEventListener('click', function(){ downloadFile('qc-checklist-report.txt', buildReportText(), 'text/plain'); });
  $('qcDownloadJson').addEventListener('click', function(){ downloadFile('qc-checklist-report.json', buildReportJson(), 'application/json'); });

  $('qcToDashboard').addEventListener('click', function(){
    var total = state.checklists.length;
    var pass = state.checklists.filter(function(c){ return statusOf(c)==='pass'; }).length;
    var fail = state.checklists.filter(function(c){ return statusOf(c)==='fail'; }).length;
    var payload = {
      savedAt: new Date().toISOString(), source:'qc-checklist',
      totalItems: total, passItems: pass, failItems: fail, pendingItems: total-pass-fail,
      openNcr: state.ncr.filter(function(n){ return n.status==='open'; }).length,
      totalNcr: state.ncr.length,
      openPunch: state.punch.filter(function(p){ return p.status==='open'; }).length,
      totalPunch: state.punch.length
    };
    try{
      localStorage.setItem('civilhub_qc_result', JSON.stringify(payload));
      toast('Ringkasan QC dikirim ke Dashboard.');
    }catch(e){ toast('Gagal menyimpan ke Dashboard.'); }
  });

  // Init
  state.checklists = checklistsFromSource(loadSourceData());
  renderChecklistTab();
})();
</script>
