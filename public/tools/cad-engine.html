/* =====================================================================
   IMPORT / EXPORT — DXF (baca/tulis), SVG, GeoJSON, PNG, PDF, SVDRAW
   ===================================================================== */

/* ---------- DXF READER (ASCII) ---------- */
function parseDXF(text) {
  // baca pasangan group-code
  const lines = text.split(/\r\n|\r|\n/);
  const pairs = [];
  for (let i = 0; i + 1 < lines.length; i += 2) {
    const code = parseInt(lines[i].trim(), 10);
    if (Number.isNaN(code)) continue;
    pairs.push([code, lines[i + 1]]);
  }
  const out = { entities: [], layers: [], blocks: {}, warnings: {}, skipped: 0 };
  let i = 0;
  const peek = () => pairs[i];
  const next = () => pairs[i++];

  function readEntity(typeName) {
    // kumpulkan group codes sampai code 0 berikutnya
    const g = { _type: typeName, _multi: {} };
    const arr = c => (g._multi[c] = g._multi[c] || []);
    while (i < pairs.length && peek()[0] !== 0) {
      const [c, vRaw] = next();
      const v = vRaw.trim();
      if ([10,20,30,11,21,31,40,41,42,50,51,70,71,72,73,90,92,93].includes(c)) arr(c).push(parseFloat(v));
      if (c === 1 || c === 3) arr(c).push(vRaw);
      g[c] = (c === 1 || c === 3 || c === 2 || c === 6 || c === 7 || c === 8) ? vRaw.trim() : parseFloat(v);
      if (c === 1 || c === 3) g[c] = vRaw; // pertahankan spasi teks
    }
    return g;
  }
  function baseProps(g) {
    return {
      layer: (g[8] || '0'),
      color: g[62] != null && !Number.isNaN(g[62]) ? (g[62] === 256 ? 'bylayer' : aciToHex(g[62])) : 'bylayer',
      lt: 'bylayer', lw: 0,
    };
  }
  function toEnt(g) {
    const bp = baseProps(g);
    const M = g._multi;
    const t = g._type;
    try {
      if (t === 'LINE') return { ...bp, type: 'line', a: [M[10][0], M[20][0]], b: [M[11][0], M[21][0]] };
      if (t === 'CIRCLE') return { ...bp, type: 'circle', c: [M[10][0], M[20][0]], r: M[40][0] };
      if (t === 'ARC') return { ...bp, type: 'arc', c: [M[10][0], M[20][0]], r: M[40][0], a1: rad(M[50][0]), a2: rad(M[51][0]), ccw: true };
      if (t === 'POINT') return { ...bp, type: 'point', p: [M[10][0], M[20][0]] };
      if (t === 'LWPOLYLINE') {
        const xs = M[10] || [], ys = M[20] || [], bs = M[42];
        const closed = ((g[70] || 0) & 1) === 1;
        let pts = xs.map((x, k) => [x, ys[k]]);
        // bulge -> tesselasi busur
        if (bs && bs.some(b => Math.abs(b) > 1e-9)) {
          // DXF: bulge index sesuai vertex; perlu pemetaan kasar (asumsi urutan sama & penuh)
          const out2 = [];
          for (let k = 0; k < pts.length; k++) {
            out2.push(pts[k]);
            const b = bs[k] || 0;
            const nx = pts[k + 1] || (closed ? pts[0] : null);
            if (nx && Math.abs(b) > 1e-9) {
              const arc = bulgeArc(pts[k], nx, b);
              if (arc) { const tp = tessArc(arc.c, arc.r, arc.a1, arc.a2, arc.ccw, 16); out2.push(...tp.slice(1, -1)); }
            }
          }
          pts = out2;
        }
        if (pts.length < 2) return null;
        return { ...bp, type: 'poly', pts, closed };
      }
      if (t === 'TEXT') return { ...bp, type: 'text', p: [M[10][0], M[20][0]], text: (M[1] && M[1][0] || '').trim(), h: M[40] ? M[40][0] : 1, rot: M[50] ? rad(M[50][0]) : 0 };
      if (t === 'MTEXT') {
        let txt = ((M[3] || []).join('') + ((M[1] && M[1][0]) || ''));
        txt = txt.replace(/\\P/g, '\n').replace(/\{\\[^;]*;/g, '').replace(/\}/g, '').replace(/\\[A-Za-z][^;\\]*;/g, '').trim();
        return { ...bp, type: 'text', p: [M[10][0], M[20][0]], text: txt, h: M[40] ? M[40][0] : 1, rot: M[50] ? rad(M[50][0]) : 0 };
      }
      if (t === 'ELLIPSE') {
        const c = [M[10][0], M[20][0]], mj = [M[11][0], M[21][0]];
        const ratio = M[40] ? M[40][0] : 1;
        const t1 = M[41] ? M[41][0] : 0, t2 = M[42] ? M[42][0] : 2 * Math.PI;
        const a = Math.hypot(mj[0], mj[1]), b2 = a * ratio, rot = Math.atan2(mj[1], mj[0]);
        const pts = [];
        const n = 48;
        let sweep = t2 - t1; if (sweep <= 0) sweep += 2 * Math.PI;
        for (let k = 0; k <= n; k++) {
          const tt = t1 + sweep * k / n;
          const x = a * Math.cos(tt), y = b2 * Math.sin(tt);
          pts.push([c[0] + x * Math.cos(rot) - y * Math.sin(rot), c[1] + x * Math.sin(rot) + y * Math.cos(rot)]);
        }
        const closed = Math.abs(sweep - 2 * Math.PI) < 1e-6;
        return { ...bp, type: 'poly', pts, closed };
      }
      if (t === 'SPLINE') {
        const fx = M[11], fy = M[21], cx2 = M[10], cy2 = M[20];
        let pts = null;
        if (fx && fx.length > 1) pts = fx.map((x, k) => [x, fy[k]]);
        else if (cx2 && cx2.length > 1) {
          pts = cx2.map((x, k) => [x, cy2[k]]);
          for (let it = 0; it < 3; it++) pts = chaikin(pts, ((g[70]||0)&1)===1);
        }
        if (!pts || pts.length < 2) return null;
        return { ...bp, type: 'poly', pts, closed: ((g[70] || 0) & 1) === 1 };
      }
      if (t === 'SOLID' || t === '3DFACE') {
        const xs = M[10] || [], ys = M[20] || [];
        const p1 = [g[10], g[20]];
        // SOLID pakai 10/20,11/21,12/22,13/23 — dikumpulkan per kode
        const px = [g[10], g[11], g[12], g[13]].filter(v => v != null && !Number.isNaN(v));
        const py = [g[20], g[21], g[22], g[23]].filter(v => v != null && !Number.isNaN(v));
        if (px.length >= 3) {
          const pts = px.map((x, k) => [x, py[k]]);
          if (pts.length === 4) { const t2 = pts[2]; pts[2] = pts[3]; pts[3] = t2; } // urutan SOLID zigzag
          return { ...bp, type: 'solid', pts };
        }
        return null;
      }
      if (t === 'HATCH') {
        const xs = M[10] || [], ys = M[20] || [];
        if (xs.length > 2) {
          const solid = (g[70] === 1);
          const pts = xs.map((x, k) => [x, ys[k]]).filter(p => isFinite(p[0]) && isFinite(p[1]));
          if (pts.length > 2) return { ...bp, type: 'hatch', pts, pattern: solid ? 'SOLID' : 'ANSI31', spacing: (g[41] || 1) };
        }
        return null;
      }
      if (t === 'INSERT') {
        return { ...bp, type: 'insert', name: g[2], p: [M[10][0], M[20][0]],
          sx: M[41] ? M[41][0] : 1, sy: M[42] ? M[42][0] : (M[41] ? M[41][0] : 1), rot: M[50] ? rad(M[50][0]) : 0 };
      }
      if (t === 'DIMENSION') {
        // render blok anonim *D jika ada; jika tidak, aproksimasi dari def points
        const bname = g[2];
        if (bname && out.blocks[bname]) return { ...bp, type: 'insert', name: bname, p: [0, 0], sx: 1, sy: 1, rot: 0 };
        if (M[13] && M[14]) return { ...bp, type: 'dim', p1: [g[13], g[23]], p2: [g[14], g[24]], off: [M[10][0], M[20][0]], text: (g[1] || '<>').trim() || '<>' };
        return null;
      }
    } catch (err) { /* entitas rusak: lewati */ }
    return null;
  }

  // pass utama
  let section = '', inBlock = null;
  while (i < pairs.length) {
    const [c, vRaw] = next();
    const v = vRaw.trim().toUpperCase();
    if (c !== 0) {
      if (c === 2 && section === '?') section = v;
      continue;
    }
    if (v === 'SECTION') { section = '?'; continue; }
    if (v === 'ENDSEC') { section = ''; inBlock = null; continue; }
    if (v === 'EOF') break;

    if (section === 'TABLES' && v === 'LAYER') {
      const g = readEntity('LAYER');
      if (g[2]) {
        const flags = g[70] || 0;
        out.layers.push({
          name: g[2], color: aciToHex(Math.abs(g[62] || 7)),
          on: (g[62] || 7) >= 0, frozen: (flags & 1) === 1, locked: (flags & 4) === 4, lt: 'continuous',
        });
      }
      continue;
    }
    if (section === 'BLOCKS') {
      if (v === 'BLOCK') {
        const g = readEntity('BLOCK');
        inBlock = { name: g[2] || ('BLK' + Math.random().toString(36).slice(2, 6)), base: [g[10] || 0, g[20] || 0], ents: [] };
        continue;
      }
      if (v === 'ENDBLK') {
        if (inBlock) { readEntity('ENDBLK'); if (!inBlock.name.startsWith('*Model') && !inBlock.name.startsWith('*Paper')) out.blocks[inBlock.name] = inBlock; }
        inBlock = null; continue;
      }
      if (inBlock) {
        const g = readEntity(v);
        const e = toEnt(g);
        if (e) inBlock.ents.push(e);
        else { out.skipped++; out.warnings[v] = (out.warnings[v] || 0) + 1; }
        continue;
      }
    }
    if (section === 'ENTITIES') {
      if (v === 'POLYLINE') {
        // POLYLINE lawas + VERTEX + SEQEND
        const g = readEntity('POLYLINE');
        const closed = ((g[70] || 0) & 1) === 1;
        const pts = [];
        while (i < pairs.length) {
          const [c2, v2] = peek();
          if (c2 === 0 && v2.trim().toUpperCase() === 'VERTEX') {
            next(); const vg = readEntity('VERTEX');
            if (vg[10] != null) pts.push([vg[10], vg[20]]);
          } else if (c2 === 0 && v2.trim().toUpperCase() === 'SEQEND') { next(); readEntity('SEQEND'); break; }
          else break;
        }
        if (pts.length > 1) out.entities.push({ ...{ layer: g[8] || '0', color: g[62] != null ? (g[62] === 256 ? 'bylayer' : aciToHex(g[62])) : 'bylayer', lt: 'bylayer', lw: 0 }, type: 'poly', pts, closed });
        continue;
      }
      const g = readEntity(v);
      const e = toEnt(g);
      if (e) out.entities.push(e);
      else if (!['SEQEND', 'VIEWPORT', 'ATTDEF', 'ATTRIB', 'XLINE', 'RAY', 'REGION', 'BODY', 'WIPEOUT', 'IMAGE', 'OLE2FRAME', 'MLINE', 'LEADER', 'MLEADER', 'ACAD_PROXY_ENTITY'].includes(v) && v) {
        out.skipped++; out.warnings[v] = (out.warnings[v] || 0) + 1;
      } else if (v) { out.skipped++; out.warnings[v] = (out.warnings[v] || 0) + 1; }
      continue;
    }
  }
  return out;
}
function chaikin(pts, closed) {
  const out = [];
  const n = pts.length;
  const cnt = closed ? n : n - 1;
  if (!closed) out.push(pts[0]);
  for (let i = 0; i < cnt; i++) {
    const a = pts[i], b = pts[(i + 1) % n];
    out.push([a[0] * 0.75 + b[0] * 0.25, a[1] * 0.75 + b[1] * 0.25]);
    out.push([a[0] * 0.25 + b[0] * 0.75, a[1] * 0.25 + b[1] * 0.75]);
  }
  if (!closed) out.push(pts[n - 1]);
  return out;
}

/* ---------- DXF WRITER (R12 — kompatibilitas maksimum) ---------- */
function writeDXF() {
  const L = [];
  const w = (c, v) => { L.push(String(c)); L.push(String(v)); };
  w(0, 'SECTION'); w(2, 'HEADER');
  w(9, '$ACADVER'); w(1, 'AC1009');
  const bb = drawingBBox() || [0, 0, 100, 100];
  w(9, '$EXTMIN'); w(10, bb[0]); w(20, bb[1]); w(30, 0);
  w(9, '$EXTMAX'); w(10, bb[2]); w(20, bb[3]); w(30, 0);
  w(0, 'ENDSEC');
  // TABLES: LAYER
  w(0, 'SECTION'); w(2, 'TABLES');
  w(0, 'TABLE'); w(2, 'LAYER'); w(70, D.layers.length);
  for (const l of D.layers) {
    w(0, 'LAYER'); w(2, l.name); w(70, (l.frozen ? 1 : 0) | (l.locked ? 4 : 0));
    w(62, (l.on ? 1 : -1) * hexToAci(l.color)); w(6, 'CONTINUOUS');
  }
  w(0, 'ENDTAB'); w(0, 'ENDSEC');
  // ENTITIES
  w(0, 'SECTION'); w(2, 'ENTITIES');
  const colorCode = e => { if (e.color && e.color !== 'bylayer') { w(62, hexToAci(e.color)); } };
  const emitPoly = (pts, closed, e) => {
    w(0, 'POLYLINE'); w(8, e.layer); colorCode(e); w(66, 1); w(70, closed ? 1 : 0);
    w(10, 0); w(20, 0); w(30, 0);
    for (const p of pts) { w(0, 'VERTEX'); w(8, e.layer); w(10, p[0]); w(20, p[1]); w(30, 0); }
    w(0, 'SEQEND'); w(8, e.layer);
  };
  const emitText = (p, text, h, rot, e) => {
    const linesT = String(text || '').split('\n');
    linesT.forEach((ln, k) => {
      w(0, 'TEXT'); w(8, e.layer); colorCode(e);
      w(10, p[0] - Math.sin(rot||0) * k * h * 1.25); w(20, p[1] - Math.cos(rot||0) * k * h * 1.25); w(30, 0);
      w(40, h); w(1, ln); w(50, deg(rot || 0));
    });
  };
  for (const e of D.entities) {
    switch (e.type) {
      case 'line': w(0, 'LINE'); w(8, e.layer); colorCode(e); w(10, e.a[0]); w(20, e.a[1]); w(30, 0); w(11, e.b[0]); w(21, e.b[1]); w(31, 0); break;
      case 'circle': w(0, 'CIRCLE'); w(8, e.layer); colorCode(e); w(10, e.c[0]); w(20, e.c[1]); w(30, 0); w(40, e.r); break;
      case 'arc': {
        let a1 = e.a1, a2 = e.a2;
        if (e.ccw === false) { const t = a1; a1 = a2; a2 = t; }
        w(0, 'ARC'); w(8, e.layer); colorCode(e); w(10, e.c[0]); w(20, e.c[1]); w(30, 0); w(40, e.r);
        w(50, ((deg(a1) % 360) + 360) % 360); w(51, ((deg(a2) % 360) + 360) % 360); break;
      }
      case 'point': w(0, 'POINT'); w(8, e.layer); colorCode(e); w(10, e.p[0]); w(20, e.p[1]); w(30, 0); break;
      case 'poly': emitPoly(e.pts, e.closed, e); break;
      case 'cloud': case 'hatch': emitPoly(e.pts, true, e); break;
      case 'solid': {
        const p = e.pts;
        w(0, 'SOLID'); w(8, e.layer); colorCode(e);
        w(10, p[0][0]); w(20, p[0][1]); w(30, 0);
        w(11, p[1][0]); w(21, p[1][1]); w(31, 0);
        w(12, p[3] ? p[3][0] : p[2][0]); w(22, p[3] ? p[3][1] : p[2][1]); w(32, 0);
        w(13, p[2][0]); w(23, p[2][1]); w(33, 0);
        break;
      }
      case 'text': emitText(e.p, e.text, e.h, e.rot, e); break;
      case 'ellipse': emitPoly(ellipsePts(e, 48), true, e); break;
      case 'dim': case 'dimang': case 'dimrad': case 'dimarc': { // ekspor sbg geometri (exploded)
        const parts = explodeEnt(e) || [];
        for (const pe of parts) {
          if (pe.type === 'line') { w(0, 'LINE'); w(8, e.layer); colorCode(e); w(10, pe.a[0]); w(20, pe.a[1]); w(30, 0); w(11, pe.b[0]); w(21, pe.b[1]); w(31, 0); }
          else if (pe.type === 'text') emitText(pe.p, pe.text, pe.h, pe.rot, e);
          else if (pe.type === 'arc') {
            let a1 = pe.a1, a2 = pe.a2;
            if (pe.ccw === false) { const t = a1; a1 = a2; a2 = t; }
            w(0, 'ARC'); w(8, e.layer); colorCode(e); w(10, pe.c[0]); w(20, pe.c[1]); w(30, 0); w(40, pe.r);
            w(50, ((deg(a1) % 360) + 360) % 360); w(51, ((deg(a2) % 360) + 360) % 360);
          }
        }
        break;
      }
      /* image & audio: tidak ada padanan R12 — dilewati saat ekspor DXF */
      case 'leader': {
        emitPoly(e.pts, false, e);
        emitText(e.pts[e.pts.length - 1], e.text, e.h || 1, 0, e);
        break;
      }
      case 'insert': { // explode insert saat ekspor R12 sederhana
        const parts = explodeEnt(e) || [];
        for (const pe of parts) {
          if (pe.type === 'line') { w(0, 'LINE'); w(8, pe.layer); w(10, pe.a[0]); w(20, pe.a[1]); w(30, 0); w(11, pe.b[0]); w(21, pe.b[1]); w(31, 0); }
          else if (pe.type === 'circle') { w(0, 'CIRCLE'); w(8, pe.layer); w(10, pe.c[0]); w(20, pe.c[1]); w(30, 0); w(40, pe.r); }
          else if (pe.type === 'poly') emitPoly(pe.pts, pe.closed, pe);
          else if (pe.type === 'text') emitText(pe.p, pe.text, pe.h, pe.rot, pe);
          else if (pe.type === 'point') { w(0, 'POINT'); w(8, pe.layer); w(10, pe.p[0]); w(20, pe.p[1]); w(30, 0); }
          else if (pe.type === 'arc') { w(0,'ARC'); w(8, pe.layer); w(10, pe.c[0]); w(20, pe.c[1]); w(30,0); w(40, pe.r); w(50, ((deg(pe.a1)%360)+360)%360); w(51, ((deg(pe.a2)%360)+360)%360); }
        }
        break;
      }
    }
  }
  w(0, 'ENDSEC'); w(0, 'EOF');
  return L.join('\r\n');
}

/* ---------- SVG EXPORT ---------- */
function writeSVG() {
  const bb = drawingBBox() || [0, 0, 100, 100];
  const pad = Math.max(bb[2] - bb[0], bb[3] - bb[1]) * 0.03 + 1e-6;
  const x1 = bb[0] - pad, y1 = bb[1] - pad, w = bb[2] - bb[0] + 2 * pad, h = bb[3] - bb[1] + 2 * pad;
  const Y = y => (y1 + h) - (y - y1);   // flip Y
  const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const sw = Math.max(w, h) / 600;
  let body = '';
  for (const e of D.entities) {
    if (!entVisible(e)) continue;
    const col = entColor(e);
    const st = `stroke="${col}" stroke-width="${sw}" fill="none" vector-effect="non-scaling-stroke"`;
    const ptsStr = pts => pts.map(p => p[0].toFixed(4) + ',' + Y(p[1]).toFixed(4)).join(' ');
    switch (e.type) {
      case 'line': body += `<line x1="${e.a[0]}" y1="${Y(e.a[1])}" x2="${e.b[0]}" y2="${Y(e.b[1])}" ${st}/>\n`; break;
      case 'poly': body += `<${e.closed?'polygon':'polyline'} points="${ptsStr(e.pts)}" ${st}/>\n`; break;
      case 'circle': body += `<circle cx="${e.c[0]}" cy="${Y(e.c[1])}" r="${e.r}" ${st}/>\n`; break;
      case 'arc': { const p = tessArc(e.c, e.r, e.a1, e.a2, e.ccw !== false, 32); body += `<polyline points="${ptsStr(p)}" ${st}/>\n`; break; }
      case 'point': body += `<circle cx="${e.p[0]}" cy="${Y(e.p[1])}" r="${sw*2}" fill="${col}"/>\n`; break;
      case 'solid': body += `<polygon points="${ptsStr(e.pts)}" fill="${col}" fill-opacity="0.8"/>\n`; break;
      case 'hatch': body += `<polygon points="${ptsStr(e.pts)}" ${st} fill="${col}" fill-opacity="0.25"/>\n`; break;
      case 'cloud': body += `<polygon points="${ptsStr(e.pts)}" ${st} stroke-dasharray="${sw*3},${sw*2}"/>\n`; break;
      case 'text': {
        const fs = e.h;
        const lines2 = String(e.text||'').split('\n');
        lines2.forEach((ln, k) => {
          body += `<text x="${e.p[0]}" y="${Y(e.p[1]) + k*fs*1.25}" font-size="${fs}" fill="${col}" font-family="Inter,Arial" transform="rotate(${-deg(e.rot||0)} ${e.p[0]} ${Y(e.p[1])})">${esc(ln)}</text>\n`;
        });
        break;
      }
      case 'ellipse': {
        const rot = Math.atan2(e.a[1], e.a[0]), rx = V.len(e.a);
        body += `<ellipse cx="${e.c[0]}" cy="${Y(e.c[1])}" rx="${rx}" ry="${rx * e.ratio}" transform="rotate(${-deg(rot)} ${e.c[0]} ${Y(e.c[1])})" ${st}/>\n`;
        break;
      }
      case 'image':
        body += `<image x="${e.p[0]}" y="${Y(e.p[1] + e.h)}" width="${e.w}" height="${e.h}" href="${e.src}" preserveAspectRatio="none"/>\n`;
        break;
      case 'dim': case 'dimang': case 'dimrad': case 'dimarc': case 'leader': case 'insert': {
        const parts = explodeEnt(e) || [];
        for (const pe of parts) {
          if (pe.type === 'line') body += `<line x1="${pe.a[0]}" y1="${Y(pe.a[1])}" x2="${pe.b[0]}" y2="${Y(pe.b[1])}" ${st}/>\n`;
          else if (pe.type === 'text') body += `<text x="${pe.p[0]}" y="${Y(pe.p[1])}" font-size="${pe.h}" fill="${col}" font-family="Inter,Arial">${esc(pe.text)}</text>\n`;
          else if (pe.type === 'circle') body += `<circle cx="${pe.c[0]}" cy="${Y(pe.c[1])}" r="${pe.r}" ${st}/>\n`;
          else if (pe.type === 'poly') body += `<${pe.closed?'polygon':'polyline'} points="${ptsStr(pe.pts)}" ${st}/>\n`;
          else if (pe.type === 'arc') { const pp = tessArc(pe.c, pe.r, pe.a1, pe.a2, pe.ccw !== false, 32); body += `<polyline points="${ptsStr(pp)}" ${st}/>\n`; }
        }
        break;
      }
    }
  }
  return `<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" viewBox="${x1} ${y1} ${w} ${h}" width="${(w*10).toFixed(0)}" height="${(h*10).toFixed(0)}">\n<rect x="${x1}" y="${y1}" width="${w}" height="${h}" fill="white"/>\n${body}</svg>`;
}

/* ---------- GeoJSON EXPORT ---------- */
function writeGeoJSON() {
  const feats = [];
  const props = e => ({ layer: e.layer, color: entColor(e), type: e.type });
  for (const e of D.entities) {
    if (!entVisible(e)) continue;
    let geom = null, extra = {};
    switch (e.type) {
      case 'line': geom = { type: 'LineString', coordinates: [e.a, e.b] }; break;
      case 'poly': geom = e.closed
        ? { type: 'Polygon', coordinates: [e.pts.concat([e.pts[0]])] }
        : { type: 'LineString', coordinates: e.pts };
        break;
      case 'circle': geom = { type: 'Polygon', coordinates: [tessArc(e.c, e.r, 0, 2*Math.PI - 1e-9, true, 36).concat([[e.c[0]+e.r, e.c[1]]])] }; extra.radius = e.r; break;
      case 'arc': geom = { type: 'LineString', coordinates: tessArc(e.c, e.r, e.a1, e.a2, e.ccw !== false, 24) }; break;
      case 'point': geom = { type: 'Point', coordinates: e.p }; break;
      case 'text': geom = { type: 'Point', coordinates: e.p }; extra.text = e.text; extra.height = e.h; break;
      case 'hatch': case 'solid': case 'cloud': geom = { type: 'Polygon', coordinates: [e.pts.concat([e.pts[0]])] }; break;
      case 'leader': geom = { type: 'LineString', coordinates: e.pts }; extra.text = e.text; break;
      case 'ellipse': { const ep = ellipsePts(e, 48); geom = { type: 'Polygon', coordinates: [ep.concat([ep[0]])] }; break; }
      case 'image': geom = { type: 'Point', coordinates: e.p }; extra.width = e.w; extra.height = e.h; break;
      case 'audio': geom = { type: 'Point', coordinates: e.p }; extra.audio = true; extra.duration = e.dur; break;
    }
    if (geom) feats.push({ type: 'Feature', geometry: geom, properties: { ...props(e), ...extra } });
  }
  const gj = { type: 'FeatureCollection', features: feats };
  if (D.crs) gj.crs = { type: 'name', properties: { name: 'urn:ogc:def:crs:EPSG::' + D.crs } };
  return JSON.stringify(gj, null, 1);
}

/* ---------- download helper ---------- */
function download(name, text, mime) {
  const blob = text instanceof Blob ? text : new Blob([text], { type: mime || 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 800);
}
function baseName() { return (D.name || 'drawing').replace(/\.(dxf|dwg|svdraw|json)$/i, ''); }

function saveSvdraw() {
  D.spaces[D.cspace] = D.entities;
  const data = JSON.stringify({ app: 'survai-cad', version: 2, saved: new Date().toISOString(),
    name: D.name, crs: D.crs, units: D.units, decimals: D.decimals, clayer: D.clayer, mscale: D.mscale,
    layers: D.layers, spaces: D.spaces, cspace: D.cspace, blocks: D.blocks });
  download(baseName() + '.svdraw', data, 'application/json');
  toast('Tersimpan: ' + baseName() + '.svdraw');
  logLine('SAVE ' + baseName() + '.svdraw (' + D.entities.length + ' entitas)', 'l-ok');
}
function exportPNG() {
  const tmp = document.createElement('canvas');
  tmp.width = cv.width; tmp.height = cv.height;
  const g = tmp.getContext('2d');
  g.fillStyle = '#0a0f18'; g.fillRect(0, 0, tmp.width, tmp.height);
  g.drawImage(cv, 0, 0);
  tmp.toBlob(b => download(baseName() + '.png', b, 'image/png'), 'image/png');
}
function printPDF() {
  const svg = writeSVG();
  const win = window.open('', '_blank');
  if (!win) { toast('Popup diblokir — izinkan popup untuk cetak'); return; }
  win.document.write('<html><head><title>' + baseName() + '</title><style>@page{margin:8mm}body{margin:0}svg{width:100%;height:auto;max-height:96vh}</style></head><body>' + svg + '<script>setTimeout(function(){window.print()},400)<\/script></body></html>');
  win.document.close();
}

/* ---------- FILE OPEN ---------- */
function openFileObj(file) {
  const nm = file.name;
  const ext = nm.split('.').pop().toLowerCase();
  const reader = new FileReader();
  if (ext === 'dwg') {
    reader.onload = () => {
      const head = new Uint8Array(reader.result.slice(0, 6));
      const sig = String.fromCharCode(...head);
      dwgNotice(nm, sig);
    };
    reader.readAsArrayBuffer(file);
    return;
  }
  reader.onload = () => {
    const text = reader.result;
    try {
      if (ext === 'svdraw' || ext === 'json') { loadSvdraw(JSON.parse(text), nm); return; }
      loadDXFText(text, nm);
    } catch (err) {
      toast('Gagal membuka file: ' + err.message, 3500);
      logLine('OPEN gagal: ' + err.message, 'l-err');
    }
  };
  reader.readAsText(file);
}
function loadSvdraw(o, nm) {
  if (!o || (!Array.isArray(o.entities) && !o.spaces)) throw new Error('Bukan file svdraw yang valid');
  pushUndo();
  D.name = o.name || nm; D.crs = o.crs || ''; D.units = o.units || 'm';
  D.decimals = o.decimals != null ? o.decimals : 3;
  D.mscale = o.mscale || 1;
  D.layers = o.layers && o.layers.length ? o.layers : D.layers;
  D.clayer = o.clayer && o.layers.some(l => l.name === o.clayer) ? o.clayer : D.layers[0].name;
  if (o.spaces) {
    D.spaces = o.spaces; D.cspace = o.cspace && o.spaces[o.cspace] ? o.cspace : 'Model';
    D.entities = D.spaces[D.cspace] = D.spaces[D.cspace] || [];
  } else {
    D.entities = o.entities;
    D.spaces = { Model: D.entities, Layout1: [], Layout2: [] };
    D.cspace = 'Model';
  }
  D.blocks = o.blocks || {};
  let mx = 0;
  for (const sp in D.spaces) for (const e of D.spaces[sp]) { const n2 = parseInt(String(e.id || '').replace(/\D/g, '')) || 0; mx = Math.max(mx, n2); }
  _uid = mx + 1;
  sel.clear(); refreshLayerUI(); syncSpaceChip(); zoomExtents();
  toast('Dibuka: ' + nm + ' (' + D.entities.length + ' entitas)');
  logLine('OPEN ' + nm + ' — ' + D.entities.length + ' entitas', 'l-ok');
}
function loadDXFText(text, nm) {
  if (text.slice(0, 2) === 'AC' || /^\x41\x43\x31\x30/.test(text)) { dwgNotice(nm, text.slice(0, 6)); return; }
  const res = parseDXF(text);
  if (!res.entities.length && !Object.keys(res.blocks).length) throw new Error('Tidak ada entitas terbaca — pastikan DXF ASCII');
  pushUndo();
  D.name = nm;
  // merge layer dari file
  for (const l of res.layers) if (!D.layers.some(x => x.name === l.name)) D.layers.push(l);
  for (const e of res.entities) ensureLayer(e.layer);
  for (const b in res.blocks) { D.blocks[b] = res.blocks[b]; for (const ce of res.blocks[b].ents) { ce.id = uid(); ensureLayer(ce.layer); } }
  // DXF selalu dimuat ke Model space
  D.spaces[D.cspace] = D.entities;
  D.cspace = 'Model';
  D.entities = D.spaces.Model = res.entities.map(e => (e.id = uid(), e));
  sel.clear(); refreshLayerUI(); syncSpaceChip(); zoomExtents();
  const wcount = res.skipped ? ' · ' + res.skipped + ' entitas dilewati (' + Object.keys(res.warnings).slice(0, 4).join(', ') + ')' : '';
  toast('DXF dibuka: ' + res.entities.length + ' entitas' + wcount, 4200);
  logLine('OPEN ' + nm + ' — ' + res.entities.length + ' entitas, ' + res.layers.length + ' layer' + wcount, 'l-ok');
}
function dwgNotice(nm, sig) {
  const ver = { AC1014: 'R14', AC1015: '2000', AC1018: '2004', AC1021: '2007', AC1024: '2010', AC1027: '2013', AC1032: '2018+' }[sig] || sig;
  openModal('File DWG Terdeteksi', null, null, `
    <h3>File DWG (${ver})</h3>
    <p><b>${nm}</b> adalah DWG biner. Parser DWG native (libredwg/Teigha) adalah roadmap Fase 2 PRD dan belum tersedia di browser secara offline.</p>
    <p>Solusi cepat: konversi ke <b>DXF ASCII</b> lalu buka di sini — hasilnya identik:</p>
    <p style="font-size:11.5px">• AutoCAD/DWG TrueView: <i>SAVEAS → DXF (ASCII)</i><br>• ODA File Converter (gratis, offline)<br>• Konverter daring (CloudConvert dsb.)</p>
    <div class="mrow"><button class="btn pri full" onclick="closeModal();document.getElementById('fileInput').click()">Pilih File DXF</button></div>
  `);
}

stage.addEventListener('dragover', ev => { ev.preventDefault(); stage.classList.add('dragover'); });
stage.addEventListener('dragleave', () => stage.classList.remove('dragover'));
stage.addEventListener('drop', ev => {

});

});

const AUTOSAVE_KEY = 'survai_cad_autosave_v1';
setInterval(() => {
  D.spaces[D.cspace] = D.entities;
  if (!Object.values(D.spaces).some(a => a.length)) return;
  try { localStorage.setItem(AUTOSAVE_KEY, JSON.stringify({ t: Date.now(), name: D.name, crs: D.crs, units: D.units, decimals: D.decimals, clayer: D.clayer, mscale: D.mscale, layers: D.layers, spaces: D.spaces, cspace: D.cspace, blocks: D.blocks })); } catch (e) {}
}, 20000);
function tryRestoreAutosave() {
  try {
    const o = JSON.parse(localStorage.getItem(AUTOSAVE_KEY) || 'null');
    const cnt = !o ? 0 : (o.spaces ? Object.values(o.spaces).reduce((s, a) => s + a.length, 0) : (o.entities || []).length);
    if (o && cnt) {
      const ago = Math.round((Date.now() - o.t) / 60000);
      confirmModal('Pulihkan Sesi', 'Ditemukan autosave "' + (o.name || 'Drawing') + '" (' + cnt + ' entitas, ' + (ago < 1 ? 'baru saja' : ago + ' menit lalu') + '). Pulihkan?', () => {
        loadSvdraw(o, o.name || 'Autosave');
      });
    }
  } catch (e) {}
}

let ribTab = 0;
function buildRibbon() {
  const tabs = document.getElementById('ribTabs');
  tabs.innerHTML = '';
  RIBBON.forEach((r, i) => {
    const b = document.createElement('button');
    b.className = 'rib-tab' + (i === ribTab ? ' on' : '');
    b.textContent = r.tab;
    b.onclick = () => { ribTab = i; buildRibbon(); };
    tabs.appendChild(b);
  });
  const body = document.getElementById('ribBody');
  body.innerHTML = '';
  RIBBON[ribTab].tools.forEach(t => {
    const b = document.createElement('button');
    b.className = 'rtool';
    b.dataset.cmd = t.cmd;
    b.innerHTML = t.ico + '<span>' + t.lbl + '</span>';
    b.onclick = () => { if (tool && tool.name === t.cmd) { endTool(); } else { endToolQuiet(); runCommand(t.cmd); } };
    body.appendChild(b);
  });
  markRibbonActive(tool ? tool.name : null);
}
function endToolQuiet() { tool = null; showMeasure(''); }
function markRibbonActive(name) {
  document.querySelectorAll('.rtool').forEach(b => b.classList.toggle('on', !!name && b.dataset.cmd === name));
}

/* ---------- layer manager ---------- */
function refreshLayerUI() {
  const box = document.getElementById('layList');
  if (!box) return;
  box.innerHTML = '';
  const eye = on => iso(on ? '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/>' : '<path d="M3 3l18 18"/><path d="M10.5 5.2A10.8 10.8 0 0 1 12 5c6.5 0 10 7 10 7a17.6 17.6 0 0 1-3.2 4M6.6 6.6C3.8 8.5 2 12 2 12s3.5 7 10 7a10 10 0 0 0 5.4-1.6"/>');
  const lock = l => iso(l ? '<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>' : '<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 7.8-1.2"/>');
  for (const l of D.layers) {
    const row = document.createElement('div');
    row.className = 'lay-row' + (l.name === D.clayer ? ' cur' : '');
    const count = D.entities.filter(e => e.layer === l.name).length;
    row.innerHTML =
      `<button class="lay-ico ${l.on ? '' : 'off'}" data-a="on" title="On/Off">${eye(l.on)}</button>` +
      `<button class="lay-ico ${l.locked ? '' : 'off'}" data-a="lock" title="Lock">${lock(l.locked)}</button>` +
      `<div class="lay-name" data-a="cur">${l.name}<small>${count} entitas${l.frozen ? ' · frozen' : ''}${l.name === D.clayer ? ' · AKTIF' : ''}</small></div>` +
      `<input type="color" class="lay-color" value="${toHex6(l.color)}" title="Warna layer">` +
      (count === 0 && D.layers.length > 1 && l.name !== '0'
        ? `<button class="lay-ico" data-a="del" title="Hapus layer">${iso('<path d="M18 6L6 18M6 6l12 12"/>')}</button>` : '');
    row.querySelector('[data-a=on]').onclick = () => { l.on = !l.on; refreshLayerUI(); redraw(); };
    row.querySelector('[data-a=lock]').onclick = () => { l.locked = !l.locked; refreshLayerUI(); };
    row.querySelector('[data-a=cur]').onclick = () => { D.clayer = l.name; refreshLayerUI(); syncLayerChip(); };
    row.querySelector('.lay-color').oninput = ev => { l.color = ev.target.value; syncLayerChip(); redraw(); };
    const del = row.querySelector('[data-a=del]');
    if (del) del.onclick = () => { D.layers = D.layers.filter(x => x !== l); if (D.clayer === l.name) D.clayer = D.layers[0].name; refreshLayerUI(); syncLayerChip(); };
    box.appendChild(row);
  }
  syncLayerChip();
}
function toHex6(c) {
  if (/^#[0-9a-f]{6}$/i.test(c)) return c;
  try { const [r, g, b] = hexRgb(c); return rgbHex(r, g, b); } catch (e) { return '#e6ecf5'; }
}
function syncLayerChip() {
  const l = layerOf(D.clayer);
  document.getElementById('stLayerName').textContent = l.name;
  document.getElementById('stLayerSw').style.background = l.color;
}
document.getElementById('btnAddLayer').onclick = () => {
  openModal('Layer Baru', [
    { k: 'name', label: 'Nama layer', type: 'text', v: 'LAYER' + D.layers.length },
    { k: 'color', label: 'Warna', type: 'color', v: '#22d3ee' },
  ], vals => {
    const nm = vals.name.trim().toUpperCase().replace(/[^A-Z0-9_\-\.]/g, '_');
    if (!nm) return;
    if (D.layers.some(l => l.name === nm)) { toast('Layer sudah ada'); return; }
    D.layers.push({ name: nm, color: vals.color, on: true, frozen: false, locked: false, lt: 'continuous' });
    D.clayer = nm;
    refreshLayerUI();
  });
};

function openProps() {
  if (!sel.size) { toast('Pilih objek dulu'); return; }
  const ids = [...sel];

  const first = ents[0];
  const same = k => ents.every(e => e[k] === first[k]);
  document.getElementById('propsTitle').textContent = 'Properti — ' + ents.length + ' objek';
  const body = document.getElementById('propsBody');
  const layerOpts = D.layers.map(l => `<option ${same('layer') && first.layer === l.name ? 'selected' : ''}>${l.name}</option>`).join('');
  const co = same('color') ? first.color : 'bylayer';
  const lt = same('lt') ? (first.lt || 'bylayer') : 'bylayer';
  let extra = '';
  if (ents.length === 1 && first.type === 'text') {
    extra = `<div class="form-row"><label>Isi Teks</label><textarea id="prText">${String(first.text||'').replace(/</g,'&lt;')}</textarea></div>
      <div class="form-row"><label>Tinggi (${D.units})</label><input type="number" id="prTextH" value="${first.h}" step="any"></div>`;
  }

    extra = `<div class="form-row"><label>Catatan Suara (${first.dur || '?'} dtk)</label>
      <audio controls src="${first.src}" style="width:100%"></audio></div>`;
  }
  if (ents.length === 1) {
    const bb = entBBox(first);
    let info = 'Tipe: ' + first.type.toUpperCase();
    if (first.type === 'line') info += ' · L = ' + fmt(V.dist(first.a, first.b));
    if (first.type === 'poly') info += ' · L = ' + fmt(polyLen(first.pts, first.closed)) + (first.closed ? ' · A = ' + fmt(Math.abs(polyArea(first.pts))) : '');
    if (first.type === 'circle') info += ' · R = ' + fmt(first.r) + ' · A = ' + fmt(Math.PI * first.r * first.r);
    if (first.type === 'arc') info += ' · R = ' + fmt(first.r);
    extra = `<p style="font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);margin-bottom:12px">${info}</p>` + extra;
  }
  body.innerHTML = extra + `
    <div class="form-row"><label>Layer</label><select id="prLayer">${layerOpts}</select></div>
    <div class="form-grid2">
      <div class="form-row"><label>Warna</label><select id="prColorMode">
        <option value="bylayer" ${co === 'bylayer' ? 'selected' : ''}>ByLayer</option>
        <option value="custom" ${co !== 'bylayer' ? 'selected' : ''}>Kustom</option></select></div>
      <div class="form-row"><label>&nbsp;</label><input type="color" id="prColor" class="lay-color" style="width:100%;height:40px" value="${co !== 'bylayer' ? toHex6(co) : '#22d3ee'}"></div>
    </div>
    <div class="form-grid2">
      <div class="form-row"><label>Linetype</label><select id="prLt">
        ${['bylayer','continuous','dashed','dotted','dashdot'].map(x => `<option ${lt === x ? 'selected' : ''}>${x}</option>`).join('')}</select></div>
      <div class="form-row"><label>Lineweight</label><select id="prLw">
        ${[0,15,25,35,50,70,100].map(x => `<option value="${x}" ${same('lw') && (first.lw||0) === x ? 'selected' : ''}>${x === 0 ? 'Default' : (x/100).toFixed(2) + ' mm'}</option>`).join('')}</select></div>
    </div>
    <button class="btn pri full" id="prApply">Terapkan</button>
    <div style="height:8px"></div>
    <button class="btn danger full" id="prDelete">Hapus Objek</button>`;
  document.getElementById('prApply').onclick = () => {
    pushUndo();
    const lay = document.getElementById('prLayer').value;
    const mode = document.getElementById('prColorMode').value;
    const col = mode === 'bylayer' ? 'bylayer' : document.getElementById('prColor').value;
    const lt2 = document.getElementById('prLt').value;
    const lw2 = parseInt(document.getElementById('prLw').value) || 0;
    for (const e of ents) { e.layer = lay; e.color = col; e.lt = lt2; e.lw = lw2; }
    const txtEl = document.getElementById('prText');
    if (txtEl && ents.length === 1) { ents[0].text = txtEl.value; ents[0].h = Math.max(1e-6, parseFloat(document.getElementById('prTextH').value) || ents[0].h); }
    closeSheets(); redraw(); toast('Properti diterapkan');
  };
  document.getElementById('prDelete').onclick = () => {
    pushUndo(); removeEnts(ids); closeSheets(); onSelChange(); redraw();
  };
  openSheet('sheetProps');
}

/* ---------- modal generik ---------- */
let _modalCb = null;
function openModal(title, fields, cb, rawHtml) {
  const box = document.getElementById('modalBox');
  if (rawHtml) { box.innerHTML = rawHtml; }
  else {
    _modalCb = cb;
    let html = '<h3>' + title + '</h3>';
    for (const f of fields) {
      html += '<div class="form-row"><label>' + f.label + '</label>';
      if (f.type === 'textarea') html += `<textarea id="mf_${f.k}">${f.v || ''}</textarea>`;
      else if (f.type === 'select') html += `<select id="mf_${f.k}">${f.opts.map(o => `<option ${o === f.v ? 'selected' : ''}>${o}</option>`).join('')}</select>`;
      else if (f.type === 'color') html += `<input type="color" id="mf_${f.k}" value="${f.v}" style="width:100%;height:42px;border:1px solid var(--line);border-radius:10px;background:var(--panel-2)">`;
      else html += `<input type="${f.type || 'text'}" id="mf_${f.k}" value="${f.v != null ? f.v : ''}" step="any">`;
      html += '</div>';
    }
    html += '<div class="mrow"><button class="btn" onclick="closeModal()">Batal</button><button class="btn pri" id="mOk">OK</button></div>';
    box.innerHTML = html;
    document.getElementById('mOk').onclick = () => {
      const vals = {};
      for (const f of fields) vals[f.k] = document.getElementById('mf_' + f.k).value;
      closeModal();
      _modalCb && _modalCb(vals);
    };
    // fokus field pertama
    setTimeout(() => { const el = document.getElementById('mf_' + fields[0].k); el && el.focus(); }, 60);
  }
  document.getElementById('modalBackdrop').classList.add('open');
}
function closeModal() { document.getElementById('modalBackdrop').classList.remove('open'); }
function confirmModal(title, msg, onYes) {
  openModal(title, null, null,
    `<h3>${title}</h3><p>${msg}</p><div class="mrow"><button class="btn" onclick="closeModal()">Batal</button><button class="btn pri" id="mYes">Ya</button></div>`);
  document.getElementById('mYes').onclick = () => { closeModal(); onYes(); };
}
document.getElementById('modalBackdrop').addEventListener('click', ev => { if (ev.target.id === 'modalBackdrop') closeModal(); });

const cmdInput = document.getElementById('cmdInput');
const cmdHist = []; let histIdx = -1;
function takeCmdInput() { const v = cmdInput.value; cmdInput.value = ''; return v; }
cmdInput.addEventListener('keydown', ev => {
  if (ev.key === 'Enter') {
    const v = takeCmdInput();
    if (v.trim()) { cmdHist.push(v); histIdx = cmdHist.length; }
    handleCmdInput(v);
  } else if (ev.key === 'Escape') {
    cmdInput.value = '';
    if (tool) { endTool(); logLine('*Batal*'); }
  } else if (ev.key === 'ArrowUp') {
    if (histIdx > 0) { histIdx--; cmdInput.value = cmdHist[histIdx] || ''; ev.preventDefault(); }
  } else if (ev.key === 'ArrowDown') {
    if (histIdx < cmdHist.length) { histIdx++; cmdInput.value = cmdHist[histIdx] || ''; ev.preventDefault(); }
  }
});

/* keyboard global */
document.addEventListener('keydown', ev => {
  if (ev.target === cmdInput || /INPUT|TEXTAREA|SELECT/.test(ev.target.tagName)) return;
  if (ev.key === 'F2') { ev.preventDefault(); document.getElementById('cmdLog').classList.toggle('show'); return; }
  if (ev.key === 'F8') { ev.preventDefault(); settings.ortho = !settings.ortho; syncToggles(); return; }
  if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === 'z') { ev.preventDefault(); ev.shiftKey ? doRedo() : doUndo(); return; }
  if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === 'y') { ev.preventDefault(); doRedo(); return; }
  if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === 's') { ev.preventDefault(); saveSvdraw(); return; }
  if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === 'o') { ev.preventDefault(); document.getElementById('fileInput').click(); return; }
  if ((ev.ctrlKey || ev.metaKey) && ev.key.toLowerCase() === 'a') { ev.preventDefault(); runCommand('SELECTALL'); return; }
  if (ev.key === 'Escape') {
    if (document.getElementById('modalBackdrop').classList.contains('open')) { closeModal(); return; }
    closeSheets();
    if (tool) { endTool(); logLine('*Batal*'); } else { sel.clear(); onSelChange(); }
    return;
  }
  if (ev.key === 'Delete' || ev.key === 'Backspace') {
    if (sel.size) { pushUndo(); removeEnts([...sel]); onSelChange(); redraw(); }
    return;
  }
  if (ev.key === 'Enter') { if (tool) { tool.onEnter ? tool.onEnter() : endTool(); } else if (lastCmd) runCommand(lastCmd); return; }
  // ketik huruf -> fokus ke command line (rasa AutoCAD)
  if (/^[a-zA-Z0-9@.,-]$/.test(ev.key) && !ev.ctrlKey && !ev.metaKey && !ev.altKey) {
    cmdInput.focus();
  }
});

/* =====================================================================
   INIT
   ===================================================================== */
window.addEventListener('resize', resize);
buildRibbon();
syncToggles();
syncLayerChip();
syncSpaceChip();
syncColorChip();
resize();
setTimeout(() => { resize(); zoomExtents(); }, 60);
logLine('CAD Engine siap. Ketik HELP untuk daftar perintah.', 'l-ok');
tryRestoreAutosave();

/* test hook (e2e) */
window.CADENG = {
  D, view, sel, settings, RESULTS,
  exec: (c, a) => runCommand(c, a),
  input: s => handleCmdInput(s),
  parseDXF, writeDXF, writeSVG, writeGeoJSON,
  addEnt, pushUndo, zoomExtents, redraw,
  switchSpace, setVstyle, recognizeStroke, trimEntity, entIntersections, dividePts,
  getTool: () => tool,
  clickAt: (wx, wy) => { cursorRaw = [wx, wy]; cursorW = applyConstraints([wx, wy]); if (tool && tool.onPoint) { tool.onPoint([wx, wy]); redraw(); } },
  stroke: (pts) => { if (tool && tool.onStroke) tool.onStroke(pts); },
};

</script>
