<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0d1420">
<title>CAD Engine — DWG/DXF Viewer · Draw · Edit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============ DESIGN TOKENS — CAD dark canvas + instrument chrome ============ */
:root{
  --bg:#0d1420; --panel:#141c2b; --panel-2:#1a2436; --line:#243044; --line-2:#31405a;
  --ink:#e6ecf5; --ink-dim:#93a1b8; --ink-faint:#5f6f8a;
  --accent:#3b82f6; --accent-ink:#2563eb; --accent-soft:rgba(59,130,246,.16);
  --good:#22c55e; --warn:#f59e0b; --bad:#ef4444; --cyan:#22d3ee;
  --r:9px; --r2:13px;
  --mono:'JetBrains Mono',ui-monospace,Consolas,monospace;
  --sans:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --shadow:0 8px 28px rgba(0,0,0,.45),0 2px 8px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px;-webkit-font-smoothing:antialiased;overscroll-behavior:none;touch-action:none}
button,input,select,textarea{font-family:inherit;color:inherit}
button{cursor:pointer;border:0;background:none}

.app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* ---------- TOPBAR ---------- */
.topbar{flex:0 0 auto;height:50px;display:flex;align-items:center;gap:8px;padding:0 10px;
  background:var(--panel);border-bottom:1px solid var(--line);z-index:60}
.brand{display:flex;align-items:center;gap:8px;min-width:0}
.brand-mark{width:30px;height:30px;flex:none;border-radius:8px;background:linear-gradient(135deg,#2563eb,#0e9aa7);
  display:grid;place-items:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.22)}
.brand-mark svg{width:18px;height:18px;color:#fff}
.brand-txt{line-height:1.05;min-width:0}
.brand-txt b{font-size:13.5px;font-weight:800;letter-spacing:-.01em;display:block;white-space:nowrap}
.brand-txt span{font-size:9px;color:var(--ink-faint);font-family:var(--mono);letter-spacing:.05em;white-space:nowrap}
.topbar .sp{flex:1}
.tb-btn{height:36px;min-width:36px;padding:0 9px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;gap:6px;
  background:var(--panel-2);border:1px solid var(--line);color:var(--ink-dim);font-size:11.5px;font-weight:600;white-space:nowrap}
.tb-btn:active{transform:scale(.95)}
.tb-btn.on{background:var(--accent-soft);border-color:var(--accent);color:#cfe3ff}
.tb-btn svg{width:17px;height:17px;flex:none}
.tb-btn:disabled{opacity:.35;pointer-events:none}
@media(max-width:640px){ .tb-btn .lbl{display:none} .brand-txt span{display:none} }
@media(max-width:470px){ .brand-txt{display:none} }

/* ---------- RIBBON ---------- */
.ribbon{flex:0 0 auto;background:var(--panel);border-bottom:1px solid var(--line);z-index:55}
.rib-tabs{display:flex;gap:2px;padding:6px 10px 0;overflow-x:auto;scrollbar-width:none}
.rib-tabs::-webkit-scrollbar{display:none}
.rib-tab{flex:none;white-space:nowrap}
.rib-tab{padding:7px 13px;border-radius:8px 8px 0 0;font-size:11.5px;font-weight:700;color:var(--ink-faint);letter-spacing:.02em}
.rib-tab.on{background:var(--panel-2);color:var(--ink);box-shadow:inset 0 1px 0 var(--line-2)}
.rib-body{background:var(--panel-2);padding:8px 10px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}
.rib-body::-webkit-scrollbar{display:none}
.rtool{flex:none;width:62px;padding:7px 2px 6px;border-radius:10px;display:flex;flex-direction:column;align-items:center;gap:4px;
  color:var(--ink-dim);border:1px solid transparent}
.rtool svg{width:21px;height:21px}
.rtool span{font-size:9.5px;font-weight:600;line-height:1.1;text-align:center;white-space:nowrap}
.rtool:active{transform:scale(.94)}
.rtool.on{background:var(--accent-soft);border-color:var(--accent);color:#cfe3ff}
.rib-sep{flex:none;width:1px;background:var(--line);margin:4px 2px}

/* ---------- CANVAS ---------- */
.stage{flex:1;position:relative;min-height:0;background:#0a0f18}
#cv{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:crosshair}
.hud-measure{position:absolute;left:50%;top:12px;transform:translateX(-50%);background:rgba(13,20,32,.92);
  border:1px solid var(--line-2);border-radius:11px;padding:8px 14px;font-family:var(--mono);font-size:12px;color:var(--cyan);
  display:none;max-width:92%;text-align:center;pointer-events:none;z-index:20;box-shadow:var(--shadow)}
.hud-measure.show{display:block}
.hud-hint{position:absolute;left:10px;top:10px;background:rgba(13,20,32,.85);border:1px solid var(--line);
  border-radius:9px;padding:6px 10px;font-size:11px;color:var(--ink-dim);pointer-events:none;z-index:20;max-width:70%}
.drop-hint{position:absolute;inset:14px;border:2px dashed var(--accent);border-radius:16px;display:none;
  align-items:center;justify-content:center;background:rgba(37,99,235,.12);z-index:40;pointer-events:none;
  font-weight:700;color:#cfe3ff;font-size:15px}
.stage.dragover .drop-hint{display:flex}

/* ---------- COMMAND LINE ---------- */
.cmdwrap{flex:0 0 auto;background:var(--panel);border-top:1px solid var(--line);z-index:60}
.cmdlog{max-height:130px;overflow-y:auto;padding:6px 12px;font-family:var(--mono);font-size:11px;color:var(--ink-dim);
  border-bottom:1px solid var(--line);display:none;background:#0f1624}
.cmdlog.show{display:block}
.cmdlog .l-cmd{color:var(--cyan)}
.cmdlog .l-err{color:var(--bad)}
.cmdlog .l-ok{color:var(--good)}
.cmdrow{display:flex;align-items:center;gap:8px;padding:7px 10px}
.cmd-prompt{flex:none;font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:600;max-width:46%;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmd-input{flex:1;min-width:60px;height:36px;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;
  padding:0 11px;font-family:var(--mono);font-size:12.5px;outline:none}
.cmd-input:focus{border-color:var(--accent)}
.cmd-btn{width:36px;height:36px;flex:none;border-radius:9px;background:var(--panel-2);border:1px solid var(--line);
  display:grid;place-items:center;color:var(--ink-dim)}
.cmd-btn.on{background:var(--accent-soft);border-color:var(--accent);color:#cfe3ff}
.cmd-btn svg{width:17px;height:17px}

/* ---------- STATUSBAR ---------- */
.statusbar{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:5px 10px calc(5px + env(safe-area-inset-bottom,0px));
  background:#0f1624;border-top:1px solid var(--line);font-family:var(--mono);font-size:10px;color:var(--ink-faint);overflow-x:auto;scrollbar-width:none}
.statusbar::-webkit-scrollbar{display:none}
.st-toggle{flex:none;padding:4px 8px;border-radius:7px;border:1px solid var(--line);color:var(--ink-faint);
  font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.04em}
.st-toggle.on{background:var(--accent-soft);border-color:var(--accent);color:#cfe3ff}
.st-coord{flex:none;margin-left:auto;color:var(--cyan);white-space:nowrap}
.st-layer{flex:none;display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:7px;border:1px solid var(--line);white-space:nowrap}
.st-layer i{width:9px;height:9px;border-radius:3px;display:inline-block}

/* ---------- SHEETS (layer / props / export / help) ---------- */
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:190;display:none}
.sheet-backdrop.open{display:block}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:200;background:var(--panel);border-radius:18px 18px 0 0;
  border-top:1px solid var(--line-2);max-height:78dvh;display:none;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:var(--shadow)}
.sheet.open{display:flex}
@media(min-width:760px){
  .sheet{left:auto;right:12px;bottom:12px;width:400px;border-radius:16px;border:1px solid var(--line-2)}
}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--line)}
.sheet-head h2{font-size:14.5px;font-weight:800}
.sheet-x{width:32px;height:32px;border-radius:9px;background:var(--panel-2);display:grid;place-items:center;color:var(--ink-dim);font-size:17px}
.sheet-body{flex:1;overflow-y:auto;padding:12px 16px 18px}
.sheet-body::-webkit-scrollbar{width:8px}
.sheet-body::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px}

/* layer rows */
.lay-row{display:flex;align-items:center;gap:8px;padding:8px 9px;border:1px solid var(--line);border-radius:11px;margin-bottom:7px;background:var(--panel-2)}
.lay-row.cur{border-color:var(--accent);background:var(--accent-soft)}
.lay-ico{width:30px;height:30px;flex:none;border-radius:8px;display:grid;place-items:center;color:var(--ink-dim);border:1px solid transparent}
.lay-ico:active{transform:scale(.9)}
.lay-ico.off{color:var(--ink-faint);opacity:.45}
.lay-name{flex:1;min-width:0;font-size:12.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lay-name small{display:block;font-size:9.5px;color:var(--ink-faint);font-family:var(--mono);font-weight:500}
.lay-color{width:26px;height:26px;flex:none;border-radius:7px;border:1px solid var(--line-2);padding:0;background:none;overflow:hidden}
.lay-color::-webkit-color-swatch-wrapper{padding:2px}
.lay-color::-webkit-color-swatch{border:0;border-radius:5px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:40px;padding:9px 14px;border-radius:11px;
  background:var(--panel-2);border:1px solid var(--line);font-size:12px;font-weight:700;color:var(--ink)}
.btn:active{transform:scale(.97)}
.btn.pri{background:var(--accent-ink);border-color:var(--accent-ink);color:#fff}
.btn.full{width:100%}
.btn.danger{color:#fca5a5;border-color:#7f1d1d}
.form-row{margin-bottom:11px}
.form-row label{display:block;font-size:10.5px;font-weight:700;color:var(--ink-dim);letter-spacing:.04em;text-transform:uppercase;margin-bottom:5px}
.form-row input[type=text],.form-row input[type=number],.form-row select,.form-row textarea{
  width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;min-height:40px;padding:8px 11px;font-size:13px;outline:none}
.form-row textarea{min-height:70px;resize:vertical;font-family:var(--mono)}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--accent)}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.exp-item{display:flex;align-items:center;gap:11px;width:100%;padding:11px;border:1px solid var(--line);border-radius:12px;
  background:var(--panel-2);margin-bottom:8px;text-align:left}
.exp-item:active{transform:scale(.98)}
.exp-item .ei{width:38px;height:38px;flex:none;border-radius:10px;background:var(--accent-soft);display:grid;place-items:center;color:#9ec5ff}
.exp-item .ei svg{width:19px;height:19px}
.exp-item b{font-size:12.5px;display:block}
.exp-item small{font-size:10.5px;color:var(--ink-faint)}
.help-table{width:100%;border-collapse:collapse;font-size:11.5px}
.help-table td{padding:5px 6px;border-bottom:1px solid var(--line);vertical-align:top}
.help-table td:first-child{font-family:var(--mono);color:var(--cyan);white-space:nowrap;font-size:11px}
.help-sec{font-size:10.5px;font-weight:800;color:var(--ink-dim);letter-spacing:.07em;text-transform:uppercase;margin:14px 0 6px}

/* modal (center) */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.modal-backdrop.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--line-2);border-radius:16px;width:100%;max-width:380px;max-height:84dvh;
  overflow-y:auto;padding:18px;box-shadow:var(--shadow)}
.modal h3{font-size:15px;font-weight:800;margin-bottom:6px}
.modal p{font-size:12px;color:var(--ink-dim);line-height:1.55;margin-bottom:12px}
.modal .mrow{display:flex;gap:9px;margin-top:14px}
.modal .mrow .btn{flex:1}

.toast{position:fixed;left:50%;bottom:120px;transform:translateX(-50%) translateY(20px);background:#0f1624;border:1px solid var(--line-2);
  color:var(--ink);padding:10px 16px;border-radius:12px;font-size:12px;font-weight:600;z-index:400;opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;box-shadow:var(--shadow);max-width:88%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21V7l6-4v14"/><path d="M9 17l6-4V3l6 4v14l-6-4"/><path d="M9 17l-6 4M15 13l6 8"/></svg></div>
      <div class="brand-txt"><b>CAD Engine</b><span>DWG/DXF · DRAW · EDIT · v1</span></div>
    </div>
    <div class="sp"></div>
    <button class="tb-btn" id="btnOpen" title="Buka file (DWG/DXF/SVDRAW)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1h-8L9 4H4a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1z"/></svg>
      <span class="lbl">Buka</span>
    </button>
    <button class="tb-btn" id="btnSave" title="Simpan (.svdraw)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
      <span class="lbl">Simpan</span>
    </button>
    <button class="tb-btn" id="btnExport" title="Ekspor DXF / SVG / GeoJSON / PDF / PNG">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3M7 8l5-5 5 5"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
      <span class="lbl">Ekspor</span>
    </button>
    <button class="tb-btn" id="btnUndo" title="Undo (Ctrl+Z)" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-3"/></svg>
    </button>
    <button class="tb-btn" id="btnRedo" title="Redo (Ctrl+Y)" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a5 5 0 0 0 0 10h3"/></svg>
    </button>
    <button class="tb-btn" id="btnLayers" title="Layer Manager">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/></svg>
      <span class="lbl">Layer</span>
    </button>
    <button class="tb-btn" id="btnHelp" title="Daftar perintah">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.5 2.5 0 1 1 3.7 2.2c-.8.5-1.2 1-1.2 1.8v.5"/><path d="M12 17h.01"/></svg>
    </button>
  </div>

  <!-- RIBBON -->
  <div class="ribbon">
    <div class="rib-tabs" id="ribTabs"></div>
    <div class="rib-body" id="ribBody"></div>
  </div>

  <!-- STAGE -->
  <div class="stage" id="stage">
    <canvas id="cv"></canvas>
    <div class="hud-hint" id="hudHint">Buka file DXF/DWG atau mulai menggambar — ketik perintah di bawah (mis. LINE)</div>
    <div class="hud-measure" id="hudMeasure"></div>
    <div class="drop-hint">Lepaskan file DXF / DWG / SVDRAW di sini</div>
  </div>

  <!-- COMMAND LINE -->
  <div class="cmdwrap">
    <div class="cmdlog" id="cmdLog"></div>
    <div class="cmdrow">
      <div class="cmd-prompt" id="cmdPrompt">Perintah:</div>
      <input class="cmd-input" id="cmdInput" type="text" placeholder="LINE, CIRCLE, MOVE, DIST … (F2 log)" autocomplete="off" autocapitalize="characters" spellcheck="false">
      <button class="cmd-btn" id="btnCmdLog" title="Riwayat perintah (F2)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 17l6-6-6-6"/><path d="M12 19h8"/></svg>
      </button>
      <button class="cmd-btn" id="btnEnter" title="Enter / selesai">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 10l-5 4 5 4"/><path d="M4 14h11a5 5 0 0 0 5-5V5"/></svg>
      </button>
      <button class="cmd-btn" id="btnEsc" title="Esc / batal">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>

  <!-- STATUSBAR -->
  <div class="statusbar" id="statusbar">
    <button class="st-toggle on" id="stSnap">SNAP</button>
    <button class="st-toggle on" id="stGrid">GRID</button>
    <button class="st-toggle" id="stOrtho">ORTHO</button>
    <button class="st-toggle" id="stPan">PAN</button>
    <button class="st-layer" id="stLayer"><i id="stLayerSw" style="background:#fff"></i><span id="stLayerName">0</span></button>
    <button class="st-toggle" id="stSpace" title="Model / Layout"><span id="stSpaceName">MODEL</span></button>
    <button class="st-toggle" id="stStyle" title="Visual style">2D</button>
    <button class="st-layer" id="stColor" title="Warna aktif"><i id="stColorSw" style="background:#e6ecf5"></i><span>WARNA</span></button>
    <span class="st-coord" id="stCoord">0.000, 0.000</span>
  </div>
</div>

<!-- SHEETS -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>

<div class="sheet" id="sheetLayers">
  <div class="sheet-head"><h2>Layer Manager</h2><button class="sheet-x" data-close>×</button></div>
  <div class="sheet-body">
    <div id="layList"></div>
    <button class="btn full" id="btnAddLayer">+ Layer Baru</button>
  </div>
</div>

<div class="sheet" id="sheetProps">
  <div class="sheet-head"><h2 id="propsTitle">Properti</h2><button class="sheet-x" data-close>×</button></div>
  <div class="sheet-body" id="propsBody"></div>
</div>

<div class="sheet" id="sheetExport">
  <div class="sheet-head"><h2>Ekspor & Cetak</h2><button class="sheet-x" data-close>×</button></div>
  <div class="sheet-body" id="exportBody"></div>
</div>

<div class="sheet" id="sheetHelp">
  <div class="sheet-head"><h2>Perintah CAD</h2><button class="sheet-x" data-close>×</button></div>
  <div class="sheet-body" id="helpBody"></div>
</div>

<!-- CENTER MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modalBox"></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept=".dxf,.dwg,.svdraw,.json" style="display:none">
<input type="file" id="imgInput" accept="image/*" style="display:none">

<script>
'use strict';
/* =====================================================================
   CAD ENGINE — Survai App
   Implementasi PRD "CAD Engine Product Requirement Document":
   Core (command dispatcher, undo/redo, event) · Geometry kernel ·
   Entity model · Drawing DB · Rendering · Editing · Selection · Snapping ·
   Measurement · Layer · Annotation · Dimension · Hatch · Text ·
   Import/Export (DXF/SVG/GeoJSON/PNG/PDF) · GIS-lite (CRS tag)
   ===================================================================== */

/* ---------------- STATE ---------------- */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const stage = document.getElementById('stage');
let DPR = Math.max(1, window.devicePixelRatio || 1);
let CW = 0, CH = 0;                    // ukuran canvas dalam px CSS

// View transform: world -> screen. sx=(wx-view.x)*view.s ; sy=CH-(wy-view.y)*view.s
const view = { x: -10, y: -10, s: 30 };

// Drawing database (single source of truth)
const D = {
  name: 'Drawing1',
  crs: '',            // EPSG tag (GIS integration-lite)
  units: 'm',
  decimals: 3,
  clayer: '0',
  layers: [

/* ---------------- VIEW OPS ---------------- */
function drawingBBox() {

}

/* =====================================================================
   SNAPPING ENGINE
   ===================================================================== */
function computeSnap(rawW) {
  if (!settings.snap) return null;
  const apPx = 14, apW = apPx / view.s;
  const cand = [];
  const near = [];
  for (const e of D.entities) {
    if (!entVisible(e)) continue;
    const bb = entBBox(e);
    if (bb && (rawW[0] < bb[0]-apW*3 || rawW[0] > bb[2]+apW*3 || rawW[1] < bb[1]-apW*3 || rawW[1] > bb[3]+apW*3)) continue;
    collectSnapPts(e, rawW, apW, cand, near);
  }
  // INT: perpotongan antar segmen dekat kursor
  if (settings.snapModes.INT && near.length > 1 && near.length < 60) {
    for (let i = 0; i < near.length; i++) for (let j = i + 1; j < near.length; j++) {
      const A = near[i], B = near[j];
      if (A.kind === 'seg' && B.kind === 'seg') {
        const ip = segInt(A.a, A.b, B.a, B.b); if (ip) cand.push({ p: ip, kind: 'INT', pr: 1 });
      } else if (A.kind === 'seg' && B.kind === 'cir') {
        for (const ip of segCircleInt(A.a, A.b, B.c, B.r)) cand.push({ p: ip, kind: 'INT', pr: 1 });
      } else if (A.kind === 'cir' && B.kind === 'seg') {
        for (const ip of segCircleInt(B.a, B.b, A.c, A.r)) cand.push({ p: ip, kind: 'INT', pr: 1 });
      } else if (A.kind === 'cir' && B.kind === 'cir') {
        for (const ip of circleCircleInt(A.c, A.r, B.c, B.r)) cand.push({ p: ip, kind: 'INT', pr: 1 });
      }
    }
  }
  // GRID snap
  if (settings.snapModes.GRID && paintGrid._step) {
    const st = paintGrid._step;
    cand.push({ p: [Math.round(rawW[0]/st)*st, Math.round(rawW[1]/st)*st], kind: 'GRID', pr: 9 });
  }
  let best = null, bd = apW;
  for (const c of cand) {
    const d = V.dist(c.p, rawW) + (c.pr || 5) * apW * 0.01;
    if (d <= bd) { bd = d; best = c; }
  }
  return best;
}
function collectSnapPts(e, rawW, apW, cand, near) {
  const M = settings.snapModes;
  const push = (p, kind, pr) => { if (M[kind] && V.dist(p, rawW) < apW * 2) cand.push({ p, kind, pr: pr || 3 }); };
  switch (e.type) {
    case 'line':
      push(e.a, 'END', 1); push(e.b, 'END', 1); push(V.mid(e.a, e.b), 'MID', 2);
      if (M.NEA && distPtSeg(rawW, e.a, e.b) < apW) cand.push({ p: projPtSeg(rawW, e.a, e.b), kind: 'NEA', pr: 8 });
      if (distPtSeg(rawW, e.a, e.b) < apW * 3) near.push({ kind: 'seg', a: e.a, b: e.b });
      break;
    case 'poly': case 'cloud': case 'solid': case 'hatch': case 'leader': case 'dim': {
      const segs = entSegs(e);
      for (const s of segs) {
        push(s[0], 'END', 1); push(s[1], 'END', 1); push(V.mid(s[0], s[1]), 'MID', 2);
        if (M.NEA && distPtSeg(rawW, s[0], s[1]) < apW) cand.push({ p: projPtSeg(rawW, s[0], s[1]), kind: 'NEA', pr: 8 });
        if (distPtSeg(rawW, s[0], s[1]) < apW * 3) near.push({ kind: 'seg', a: s[0], b: s[1] });
      }
      break;
    }
    case 'circle':
      push(e.c, 'CEN', 2);
      for (const q of [0, Math.PI/2, Math.PI, 3*Math.PI/2]) push([e.c[0]+e.r*Math.cos(q), e.c[1]+e.r*Math.sin(q)], 'QUA', 3);
      if (M.NEA && Math.abs(V.dist(rawW, e.c) - e.r) < apW) {
        const a = Math.atan2(rawW[1]-e.c[1], rawW[0]-e.c[0]);
        cand.push({ p: [e.c[0]+e.r*Math.cos(a), e.c[1]+e.r*Math.sin(a)], kind: 'NEA', pr: 8 });
      }
      if (Math.abs(V.dist(rawW, e.c) - e.r) < apW * 3) near.push({ kind: 'cir', c: e.c, r: e.r });
      break;
    case 'arc': {
      push(e.c, 'CEN', 2);
      push([e.c[0]+e.r*Math.cos(e.a1), e.c[1]+e.r*Math.sin(e.a1)], 'END', 1);
      push([e.c[0]+e.r*Math.cos(e.a2), e.c[1]+e.r*Math.sin(e.a2)], 'END', 1);
      if (Math.abs(V.dist(rawW, e.c) - e.r) < apW * 3) near.push({ kind: 'cir', c: e.c, r: e.r });
      break;
    }
    case 'point': push(e.p, 'NOD', 1); break;
    case 'text': case 'insert': case 'audio': push(e.p, 'NOD', 4); break;
    case 'ellipse': {
      push(e.c, 'CEN', 2);
      const per = V.mul(V.perp(V.norm(e.a)), V.len(e.a) * e.ratio);
      for (const q of [V.add(e.c, e.a), V.sub(e.c, e.a), V.add(e.c, per), V.sub(e.c, per)]) push(q, 'QUA', 3);
      for (const s of entSegs(e)) if (distPtSeg(rawW, s[0], s[1]) < apW * 3) near.push({ kind: 'seg', a: s[0], b: s[1] });
      break;
    }
    case 'image': {
      push(e.p, 'END', 3); push([e.p[0]+e.w, e.p[1]+e.h], 'END', 3);
      push([e.p[0]+e.w, e.p[1]], 'END', 3); push([e.p[0], e.p[1]+e.h], 'END', 3);
      break;
    }
  }
}

/* =====================================================================

   ===================================================================== */
const pointers = new Map();

cv.addEventListener('pointerdown', ev => {
  cv.setPointerCapture(ev.pointerId);

      s0: view.s,
      cx: (pts[0].x + pts[1].x) / 2 - rect.left,
      cy: (pts[0].y + pts[1].y) / 2 - rect.top,
      vx: view.x, vy: view.y,

  }

    return;
  }

  // grip drag?
  if (!tool && sel.size === 1) {
    const e = entById([...sel][0]);
    if (e && !entLocked(e)) {
      for (const g of entGrips(e)) {
        const s = W2S(g.p);
        if (Math.hypot(s[0] - sx, s[1] - sy) < 12) {
          dragState = { mode: 'grip', ent: e, k: g.k, before: snapshot() };
          return;
        }
      }
    }
  }
});

cv.addEventListener('pointermove', ev => {
  const rect = cv.getBoundingClientRect();
  const sx = ev.clientX - rect.left, sy = ev.clientY - rect.top;
  if (pointers.has(ev.pointerId)) pointers.set(ev.pointerId, { x: ev.clientX, y: ev.clientY });

  if (pinchState && pointers.size >= 2) {
    const pts = [...pointers.values()];
    const d = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
    const cx = (pts[0].x + pts[1].x) / 2 - rect.left;
    const cy = (pts[0].y + pts[1].y) / 2 - rect.top;
    const k = d / (pinchState.d0 || 1);
    view.s = clamp(pinchState.s0 * k, 1e-7, 1e7);
    // jaga titik tengah pinch tetap
    const w = [pinchState.cx / (pinchState.s0) + pinchState.vx, (CH - pinchState.cy) / pinchState.s0 + pinchState.vy];
    view.x = w[0] - cx / view.s;
    view.y = w[1] - (CH - cy) / view.s;
    redraw();
    return;
  }
  if (panState) {
    view.x = panState.vx - (sx - panState.sx) / view.s;
    view.y = panState.vy + (sy - panState.sy) / view.s;
    redraw();
    return;
  }

  cursorRaw = S2W(sx, sy);
  snapHit = (tool || dragState) ? computeSnap(cursorRaw) : null;
  cursorW = applyConstraints(snapHit ? snapHit.p : cursorRaw);
  updateCoordHUD();

  if (dragState && dragState.mode === 'sketch') {
    downInfo && (downInfo.moved = true);
    const last = dragState.pts[dragState.pts.length - 1];
    if (V.dist(cursorRaw, last) > 2.5 / view.s) dragState.pts.push(cursorRaw.slice());
    redraw();
    return;
  }
  if (dragState && dragState.mode === 'grip') {
    downInfo && (downInfo.moved = true);
    applyGrip(dragState.ent, dragState.k, snapHit ? snapHit.p : cursorRaw);
    redraw();
    return;
  }
  if (downInfo && !tool) {
    const dx = sx - downInfo.sx, dy = sy - downInfo.sy;
    if (Math.hypot(dx, dy) > 6) {
      downInfo.moved = true;
      boxSel = { a: downInfo.wpRaw, b: cursorRaw };
    }
  } else if (downInfo && tool) {
    const dx = sx - downInfo.sx, dy = sy - downInfo.sy;
    if (Math.hypot(dx, dy) > 6) downInfo.moved = true;
  }
  if (tool && tool.onMove) tool.onMove(cursorW);
  redraw();
});

function finishPointer(ev) {
  pointers.delete(ev.pointerId);
  if (pointers.size < 2) pinchState = null;
  if (panState) { panState = null; return; }

  if (dragState && dragState.mode === 'sketch') {
    const pts = dragState.pts;
    dragState = null; downInfo = null;
    if (tool && tool.onStroke && pts.length > 1) tool.onStroke(pts);
    redraw();
    return;
  }
  if (dragState && dragState.mode === 'grip') {
    undoStack.push(dragState.before);
    if (undoStack.length > UNDO_CAP) undoStack.shift();
    redoStack.length = 0; updateUndoBtns();
    dragState = null; redraw();
    downInfo = null;
    return;
  }
  if (!downInfo) return;
  const info = downInfo; downInfo = null;

  if (boxSel) {
    applyBoxSelect(boxSel.a, boxSel.b, ev.shiftKey);
    boxSel = null; redraw();
    return;
  }
  if (info.moved) return;

  // klik: tool point atau pick seleksi
  const p = cursorW.slice();
  if (tool) { tool.onPoint && tool.onPoint(p); redraw(); return; }

  const hit = pickAt(cursorRaw);
  if (!ev.shiftKey) sel.clear();
  if (hit) { if (sel.has(hit.id) && ev.shiftKey) sel.delete(hit.id); else sel.add(hit.id); }
  onSelChange();
}
cv.addEventListener('pointerup', finishPointer);
cv.addEventListener('pointercancel', ev => { pointers.delete(ev.pointerId); pinchState = null; panState = null; dragState = null; downInfo = null; boxSel = null; redraw(); });

cv.addEventListener('wheel', ev => {
  ev.preventDefault();
  const rect = cv.getBoundingClientRect();
  zoomAt(ev.clientX - rect.left, ev.clientY - rect.top, ev.deltaY < 0 ? 1.18 : 1 / 1.18);
}, { passive: false });

cv.addEventListener('contextmenu', ev => {
  ev.preventDefault();
  if (tool) { tool.onEnter ? tool.onEnter() : endTool(); }
  else if (sel.size) { sel.clear(); onSelChange(); }
});

function updateCoordHUD() {
  document.getElementById('stCoord').textContent = fmt(cursorW[0]) + ', ' + fmt(cursorW[1]);
}

/* =====================================================================
   COMMAND DISPATCHER + TOOL FRAMEWORK (Core Engine)
   ===================================================================== */
const CMDS = {};   // NAME -> {run, desc, primary, aliases}
function reg(names, desc, run) {
  const list = names.split(',').map(s => s.trim().toUpperCase());
  const def = { run, desc, primary: list[0], aliases: list.slice(1) };
  for (const n of list) CMDS[n] = def;
}
function runCommand(name, arg) {
  const key = String(name || '').trim().toUpperCase();
  if (!key) return false;
  const def = CMDS[key];
  if (!def) { logLine('Perintah tidak dikenal: ' + key, 'l-err'); toast('Perintah tidak dikenal: ' + key); return false; }
  logLine('> ' + def.primary + (arg ? ' ' + arg : ''), 'l-cmd');
  lastCmd = def.primary;
  try { def.run(arg); } catch (err) { logLine('Error: ' + err.message, 'l-err'); console.error(err); endTool(); }
  return true;
}
function setTool(t) {
  tool = t;
  setPrompt(t ? (t.name + ' — ' + (t.hint || '')) : 'Perintah:');
  setHint(t ? (t.name + ': ' + (t.hint || '')) : '');
  markRibbonActive(t ? t.name : null);
  redraw();
}
function updToolHint() { if (tool) { setPrompt(tool.name + ' — ' + (tool.hint || '')); setHint(tool.name + ': ' + (tool.hint || '')); } }
function endTool() {
  tool = null; showMeasure(''); setPrompt('Perintah:'); setHint(sel.size ? sel.size + ' objek terpilih' : '');
  markRibbonActive(null); redraw();
}

/* input command line: perintah / titik "x,y" / relatif "@dx,dy" / angka */
function handleCmdInput(raw) {
  const s = raw.trim();
  if (!s) { // Enter kosong = enter tool / ulang perintah terakhir
    if (tool) { tool.onEnter ? tool.onEnter() : endTool(); }
    else if (lastCmd) runCommand(lastCmd);
    return;
  }
  // koordinat absolut x,y
  const mAbs = s.match(/^(-?\d*\.?\d+)\s*[, ]\s*(-?\d*\.?\d+)$/);
  const mRel = s.match(/^@(-?\d*\.?\d+)\s*[, ]\s*(-?\d*\.?\d+)$/);
  const mNum = s.match(/^-?\d*\.?\d+$/);
  if (tool && mRel && tool.lastPt && tool.lastPt()) {
    const lp = tool.lastPt();
    tool.onPoint && tool.onPoint([lp[0] + parseFloat(mRel[1]), lp[1] + parseFloat(mRel[2])]);
    redraw(); return;
  }
  if (tool && mAbs) {
    tool.onPoint && tool.onPoint([parseFloat(mAbs[1]), parseFloat(mAbs[2])]);
    redraw(); return;
  }
  if (tool && mNum) {
    if (tool.onNumber) { tool.onNumber(parseFloat(s)); redraw(); return; }
    // angka = jarak ke arah kursor dari titik terakhir
    if (tool.lastPt && tool.lastPt()) {
      const lp = tool.lastPt();
      const dir = V.norm(V.sub(cursorW, lp));
      if (isFinite(dir[0])) {
        tool.onPoint && tool.onPoint(V.add(lp, V.mul(dir, parseFloat(s))));
        redraw(); return;
      }
    }
  }
  if (tool && tool.onText) { tool.onText(s); return; }
  // opsi satu huruf utk tool (mis. C = close)
  if (tool && tool.onOption && tool.onOption(s.toUpperCase())) { redraw(); return; }
  // parse "CMD arg"
  const sp = s.indexOf(' ');
  const nm = sp < 0 ? s : s.slice(0, sp);
  const arg = sp < 0 ? '' : s.slice(sp + 1).trim();
  runCommand(nm, arg);
}

/* ---------------- helpers utk command interaktif ---------------- */
function ghostEnts(ids, fn) {
  // gambar ghost hasil transform utk preview
  return (g) => {
    for (const id of ids) {
      const e = entById(id); if (!e) continue;
      const c = JSON.parse(JSON.stringify(e));
      transformEnt(c, fn, 1);
      drawEnt(g, c, null, true);
    }
  };
}
function needSelection(next, verb) {
  if (sel.size) { next([...sel]); return; }
  const picked = [];
  setTool({
    name: verb, hint: 'Pilih objek lalu Enter (klik satu-satu / Shift tambah)',
    onPoint(p) {
      const hit = pickAt(cursorRaw.slice());
      if (hit) {
        if (picked.includes(hit.id)) { picked.splice(picked.indexOf(hit.id), 1); sel.delete(hit.id); }
        else { picked.push(hit.id); sel.add(hit.id); }
        this.hint = picked.length + ' objek — Enter untuk lanjut';
        updToolHint(); redraw();
      }
    },
    onEnter() {
      if (!picked.length) { endTool(); return; }
      next(picked.slice());
    },
    lastPt: () => null,
  });
}

      this.hint = pts.length === 1 ? 'Klik titik tengah (di busur)' : 'Klik titik akhir';
      updToolHint();
      if (pts.length === 3) {
        const a = arc3pt(pts[0], pts[1], pts[2]);
        if (a) { pushUndo(); addEnt({ type: 'arc', ...a }); }
        else { pushUndo(); addEnt({ type: 'line', a: pts[0], b: pts[2] }); }
        endTool();
      }
    },
    preview(g, cur) {
      const tmp = pts.concat([cur]);
      if (tmp.length < 2) return;
      if (tmp.length === 2) { const a = W2S(tmp[0]), b = W2S(tmp[1]); g.beginPath(); g.moveTo(a[0],a[1]); g.lineTo(b[0],b[1]); g.stroke(); return; }
      const a = arc3pt(tmp[0], tmp[1], tmp[2]);
      if (!a) return;
      const s = W2S(a.c);
      g.beginPath(); g.arc(s[0], s[1], a.r * view.s, -a.a1, -a.a2, a.ccw); g.stroke();
    },
    lastPt() { return pts.length ? pts[pts.length - 1] : null; },
  });
});
function arc3pt(p1, p2, p3) {
  const ax = p1[0], ay = p1[1], bx = p2[0], by = p2[1], cx = p3[0], cy = p3[1];
  const d = 2 * (ax * (by - cy) + bx * (cy - ay) + cx * (ay - by));
  if (Math.abs(d) < 1e-12) return null;
  const ux = ((ax*ax+ay*ay)*(by-cy) + (bx*bx+by*by)*(cy-ay) + (cx*cx+cy*cy)*(ay-by)) / d;
  const uy = ((ax*ax+ay*ay)*(cx-bx) + (bx*bx+by*by)*(ax-cx) + (cx*cx+cy*cy)*(bx-ax)) / d;
  const c = [ux, uy], r = V.dist(c, p1);
  const a1 = Math.atan2(ay-uy, ax-ux), am = Math.atan2(by-uy, bx-ux), a2 = Math.atan2(cy-uy, cx-ux);
  // pilih arah yang melewati p2
  const e = { a1, a2, ccw: true };
  if (!angleInArc(am, { ...e, c, r })) e.ccw = false;
  return { c, r, a1, a2: a2, ccw: e.ccw };
}

      else { toast('Objek harus tertutup (polyline tertutup / lingkaran)'); return; }
      openModal('Hatch', [
        { k: 'pattern', label: 'Pola', type: 'select', v: 'ANSI31', opts: ['ANSI31', 'SOLID'] },
        { k: 'spacing', label: 'Jarak pola (' + D.units + ')', type: 'number', v: +(Math.sqrt(Math.abs(polyArea(pts)))/20).toPrecision(2) || 1 },
      ], vals => {
        pushUndo();
        addEnt({ type: 'hatch', pts, pattern: vals.pattern, spacing: Math.max(1e-6, parseFloat(vals.spacing) || 1) });
        redraw();
      });
      endTool();
    },
    lastPt: () => null,
  });
});

/* =====================================================================
   EDITING ENGINE
   ===================================================================== */
function xlate(d) { return p => [p[0] + d[0], p[1] + d[1]]; }

reg('MOVE,M', 'Pindahkan objek', () => {
  needSelection(ids => startMoveCopy(ids, false), 'MOVE');
});
reg('COPY,CO,CP', 'Salin objek (multi)', () => {
  needSelection(ids => startMoveCopy(ids, true), 'COPY');
});
function startMoveCopy(ids, isCopy) {
  let base = null;
  setTool({
    name: isCopy ? 'COPY' : 'MOVE', hint: 'Klik titik basis',
    onPoint(p) {
      if (!base) { base = p.slice(); this.hint = 'Klik titik tujuan'; updToolHint(); return; }
      const d = V.sub(p, base);
      pushUndo();
      if (isCopy) {
        const clones = [];
        for (const id of ids) {
          const e = entById(id); if (!e) continue;
          const c = JSON.parse(JSON.stringify(e)); c.id = uid();
          transformEnt(c, xlate(d)); D.entities.push(c); clones.push(c.id);
        }
        logLine(clones.length + ' objek disalin', 'l-ok');
        // COPY multiple: basis tetap, terus menempatkan
        redraw();
      } else {
        for (const id of ids) { const e = entById(id); if (e) transformEnt(e, xlate(d)); }
        endTool(); sel.clear(); onSelChange();
      }
    },
    preview(g, cur) {
      if (!base) return;
      const a = W2S(base), b = W2S(cur);
      g.beginPath(); g.moveTo(a[0],a[1]); g.lineTo(b[0],b[1]); g.stroke();
      ghostEnts(ids, xlate(V.sub(cur, base)))(g);
      showMeasure('Δ = ' + fmt(cur[0]-base[0]) + ', ' + fmt(cur[1]-base[1]) + ' · d = ' + fmt(V.dist(base, cur)));
    },
    onEnter() { endTool(); sel.clear(); onSelChange(); },
    lastPt() { return base; },
  });
}

reg('ROTATE,RO', 'Putar objek (angka = derajat)', () => {
  needSelection(ids => {

      onPoint(p) {
        if (!base) { base = p.slice(); this.hint = 'Klik arah sudut atau ketik derajat'; updToolHint(); return; }
        const th = V.ang(base, p);
        applyRot(ids, base, th);
      },
      onNumber(n) { if (base) applyRot(ids, base, rad(n)); },
      preview(g, cur) {
        if (!base) return;
        const th = V.ang(base, cur);
        ghostEnts(ids, p => V.rot(p, base, th))(g);
        showMeasure('θ = ' + fmt(deg(th)) + '°');
      },
      lastPt() { return base; },
    });
    function applyRot(ids2, base2, th) {
      pushUndo();
      for (const id of ids2) { const e = entById(id); if (e) transformEnt(e, p => V.rot(p, base2, th)); }
      endTool(); sel.clear(); onSelChange();
    }

});

reg('SCALE,SC', 'Skala objek (angka = faktor)', () => {
  needSelection(ids => {
    let base = null, ref = null;
    setTool({
      name: 'SCALE', hint: 'Klik titik basis',
      onPoint(p) {
        if (!base) { base = p.slice(); this.hint = 'Ketik faktor skala, atau klik jarak acuan'; updToolHint(); return; }
        if (!ref) { ref = V.dist(base, p) || 1; this.hint = 'Klik jarak baru (faktor = baru/acuan)'; updToolHint(); return; }
        const k = (V.dist(base, p) || 1) / ref;
        applyScale(k);
      },
      onNumber(n) { if (base && n > 0) applyScale(n); },
      preview(g, cur) {
        if (!base) return;
        const k = ref ? (V.dist(base, cur) || 1) / ref : 1;
        if (ref) { ghostEnts(ids, p => V.add(base, V.mul(V.sub(p, base), k)))(g); showMeasure('k = ' + fmt(k)); }
      },
      lastPt() { return base; },
    });
    function applyScale(k) {
      pushUndo();
      for (const id of ids) { const e = entById(id); if (e) transformEnt(e, p => V.add(base, V.mul(V.sub(p, base), k)), k); }
      endTool(); sel.clear(); onSelChange();
    }
  }, 'SCALE');
});

reg('MIRROR,MI', 'Cermin objek (salinan) dgn sumbu 2 titik', () => {
  needSelection(ids => {
    let a = null;
    setTool({
      name: 'MIRROR', hint: 'Klik titik pertama sumbu cermin',
      onPoint(p) {
        if (!a) { a = p.slice(); this.hint = 'Klik titik kedua sumbu'; updToolHint(); return; }
        const fn = mirrorFn(a, p);
        pushUndo();
        for (const id of ids) {
          const e = entById(id); if (!e) continue;
          const c = JSON.parse(JSON.stringify(e)); c.id = uid();
          transformEnt(c, fn, 1, true); D.entities.push(c);
        }
        endTool(); sel.clear(); onSelChange();
      },
      preview(g, cur) {
        if (!a) return;
        const s1 = W2S(a), s2 = W2S(cur);
        g.beginPath(); g.moveTo(s1[0],s1[1]); g.lineTo(s2[0],s2[1]); g.stroke();
        ghostEnts(ids, mirrorFn(a, cur))(g);
      },
      lastPt() { return a; },
    });
  }, 'MIRROR');
});
function mirrorFn(a, b) {
  const d = V.norm(V.sub(b, a));
  if (!isFinite(d[0])) return p => p;
  return p => {
    const ap = V.sub(p, a);
    const proj = V.mul(d, V.dot(ap, d));
    const perp = V.sub(ap, proj);
    return V.add(a, V.sub(proj, perp));
  };
}

reg('OFFSET,O', 'Offset sejajar (angka = jarak)', () => {
  let dist = null;
  setTool({
    name: 'OFFSET', hint: 'Ketik jarak offset (angka)',
    onNumber(n) { if (n > 0) { dist = n; this.hint = 'Klik objek yang di-offset'; updToolHint(); } },
    onPoint(p) {
      if (dist == null) { toast('Ketik jarak offset dulu'); return; }
      if (!this._ent) {
        const hit = pickAt(cursorRaw.slice());
        if (!hit) { toast('Tidak ada objek'); return; }
        if (!['line','poly','circle','arc'].includes(hit.type)) { toast('Offset: line/poly/circle/arc saja'); return; }
        this._ent = hit; this.hint = 'Klik sisi arah offset'; updToolHint(); return;
      }
      const e = this._ent, side = p;
      pushUndo();
      const out = offsetEntity(e, dist, side);
      if (out) { addEnt(out); logLine('OFFSET ' + fmt(dist), 'l-ok'); }
      this._ent = null; this.hint = 'Klik objek berikutnya (Enter selesai)'; updToolHint();
    },
    onEnter() { endTool(); },
    lastPt: () => null,
  });
});
function offsetEntity(e, d, side) {
  if (e.type === 'line') {
    const per = V.perp(V.norm(V.sub(e.b, e.a)));
    const sgn = Math.sign(V.dot(V.sub(side, e.a), per)) || 1;
    const off = V.mul(per, d * sgn);
    return { type: 'line', a: V.add(e.a, off), b: V.add(e.b, off), layer: e.layer, color: e.color, lt: e.lt };
  }
  if (e.type === 'circle') {
    const r = V.dist(side, e.c) > e.r ? e.r + d : Math.max(1e-9, e.r - d);
    return { type: 'circle', c: e.c.slice(), r, layer: e.layer, color: e.color, lt: e.lt };
  }
  if (e.type === 'arc') {
    const r = V.dist(side, e.c) > e.r ? e.r + d : Math.max(1e-9, e.r - d);
    return { type: 'arc', c: e.c.slice(), r, a1: e.a1, a2: e.a2, ccw: e.ccw, layer: e.layer, color: e.color, lt: e.lt };
  }
  if (e.type === 'poly') {
    // tentukan sisi: coba +d dan -d, pilih yang lebih dekat ke titik klik
    const o1 = offsetPoly(e.pts, d, e.closed), o2 = offsetPoly(e.pts, -d, e.closed);
    if (!o1 || !o2) return null;
    const d1 = Math.min(...o1.map((p, i) => distPtSeg(side, p, o1[(i+1) % o1.length])));
    const d2 = Math.min(...o2.map((p, i) => distPtSeg(side, p, o2[(i+1) % o2.length])));
    return { type: 'poly', pts: d1 <= d2 ? o1 : o2, closed: e.closed, layer: e.layer, color: e.color, lt: e.lt };
  }
  return null;
}

reg('EXPLODE,X', 'Pecah block/polyline/dimensi', () => {
  needSelection(ids => {
    pushUndo();
    let n = 0;
    for (const id of ids) {
      const e = entById(id); if (!e) continue;
      const parts = explodeEnt(e);
      if (parts) {
        removeEnts([id]);
        for (const p of parts) { p.id = uid(); D.entities.push(p); }
        n++;
      }
    }
    logLine(n + ' objek dipecah', 'l-ok');
    endTool(); sel.clear(); onSelChange();
  }, 'EXPLODE');
});
function explodeEnt(e) {
  const base = { layer: e.layer, color: e.color, lt: e.lt, lw: e.lw };
  if (e.type === 'poly') {
    const out = [];
    for (const s of entSegs(e)) out.push({ ...base, type: 'line', a: s[0].slice(), b: s[1].slice() });
    return out;
  }
  if (e.type === 'insert') {
    const blk = D.blocks[e.name]; if (!blk) return null;
    const out = [];
    const k = Math.abs(e.sx || 1);
    for (const ce of blk.ents) {
      const c = JSON.parse(JSON.stringify(ce));
      transformEnt(c, p => insXform(e, blk, p), k);
      c.layer = c.layer === '0' ? e.layer : c.layer;
      out.push(c);
    }
    return out;
  }
  if (e.type === 'dim') {
    const g = dimGeom(e); if (!g) return null;
    return [
      { ...base, type: 'line', a: g.e1a, b: g.e1b },
      { ...base, type: 'line', a: g.e2a, b: g.e2b },
      { ...base, type: 'line', a: g.d1, b: g.d2 },
      { ...base, type: 'text', p: g.mid.slice(), text: fmtd(g.len), h: dimScale() * 1.2, rot: g.rot },
    ];
  }
  if (e.type === 'leader') {
    const out = [];
    for (const s of entSegs(e)) out.push({ ...base, type: 'line', a: s[0].slice(), b: s[1].slice() });
    out.push({ ...base, type: 'text', p: e.pts[e.pts.length-1].slice(), text: e.text || '', h: e.h || 1, rot: 0 });
    return out;
  }
  if (e.type === 'hatch' || e.type === 'solid' || e.type === 'cloud') {
    return [{ ...base, type: 'poly', pts: e.pts.map(p => p.slice()), closed: true }];
  }
  if (e.type === 'ellipse') return [{ ...base, type: 'poly', pts: ellipsePts(e, 48), closed: true }];
  if (e.type === 'dimang') {
    let sweep = e.a2 - e.a1;
    if (e.ccw !== false) { while (sweep <= 0) sweep += 2 * Math.PI; } else { while (sweep >= 0) sweep -= 2 * Math.PI; }
    const am = e.a1 + sweep / 2;
    return [
      { ...base, type: 'arc', c: e.p.slice(), r: e.r, a1: e.a1, a2: e.a2, ccw: e.ccw !== false },
      { ...base, type: 'text', p: [e.p[0] + e.r * 1.15 * Math.cos(am), e.p[1] + e.r * 1.15 * Math.sin(am)], text: fmt(Math.abs(deg(sweep))) + ' deg', h: dimScale() * 1.2, rot: 0 },
    ];
  }
  if (e.type === 'dimrad') {
    const dir = V.norm(V.sub(e.pos, e.c));
    const tip = V.add(e.c, V.mul(dir, e.r));
    return [
      { ...base, type: 'line', a: e.pos.slice(), b: tip },
      { ...base, type: 'text', p: e.pos.slice(), text: (e.dia ? 'D ' + fmtd(2 * e.r) : 'R ' + fmtd(e.r)), h: dimScale() * 1.2, rot: 0 },
    ];
  }
  if (e.type === 'dimarc') {
    let sweep = e.a2 - e.a1;
    if (e.ccw !== false) { while (sweep <= 0) sweep += 2 * Math.PI; } else { while (sweep >= 0) sweep -= 2 * Math.PI; }
    const am = e.a1 + sweep / 2;
    return [
      { ...base, type: 'arc', c: e.c.slice(), r: e.roff, a1: e.a1, a2: e.a2, ccw: e.ccw !== false },
      { ...base, type: 'text', p: [e.c[0] + e.roff * 1.1 * Math.cos(am), e.c[1] + e.roff * 1.1 * Math.sin(am)], text: fmtd(Math.abs(sweep) * e.r), h: dimScale() * 1.2, rot: 0 },
    ];
  }
  return null;
}

reg('AREA,AA', 'Ukur luas dari titik-titik (Enter tutup) atau pilih objek', () => {
  const pts = [];
  setTool({
    name: 'AREA', hint: 'Klik titik batas (atau klik polyline tertutup); Enter selesai',
    onPoint(p) {
      if (!pts.length) {
        const hit = pickAt(cursorRaw.slice());
        if (hit && ((hit.type === 'poly' && hit.closed) || hit.type === 'circle' || hit.type === 'hatch' || hit.type === 'solid')) {
          let A, L;
          if (hit.type === 'circle') { A = Math.PI * hit.r * hit.r; L = 2 * Math.PI * hit.r; }
          else { A = Math.abs(polyArea(hit.pts)); L = polyLen(hit.pts, true); }
          const msg = 'Luas = ' + fmtA(A) + ' ' + D.units + '² · Keliling = ' + fmtd(L) + ' ' + D.units;
          logLine(msg, 'l-ok'); showMeasure(msg); toast(msg, 3500);
          pushResult('Luas', msg);
          endTool(); return;
        }
      }
      pts.push(p.slice());
      this.hint = pts.length + ' titik — Enter untuk hitung'; updToolHint();
    },
    preview(g, cur) {
      if (!pts.length) return;
      g.beginPath();
      pts.forEach((p, i) => { const s = W2S(p); i ? g.lineTo(s[0], s[1]) : g.moveTo(s[0], s[1]); });
      const c = W2S(cur); g.lineTo(c[0], c[1]); g.closePath(); g.stroke(); g.fill();
      if (pts.length >= 2) showMeasure('Luas ≈ ' + fmt(Math.abs(polyArea(pts.concat([cur])))) + ' ' + D.units + '²');
    },
    onEnter() {
      if (pts.length >= 3) {
        const A = Math.abs(polyArea(pts)), L = polyLen(pts, true);
        const msg = 'Luas = ' + fmtA(A) + ' ' + D.units + '² · Keliling = ' + fmtd(L) + ' ' + D.units;
        logLine(msg, 'l-ok'); toast(msg, 4000); showMeasure(msg);
        pushResult('Luas', msg);
      }
      endTool();
    },
    lastPt() { return pts.length ? pts[pts.length - 1] : null; },
  });
});

reg('ANGLE,AN', 'Ukur sudut 3 titik (vertex di tengah)', () => {
  const pts = [];
  setTool({
    name: 'ANGLE', hint: 'Klik titik kaki pertama',
    onPoint(p) {
      pts.push(p.slice());
      this.hint = pts.length === 1 ? 'Klik titik vertex (pusat sudut)' : 'Klik titik kaki kedua';
      updToolHint();
      if (pts.length === 3) {
        const a1 = V.ang(pts[1], pts[0]), a2 = V.ang(pts[1], pts[2]);
        let dth = Math.abs(deg(a2 - a1)) % 360; if (dth > 180) dth = 360 - dth;
        const msg = 'Sudut = ' + fmt(dth) + '° (' + dmsStr(dth) + ')';
        logLine(msg, 'l-ok'); toast(msg, 3500); showMeasure(msg);
        pushResult('Sudut', msg);
        endTool();
      }
    },
    preview(g, cur) {
      const tmp = pts.concat([cur]);
      if (tmp.length < 2) return;
      g.beginPath();
      tmp.forEach((p, i) => { const s = W2S(p); i ? g.lineTo(s[0], s[1]) : g.moveTo(s[0], s[1]); });
      g.stroke();
    },
    lastPt() { return pts.length ? pts[pts.length - 1] : null; },
  });
});
function dmsStr(d) {
  const dd = Math.floor(d), m = Math.floor((d - dd) * 60), s = ((d - dd) * 60 - m) * 60;
  return dd + '° ' + m + "' " + s.toFixed(1) + '"';
}

reg('ELLIPSE,EL', 'Elips: pusat, ujung sumbu, rasio', () => {
  let c = null, ax = null;
  setTool({
    name: 'ELLIPSE', hint: 'Klik titik pusat elips',
    onPoint(p) {
      if (!c) { c = p.slice(); this.hint = 'Klik ujung sumbu panjang'; updToolHint(); return; }
      if (!ax) {
        ax = V.sub(p, c);
        if (V.len(ax) < 1e-9) { ax = null; return; }
        this.hint = 'Klik lebar sumbu pendek (atau ketik rasio 0–1)'; updToolHint(); return;
      }
      const ratio = clamp(V.dist(p, c) / V.len(ax), 0.01, 1);
      pushUndo(); addEnt({ type: 'ellipse', c, a: ax, ratio }); endTool();
    },
    onNumber(n) {
      if (c && ax && n > 0) { pushUndo(); addEnt({ type: 'ellipse', c, a: ax, ratio: clamp(n, 0.01, 1) }); endTool(); }
    },
    preview(g, cur) {
      if (!c) return;
      const s = W2S(c);
      if (!ax) { const b = W2S(cur); g.beginPath(); g.moveTo(s[0], s[1]); g.lineTo(b[0], b[1]); g.stroke(); return; }
      const rot = Math.atan2(ax[1], ax[0]);
      const rx = V.len(ax) * view.s;
      const ry = clamp(V.dist(cur, c) / V.len(ax), 0.01, 1) * rx;
      g.beginPath(); g.ellipse(s[0], s[1], rx, ry, -rot, 0, 2 * Math.PI); g.stroke();
    },
    lastPt() { return c; },
  });
});

/* Douglas-Peucker utk penyederhanaan goresan */
function simplifyDP(pts, eps) {
  if (pts.length < 3) return pts.slice();
  let dmax = 0, idx = 0;
  for (let i = 1; i < pts.length - 1; i++) {
    const d = distPtSeg(pts[i], pts[0], pts[pts.length - 1]);
    if (d > dmax) { dmax = d; idx = i; }
  }
  if (dmax <= eps) return [pts[0], pts[pts.length - 1]];
  const l = simplifyDP(pts.slice(0, idx + 1), eps);
  const r = simplifyDP(pts.slice(idx), eps);
  return l.slice(0, -1).concat(r);
}

reg('SMARTPEN,SP', 'Smart Pen: goresan dikenali jadi bentuk', () => {
  setTool({
    name: 'SMARTPEN', freehand: true, hint: 'Gores bentuk: garis/lingkaran/persegi (Esc selesai)',
    onStroke(pts) {
      const e = recognizeStroke(pts);
      if (!e) return;
      pushUndo(); addEnt(e);
      logLine('Smart Pen: ' + e.type.toUpperCase(), 'l-ok');
    },
    lastPt: () => null,
  });
});
function recognizeStroke(pts) {
  if (pts.length < 2) return null;
  const start = pts[0], end = pts[pts.length - 1];
  const chord = V.dist(start, end);
  const total = polyLen(pts, false);
  if (total < 1e-9) return null;
  const bb = bboxOfPts(pts);
  const size = Math.max(bb[2] - bb[0], bb[3] - bb[1]);
  const closed = chord < size * 0.25;
  // garis: hampir lurus
  let maxDev = 0;
  for (const p of pts) maxDev = Math.max(maxDev, distPtSeg(p, start, end));
  if (!closed && maxDev < size * 0.06) return { type: 'line', a: start.slice(), b: end.slice() };
  if (closed) {
    // lingkaran: jarak ke centroid seragam
    const c = [pts.reduce((s, p) => s + p[0], 0) / pts.length, pts.reduce((s, p) => s + p[1], 0) / pts.length];
    const rs = pts.map(p => V.dist(p, c));
    const rm = rs.reduce((a, b) => a + b, 0) / rs.length;
    const dev = Math.sqrt(rs.reduce((s, r) => s + (r - rm) ** 2, 0) / rs.length);
    if (dev < rm * 0.14) return { type: 'circle', c, r: rm };
    // persegi: simplifikasi jadi ±4 sudut siku
    const simp = simplifyDP(pts.concat([pts[0]]), size * 0.05);
    if (simp.length >= 4 && simp.length <= 6) {
      return { type: 'poly', pts: [[bb[0],bb[1]],[bb[2],bb[1]],[bb[2],bb[3]],[bb[0],bb[3]]], closed: true };
    }
    return { type: 'poly', pts: simplifyDP(pts, size * 0.02), closed: true };
  }
  let sm = simplifyDP(pts, size * 0.015);
  return { type: 'poly', pts: sm, closed: false };
}

reg('DIVIDE,DIV', 'Bagi objek jadi N segmen (titik node)', () => {
  setTool({
    name: 'DIVIDE', hint: 'Klik objek yang akan dibagi',
    onPoint() {
      const hit = pickAt(cursorRaw.slice());

      openModal('Divide', [

  });
});
function dividePts(e, N) {
  const out = [];
  if (e.type === 'line') { for (let i = 1; i < N; i++) out.push(V.add(e.a, V.mul(V.sub(e.b, e.a), i / N))); return out; }
  if (e.type === 'circle') { for (let i = 0; i < N; i++) { const a = 2 * Math.PI * i / N; out.push([e.c[0] + e.r * Math.cos(a), e.c[1] + e.r * Math.sin(a)]); } return out; }
  if (e.type === 'arc') {
    let sweep = e.a2 - e.a1;
    const ccw = e.ccw !== false;
    if (ccw) { while (sweep <= 0) sweep += 2 * Math.PI; } else { while (sweep >= 0) sweep -= 2 * Math.PI; }
    for (let i = 1; i < N; i++) { const a = e.a1 + sweep * i / N; out.push([e.c[0] + e.r * Math.cos(a), e.c[1] + e.r * Math.sin(a)]); }
    return out;
  }
  // poly / ellipse: sepanjang keliling
  const pts = e.type === 'ellipse' ? ellipsePts(e, 96).concat([ellipsePts(e, 96)[0]]) : (e.closed ? e.pts.concat([e.pts[0]]) : e.pts);
  const total = polyLen(pts, false);
  let target = total / N, acc = 0, ti = 1;
  for (let i = 0; i < pts.length - 1 && ti < N; i++) {
    const L = V.dist(pts[i], pts[i + 1]);
    while (acc + L >= target * ti - 1e-9 && ti < N) {
      const t = (target * ti - acc) / L;
      out.push(V.add(pts[i], V.mul(V.sub(pts[i + 1], pts[i]), t)));
      ti++;
    }
    acc += L;
  }
  return out;
}

/* =====================================================================
   EDITING LANJUTAN — TRIM, EXTEND, FILLET, CHAMFER
   ===================================================================== */
function cloneBase(e) { return { layer: e.layer, color: e.color, lt: e.lt, lw: e.lw }; }
/* primitif utk perhitungan perpotongan antar entitas */
function entPrims(e) {
  if (e.type === 'circle') return [{ kind: 'cir', c: e.c, r: e.r }];
  if (e.type === 'arc') return [{ kind: 'cir', c: e.c, r: e.r, a1: e.a1, a2: e.a2, ccw: e.ccw !== false, arc: true }];
  return entSegs(e).map(s => ({ kind: 'seg', a: s[0], b: s[1] }));
}
function onArcPrim(q, pr) {
  if (!pr.arc) return true;
  return angleInArc(Math.atan2(q[1] - pr.c[1], q[0] - pr.c[0]), { a1: pr.a1, a2: pr.a2, ccw: pr.ccw });
}
function primInts(p1, p2) {
  if (p1.kind === 'seg' && p2.kind === 'seg') { const ip = segInt(p1.a, p1.b, p2.a, p2.b); return ip ? [ip] : []; }
  if (p1.kind === 'seg') return segCircleInt(p1.a, p1.b, p2.c, p2.r).filter(q => onArcPrim(q, p2));
  if (p2.kind === 'seg') return primInts(p2, p1);
  return circleCircleInt(p1.c, p1.r, p2.c, p2.r).filter(q => onArcPrim(q, p1) && onArcPrim(q, p2));
}
function entIntersections(target, boundary) {
  const out = [];
  for (const pa of entPrims(target)) for (const pb of entPrims(boundary)) out.push(...primInts(pa, pb));
  return out;
}
function normAng(a) { while (a < 0) a += 2 * Math.PI; while (a >= 2 * Math.PI) a -= 2 * Math.PI; return a; }

/* rantai polyline: param sepanjang keliling utk trim */
function polyChain(e) {
  const pts = e.closed ? e.pts.concat([e.pts[0]]) : e.pts;
  const cum = [0];
  for (let i = 0; i < pts.length - 1; i++) cum.push(cum[i] + V.dist(pts[i], pts[i + 1]));
  return { pts, cum, total: cum[cum.length - 1], closed: !!e.closed };
}
function chainParamOf(ch, q) {
  let best = 1e18, bs = 0;
  for (let i = 0; i < ch.pts.length - 1; i++) {
    const d = distPtSeg(q, ch.pts[i], ch.pts[i + 1]);
    if (d < best) {
      best = d;
      const pr = projPtSeg(q, ch.pts[i], ch.pts[i + 1]);
      bs = ch.cum[i] + V.dist(ch.pts[i], pr);
    }
  }
  return bs;
}
function chainSub(ch, s1, s2) {
  // sub-rantai maju dari s1 ke s2 (bisa wrap jika closed)
  if (s2 < s1) s2 += ch.total;
  const out = [];
  const at = s => {
    let ss = s % ch.total; if (ss < 0) ss += ch.total;
    for (let i = 0; i < ch.pts.length - 1; i++) {
      if (ss <= ch.cum[i + 1] + 1e-9) {
        const L = ch.cum[i + 1] - ch.cum[i] || 1e-12;
        return V.add(ch.pts[i], V.mul(V.sub(ch.pts[i + 1], ch.pts[i]), (ss - ch.cum[i]) / L));
      }
    }
    return ch.pts[ch.pts.length - 1].slice();
  };
  out.push(at(s1));
  for (let k = 0; k < 2; k++) {   // maksimum 2 putaran
    for (let i = 0; i < ch.pts.length; i++) {
      const s = ch.cum[i] + k * ch.total;
      if (s > s1 + 1e-9 && s < s2 - 1e-9) out.push(ch.pts[i].slice());
    }
    if (s2 <= (k + 1) * ch.total) break;
  }
  out.push(at(s2));
  return out;
}

reg('TRIM,TR', 'Potong objek pada batas (pilih batas, lalu klik bagian dibuang)', () => {
  let boundary = null;
  setTool({
    name: 'TRIM', hint: 'Klik objek batas (cutting edge)',
    onPoint() {
      const hit = pickAt(cursorRaw.slice());
      if (!hit) { toast('Tidak ada objek'); return; }
      if (!boundary) { boundary = hit; this.hint = 'Klik bagian objek yang DIBUANG (Enter selesai)'; updToolHint(); sel.clear(); sel.add(hit.id); redraw(); return; }
      if (hit.id === boundary.id) { toast('Itu objek batas'); return; }
      const cuts = entIntersections(hit, boundary);
      if (!cuts.length) { toast('Tidak berpotongan dengan batas'); return; }
      const parts = trimEntity(hit, cuts, cursorRaw.slice());
      if (parts == null) { toast('TRIM tidak didukung untuk tipe ini'); return; }
      pushUndo();
      removeEnts([hit.id]);
      for (const p of parts) { p.id = uid(); D.entities.push(p); }
      logLine('TRIM ok', 'l-ok'); redraw();
    },
    onEnter() { sel.clear(); endTool(); },
    lastPt: () => null,
  });
});
function trimEntity(e, cuts, clickW) {
  if (e.type === 'line') {
    const dirv = V.sub(e.b, e.a), L2 = V.dot(dirv, dirv);
    if (L2 < 1e-18) return null;
    const tOf = p => V.dot(V.sub(p, e.a), dirv) / L2;
    const ts = cuts.map(tOf).filter(t => t > 1e-6 && t < 1 - 1e-6).sort((x, y) => x - y);
    if (!ts.length) return [];
    const tc = clamp(tOf(clickW), 0, 1);
    let lo = 0, hi = 1;
    for (const t of ts) { if (t <= tc) lo = Math.max(lo, t); else hi = Math.min(hi, t); }
    const parts = [];
    if (lo > 1e-6) parts.push({ ...cloneBase(e), type: 'line', a: e.a.slice(), b: V.add(e.a, V.mul(dirv, lo)) });
    if (hi < 1 - 1e-6) parts.push({ ...cloneBase(e), type: 'line', a: V.add(e.a, V.mul(dirv, hi)), b: e.b.slice() });
    return parts;
  }
  if (e.type === 'circle') {
    const angs = [...new Set(cuts.map(q => normAng(Math.atan2(q[1] - e.c[1], q[0] - e.c[0])).toFixed(9)))].map(Number).sort((x, y) => x - y);
    if (angs.length < 2) return [];
    const ac = normAng(Math.atan2(clickW[1] - e.c[1], clickW[0] - e.c[0]));
    let i = 0; while (i < angs.length && angs[i] <= ac) i++;
    const aNext = angs[i % angs.length], aPrev = angs[(i - 1 + angs.length) % angs.length];
    return [{ ...cloneBase(e), type: 'arc', c: e.c.slice(), r: e.r, a1: aNext, a2: aPrev, ccw: true }];
  }
  if (e.type === 'arc') {
    const ccw = e.ccw !== false;
    let sweep = e.a2 - e.a1;
    if (ccw) { while (sweep <= 0) sweep += 2 * Math.PI; } else { while (sweep >= 0) sweep -= 2 * Math.PI; }
    const relOf = q => {
      let rel = Math.atan2(q[1] - e.c[1], q[0] - e.c[0]) - e.a1;
      if (ccw) { while (rel < 0) rel += 2 * Math.PI; } else { while (rel > 0) rel -= 2 * Math.PI; }
      return rel / sweep;   // 0..1 sepanjang busur
    };
    const ts = cuts.map(relOf).filter(t => t > 1e-6 && t < 1 - 1e-6).sort((x, y) => x - y);
    if (!ts.length) return [];
    const tc = clamp(relOf(clickW), 0, 1);
    let lo = 0, hi = 1;
    for (const t of ts) { if (t <= tc) lo = Math.max(lo, t); else hi = Math.min(hi, t); }
    const parts = [];
    if (lo > 1e-6) parts.push({ ...cloneBase(e), type: 'arc', c: e.c.slice(), r: e.r, a1: e.a1, a2: e.a1 + sweep * lo, ccw });
    if (hi < 1 - 1e-6) parts.push({ ...cloneBase(e), type: 'arc', c: e.c.slice(), r: e.r, a1: e.a1 + sweep * hi, a2: e.a2, ccw });
    return parts;
  }
  if (e.type === 'poly') {
    const ch = polyChain(e);
    const ss = [...new Set(cuts.map(q => chainParamOf(ch, q).toFixed(7)))].map(Number)
      .filter(s => s > 1e-6 && s < ch.total - 1e-6).sort((x, y) => x - y);
    if (!ss.length) return [];
    const sc = chainParamOf(ch, clickW);
    const parts = [];
    if (ch.closed) {
      if (ss.length < 2) return [];
      let lo = -1, hi = -1;
      for (const s of ss) { if (s <= sc) lo = s; }
      for (let i = ss.length - 1; i >= 0; i--) { if (ss[i] > sc) hi = ss[i]; }
      if (lo < 0) lo = ss[ss.length - 1] - ch.total;      // wrap
      if (hi < 0) hi = ss[0] + ch.total;
      const keep = chainSub(ch, hi % ch.total, (lo + ch.total) % ch.total);
      if (keep.length >= 2) parts.push({ ...cloneBase(e), type: 'poly', pts: keep, closed: false });
      return parts;
    }
    let lo = 0, hi = ch.total;
    for (const s of ss) { if (s <= sc) lo = Math.max(lo, s); else hi = Math.min(hi, s); }
    if (lo > 1e-6) { const p1 = chainSub(ch, 0, lo); if (p1.length >= 2) parts.push({ ...cloneBase(e), type: 'poly', pts: p1, closed: false }); }
    if (hi < ch.total - 1e-6) { const p2 = chainSub(ch, hi, ch.total); if (p2.length >= 2) parts.push({ ...cloneBase(e), type: 'poly', pts: p2, closed: false }); }
    return parts;
  }
  return null;
}

reg('EXTEND,EX', 'Perpanjang garis sampai batas', () => {
  let boundary = null;
  setTool({
    name: 'EXTEND', hint: 'Klik objek batas (boundary edge)',
    onPoint() {
      const hit = pickAt(cursorRaw.slice());
      if (!hit) { toast('Tidak ada objek'); return; }
      if (!boundary) { boundary = hit; this.hint = 'Klik ujung garis yang diperpanjang (Enter selesai)'; updToolHint(); sel.clear(); sel.add(hit.id); redraw(); return; }
      if (hit.id === boundary.id) { toast('Itu objek batas'); return; }
      if (!extendEntity(hit, boundary, cursorRaw.slice())) toast('Tidak menemukan perpotongan dgn batas');
      else { logLine('EXTEND ok', 'l-ok'); redraw(); }
    },
    onEnter() { sel.clear(); endTool(); },
    lastPt: () => null,
  });
});
function extendEntity(e, boundary, clickW) {
  // dukungan: line & polyline (segmen ujung); busur: arc
  function rayHit(base, tip) {
    // titik potong garis tak-hingga (base->tip) dgn boundary, di depan tip
    const dirv = V.sub(tip, base), L = V.len(dirv);
    if (L < 1e-12) return null;
    const cands = [];
    for (const pr of entPrims(boundary)) {
      let pts = [];
      if (pr.kind === 'seg') {
        const ip = segInt(base, tip, pr.a, pr.b, false);
        if (ip) {
          const d2 = V.sub(pr.b, pr.a), u = V.dot(V.sub(ip, pr.a), d2) / (V.dot(d2, d2) || 1e-12);
          if (u >= -1e-9 && u <= 1 + 1e-9) pts.push(ip);
        }
      } else pts = segCircleInt(base, tip, pr.c, pr.r, false).filter(q => onArcPrim(q, pr));
      for (const q of pts) {
        const t = V.dot(V.sub(q, base), dirv) / (L * L);
        if (t > 1 + 1e-9) cands.push({ q, t });
      }
    }
    if (!cands.length) return null;
    cands.sort((x, y) => x.t - y.t);
    return cands[0].q;
  }
  if (e.type === 'line') {
    const nearA = V.dist(clickW, e.a) < V.dist(clickW, e.b);
    const q = nearA ? rayHit(e.b, e.a) : rayHit(e.a, e.b);
    if (!q) return false;
    pushUndo();
    if (nearA) e.a = q; else e.b = q;
    return true;
  }
  if (e.type === 'poly' && !e.closed && e.pts.length >= 2) {
    const n = e.pts.length;
    const nearFirst = V.dist(clickW, e.pts[0]) < V.dist(clickW, e.pts[n - 1]);
    const q = nearFirst ? rayHit(e.pts[1], e.pts[0]) : rayHit(e.pts[n - 2], e.pts[n - 1]);
    if (!q) return false;
    pushUndo();
    if (nearFirst) e.pts[0] = q; else e.pts[n - 1] = q;
    return true;
  }
  if (e.type === 'arc') {
    const ints = circlePrimInts(e, boundary);
    if (!ints.length) return false;
    const ccw = e.ccw !== false;
    const nearA1 = angDist(Math.atan2(clickW[1]-e.c[1], clickW[0]-e.c[0]), e.a1) < angDist(Math.atan2(clickW[1]-e.c[1], clickW[0]-e.c[0]), e.a2);
    // pilih perpotongan terdekat di luar sweep saat ini, searah ujung yang diklik
    let best = null, bd = 1e18;
    for (const q of ints) {
      const a = Math.atan2(q[1] - e.c[1], q[0] - e.c[0]);
      if (angleInArc(a, e)) continue;
      const d = nearA1 ? angDist(a, e.a1) : angDist(a, e.a2);
      if (d < bd) { bd = d; best = a; }
    }
    if (best == null) return false;
    pushUndo();
    if (nearA1) e.a1 = best; else e.a2 = best;
    return true;
  }
  return false;
}
function circlePrimInts(arcEnt, boundary) {
  const out = [];
  for (const pr of entPrims(boundary)) {
    if (pr.kind === 'seg') out.push(...segCircleInt(pr.a, pr.b, arcEnt.c, arcEnt.r));
    else out.push(...circleCircleInt(arcEnt.c, arcEnt.r, pr.c, pr.r).filter(q => onArcPrim(q, pr)));
  }
  return out;
}
function angDist(a, b) { let d = Math.abs(normAng(a) - normAng(b)); return Math.min(d, 2 * Math.PI - d); }

reg('FILLET,F', 'Fillet dua garis (angka = radius)', () => startFilletChamfer(false));
reg('CHAMFER,CHA', 'Chamfer dua garis (angka = jarak)', () => startFilletChamfer(true));
function startFilletChamfer(isCham) {
  let r = isCham ? (settings.chamferD || 0) : (settings.filletR || 0);
  let first = null;
  setTool({
    name: isCham ? 'CHAMFER' : 'FILLET',
    hint: (isCham ? 'Jarak' : 'Radius') + ' = ' + fmt(r) + ' — ketik angka utk ubah, klik garis pertama',
    onNumber(n) {
      r = Math.max(0, n);
      if (isCham) settings.chamferD = r; else settings.filletR = r;
      this.hint = (isCham ? 'Jarak' : 'Radius') + ' = ' + fmt(r) + ' — klik garis pertama'; updToolHint();
    },
    onPoint() {
      const hit = pickAt(cursorRaw.slice());
      if (!hit || hit.type !== 'line') { toast('Pilih garis (LINE)'); return; }
      if (!first) { first = { e: hit, q: cursorRaw.slice() }; sel.clear(); sel.add(hit.id); this.hint = 'Klik garis kedua'; updToolHint(); redraw(); return; }
      if (hit.id === first.e.id) { toast('Garis harus berbeda'); return; }
      applyFilletChamfer(first.e, first.q, hit, cursorRaw.slice(), r, isCham);
      first = null; sel.clear();
      this.hint = 'Klik garis pertama (Enter selesai)'; updToolHint(); redraw();
    },
    onEnter() { sel.clear(); endTool(); },
    lastPt: () => null,
  });
}
function applyFilletChamfer(e1, q1, e2, q2, r, isCham) {
  const P = segInt(e1.a, e1.b, e2.a, e2.b, false);
  if (!P) { toast('Garis sejajar — tidak bisa fillet'); return; }
  const u1 = V.norm(V.sub(q1, P)), u2 = V.norm(V.sub(q2, P));
  if (!isFinite(u1[0]) || !isFinite(u2[0])) { toast('Klik terlalu dekat titik potong'); return; }
  const k1 = V.dot(V.sub(e1.a, P), u1) >= V.dot(V.sub(e1.b, P), u1) ? 'a' : 'b';
  const k2 = V.dot(V.sub(e2.a, P), u2) >= V.dot(V.sub(e2.b, P), u2) ? 'a' : 'b';
  const d1 = V.norm(V.sub(e1[k1], P)), d2v = V.norm(V.sub(e2[k2], P));
  if (r <= 1e-12) {   // sudut tajam
    pushUndo();
    if (k1 === 'a') e1.b = P.slice(); else e1.a = P.slice();
    if (k2 === 'a') e2.b = P.slice(); else e2.a = P.slice();
    redraw(); return;
  }
  if (isCham) {
    pushUndo();
    const T1 = V.add(P, V.mul(d1, r)), T2 = V.add(P, V.mul(d2v, r));
    if (k1 === 'a') e1.b = T1.slice(); else e1.a = T1.slice();
    if (k2 === 'a') e2.b = T2.slice(); else e2.a = T2.slice();
    addEnt({ ...cloneBase(e1), type: 'line', a: T1, b: T2 });
    redraw(); return;
  }
  const phi = Math.acos(clamp(V.dot(d1, d2v), -1, 1));
  if (phi < 1e-6 || Math.PI - phi < 1e-6) { toast('Sudut tidak valid'); return; }
  pushUndo();
  const t = r / Math.tan(phi / 2);
  const T1 = V.add(P, V.mul(d1, t)), T2 = V.add(P, V.mul(d2v, t));
  const c = V.add(P, V.mul(V.norm(V.add(d1, d2v)), r / Math.sin(phi / 2)));
  if (k1 === 'a') e1.b = T1.slice(); else e1.a = T1.slice();
  if (k2 === 'a') e2.b = T2.slice(); else e2.a = T2.slice();
  const a1 = Math.atan2(T1[1] - c[1], T1[0] - c[0]);
  const a2 = Math.atan2(T2[1] - c[1], T2[0] - c[0]);
  const ccw = V.cross(V.sub(T1, c), V.sub(T2, c)) > 0;
  addEnt({ ...cloneBase(e1), type: 'arc', c, r, a1, a2, ccw });
  redraw();
}

reg('RECORD,REC,AUDIO', 'Rekam catatan suara pada titik', () => {
  if (!navigator.mediaDevices || !window.MediaRecorder) { toast('Perekaman audio tidak didukung browser ini'); return; }
  setTool({
    name: 'RECORD', hint: 'Klik lokasi catatan suara',
    onPoint(p) {
      const ins = p.slice();
      endTool();
      openAudioRecorder(ins);
    },
    lastPt: () => null,
  });
});
let _rec = null, _recChunks = [], _recT0 = 0, _recTimer = null;
function openAudioRecorder(ins) {
  openModal('Rekam Suara', null, null, `
    <h3>Catatan Suara</h3>
    <p>Rekam catatan lapangan — tersimpan sebagai penanda 🔊 di gambar (layer MARKUP).</p>
    <div style="text-align:center;font-family:var(--mono);font-size:26px;margin:10px 0" id="recTime">00:00</div>
    <div class="mrow">
      <button class="btn pri" id="recStart">● Rekam</button>
      <button class="btn" id="recStop" disabled>■ Stop & Simpan</button>
    </div>
    <div class="mrow"><button class="btn full" onclick="closeModal()">Batal</button></div>
  `);
  const btnS = document.getElementById('recStart'), btnE = document.getElementById('recStop');
  btnS.onclick = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      _recChunks = [];
      _rec = new MediaRecorder(stream);
      _rec.ondataavailable = ev => { if (ev.data.size) _recChunks.push(ev.data); };
      _rec.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        const blob = new Blob(_recChunks, { type: _rec.mimeType || 'audio/webm' });
        const rd = new FileReader();
        rd.onload = () => {
          pushUndo(); ensureLayer('MARKUP', '#f59e0b');
          addEnt({ type: 'audio', layer: 'MARKUP', p: ins, src: rd.result, dur: Math.round((Date.now() - _recT0) / 1000) });
          redraw(); toast('Catatan suara tersimpan — pilih ikon 🔊 lalu buka Properti untuk memutar');
        };
        rd.readAsDataURL(blob);
      };
      _rec.start();
      _recT0 = Date.now();
      btnS.disabled = true; btnE.disabled = false;
      _recTimer = setInterval(() => {
        const s = Math.floor((Date.now() - _recT0) / 1000);
        const el = document.getElementById('recTime');
        if (el) el.textContent = String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
      }, 400);
    } catch (err) { toast('Mikrofon ditolak / tidak tersedia'); }
  };
  btnE.onclick = () => {
    clearInterval(_recTimer);
    if (_rec && _rec.state !== 'inactive') _rec.stop();
    closeModal();
  };
}

  setTool({

reg('ARCLEN,AL,ARCLENGTH', 'Ukur panjang busur / kurva', () => {
  setTool({
    name: 'ARCLEN', hint: 'Klik busur / lingkaran / polyline',
    onPoint() {
      const hit = pickAt(cursorRaw.slice());
      if (!hit) { toast('Tidak ada objek'); return; }
      let L = null;
      if (hit.type === 'arc') {
        let sweep = hit.a2 - hit.a1;
        const ccw = hit.ccw !== false;
        if (ccw) { while (sweep <= 0) sweep += 2 * Math.PI; } else { while (sweep >= 0) sweep -= 2 * Math.PI; }
        L = Math.abs(sweep) * hit.r;
      } else if (hit.type === 'circle') L = 2 * Math.PI * hit.r;
      else if (hit.type === 'poly') L = polyLen(hit.pts, hit.closed);
      else if (hit.type === 'ellipse') L = polyLen(ellipsePts(hit, 96), true);
      else if (hit.type === 'line') L = V.dist(hit.a, hit.b);
      if (L == null) { toast('Objek tidak punya panjang busur'); return; }
      const msg = 'Panjang = ' + fmtd(L) + ' ' + D.units + ' (' + hit.type.toUpperCase() + ')';
      logLine(msg, 'l-ok'); showMeasure(msg); toast(msg, 3200); pushResult('Panjang', msg);
    },
    onEnter() { endTool(); },
    lastPt: () => null,
  });
});

reg('MEASENT,ME,LIST,LI', 'Info lengkap satu objek', () => {
  setTool({
    name: 'ENTITY', hint: 'Klik objek yang diukur',
    onPoint() {
      const hit = pickAt(cursorRaw.slice());
      if (!hit) { toast('Tidak ada objek'); return; }
      let info = hit.type.toUpperCase() + ' · layer ' + hit.layer;
      if (hit.type === 'line') info += ' · L=' + fmtd(V.dist(hit.a, hit.b)) + ' · θ=' + fmt(deg(V.ang(hit.a, hit.b))) + '°';
      else if (hit.type === 'poly') { info += ' · L=' + fmtd(polyLen(hit.pts, hit.closed)); if (hit.closed) info += ' · A=' + fmtA(Math.abs(polyArea(hit.pts))); }
      else if (hit.type === 'circle') info += ' · R=' + fmtd(hit.r) + ' · A=' + fmtA(Math.PI * hit.r * hit.r) + ' · K=' + fmtd(2 * Math.PI * hit.r);
      else if (hit.type === 'arc') { let sw = hit.a2 - hit.a1; if (hit.ccw !== false) { while (sw <= 0) sw += 2 * Math.PI; } else { while (sw >= 0) sw -= 2 * Math.PI; } info += ' · R=' + fmtd(hit.r) + ' · sudut=' + fmt(Math.abs(deg(sw))) + '° · L=' + fmtd(Math.abs(sw) * hit.r); }
      else if (hit.type === 'ellipse') info += ' · a=' + fmtd(V.len(hit.a)) + ' · b=' + fmtd(V.len(hit.a) * hit.ratio);
      else if (hit.type === 'text') info += ' · "' + (hit.text || '').slice(0, 24) + '" · h=' + fmt(hit.h);
      const msg = info;
      logLine(msg, 'l-ok'); showMeasure(msg); pushResult('Entity', msg);
    },
    onEnter() { endTool(); },
    lastPt: () => null,
  });
});

   DIMENSI LANJUTAN — LINEAR, ANGULAR, RADIUS, DIAMETER, ARC LENGTH
   ===================================================================== */
reg('DIMLINEAR,DLI', 'Dimensi linear horizontal/vertikal', () => {
  const pts = [];
  setTool({
    name: 'DIMLINEAR', hint: 'Klik titik pertama',
    onPoint(p) {
      pts.push(p.slice());
      this.hint = pts.length === 1 ? 'Klik titik kedua' : 'Tarik: atas/bawah = horizontal, samping = vertikal';
      updToolHint();
      if (pts.length === 3) {
        const mode = linMode(pts[0], pts[1], pts[2]);
        pushUndo();
        addEnt({ type: 'dim', mode, p1: pts[0], p2: pts[1], off: pts[2], text: '<>' });
        endTool();
      }
    },
    preview(g, cur) {
      if (pts.length === 1) { const a = W2S(pts[0]), b = W2S(cur); g.beginPath(); g.moveTo(a[0],a[1]); g.lineTo(b[0],b[1]); g.stroke(); }
      else if (pts.length === 2) {
        const tmp = { type: 'dim', mode: linMode(pts[0], pts[1], cur), p1: pts[0], p2: pts[1], off: cur, text: '<>', layer: D.clayer, color: 'bylayer' };
        drawEnt(g, tmp, null, true);
      }
    },
    lastPt() { return pts.length ? pts[pts.length - 1] : null; },
  });
});
function linMode(p1, p2, off) {
  const mid = V.mid(p1, p2);
  return Math.abs(off[1] - mid[1]) >= Math.abs(off[0] - mid[0]) ? 'h' : 'v';
}

reg('DIMANGULAR,DAN', 'Dimensi sudut antara 2 garis', () => {
  let l1 = null, l2 = null;
  setTool({
    name: 'DIMANGULAR', hint: 'Klik garis pertama',
    onPoint(p) {
      if (!l1 || !l2) {
        const hit = pickAt(cursorRaw.slice());
        if (!hit || hit.type !== 'line') { toast('Pilih garis (LINE)'); return; }
        if (!l1) { l1 = { e: hit, q: p.slice() }; this.hint = 'Klik garis kedua'; updToolHint(); sel.add(hit.id); redraw(); return; }
        if (hit.id === l1.e.id) { toast('Garis harus berbeda'); return; }
        l2 = { e: hit, q: p.slice() }; this.hint = 'Klik posisi busur dimensi'; updToolHint(); sel.add(hit.id); redraw(); return;
      }
      const P = segInt(l1.e.a, l1.e.b, l2.e.a, l2.e.b, false);
      if (!P) { toast('Garis sejajar'); endTool(); return; }
      const u1 = V.norm(V.sub(l1.q, P)), u2 = V.norm(V.sub(l2.q, P));
      const a1 = Math.atan2(u1[1], u1[0]), a2 = Math.atan2(u2[1], u2[0]);
      // arah sweep: yang memuat titik klik posisi
      const ap = Math.atan2(p[1] - P[1], p[0] - P[0]);
      const ccw = angleInArc(ap, { a1, a2, ccw: true });
      pushUndo(); sel.clear();
      addEnt({ type: 'dimang', p: P, a1, a2, ccw, r: Math.max(1e-9, V.dist(p, P)) });
      endTool();
    },
    preview(g, cur) {
      if (l1 && l2) {
        const P = segInt(l1.e.a, l1.e.b, l2.e.a, l2.e.b, false);
        if (!P) return;
        const s = W2S(P);
        g.beginPath(); g.arc(s[0], s[1], V.dist(cur, P) * view.s, 0, 2 * Math.PI); g.stroke();
      }
    },
    onEnter() { sel.clear(); endTool(); },
    lastPt: () => null,
  });
});

reg('DIMRADIUS,DRA', 'Dimensi radius lingkaran/busur', () => startRadDim(false));
reg('DIMDIAMETER,DDI', 'Dimensi diameter lingkaran/busur', () => startRadDim(true));
function startRadDim(isDia) {
  let src = null;
  setTool({
    name: isDia ? 'DIMDIAMETER' : 'DIMRADIUS', hint: 'Klik lingkaran / busur',
    onPoint(p) {
      if (!src) {
        const hit = pickAt(cursorRaw.slice());
        if (!hit || (hit.type !== 'circle' && hit.type !== 'arc')) { toast('Pilih lingkaran/busur'); return; }
        src = hit; this.hint = 'Klik posisi teks dimensi'; updToolHint(); sel.add(hit.id); redraw(); return;
      }
      pushUndo(); sel.clear();
      addEnt({ type: 'dimrad', c: src.c.slice(), r: src.r, pos: p.slice(), dia: isDia });
      endTool();
    },
    preview(g, cur) {
      if (!src) return;
      const dir = V.norm(V.sub(cur, src.c));
      if (!isFinite(dir[0])) return;
      const tip = V.add(src.c, V.mul(dir, src.r));
      const a = W2S(cur), b = W2S(tip);
      g.beginPath(); g.moveTo(a[0], a[1]); g.lineTo(b[0], b[1]); g.stroke();
    },
    onEnter() { sel.clear(); endTool(); },
    lastPt: () => null,
  });
}

reg('DIMARC,DAR', 'Dimensi panjang busur', () => {
  let src = null;
  setTool({
    name: 'DIMARC', hint: 'Klik busur',
    onPoint(p) {
      if (!src) {
        const hit = pickAt(cursorRaw.slice());
        if (!hit || hit.type !== 'arc') { toast('Pilih busur (ARC)'); return; }
        src = hit; this.hint = 'Klik posisi busur dimensi'; updToolHint(); sel.add(hit.id); redraw(); return;
      }
      pushUndo(); sel.clear();
      addEnt({ type: 'dimarc', c: src.c.slice(), r: src.r, a1: src.a1, a2: src.a2, ccw: src.ccw !== false, roff: Math.max(src.r * 1.05, V.dist(p, src.c)) });
      endTool();
    },
    preview(g, cur) {
      if (!src) return;
      const s = W2S(src.c);
      g.beginPath(); g.arc(s[0], s[1], Math.max(src.r * 1.05, V.dist(cur, src.c)) * view.s, -src.a1, -src.a2, src.ccw !== false); g.stroke();
    },
    onEnter() { sel.clear(); endTool(); },
    lastPt: () => null,
  });
});

  onSelChange(); syncSpaceChip(); zoomExtents();
  toast('Ruang kerja: ' + name);
}
