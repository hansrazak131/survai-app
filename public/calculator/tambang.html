<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kalkulator Mining</title>
<style>
:root{
  --purple:#7025df;--purple2:#9b4fc8;--orange:#ff5d46;--gold:#ffc928;
  --text:#172033;--muted:#647084;--card:#ffffff;--line:#ece5f4;
  --shadow:0 22px 55px rgba(86,41,132,.16);--shadow2:0 16px 34px rgba(24,35,62,.10);
  --navy:#ffffff;--navy2:#fbf7ff;--navy3:#ffffff;--ok:#1db954;--warn:#ff9b2f;--bad:#ff5d46;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(600px 320px at 7% 20%,rgba(221,190,255,.45),transparent 65%),radial-gradient(500px 260px at 86% 18%,rgba(255,176,221,.35),transparent 60%),linear-gradient(180deg,#fbf9ff 0,#f4edf8 55%,#f8f7fb 100%)}
.app{max-width:1180px;margin:0 auto;min-height:100vh;padding-bottom:38px}
.hero{position:relative;margin:0 8px;padding:22px 26px 28px;color:#fff;background:linear-gradient(135deg,var(--purple2) 0%,var(--purple) 62%,#6d21de 100%);box-shadow:0 28px 60px rgba(101,37,194,.28);overflow:hidden}
.hero:before{content:"";position:absolute;inset:auto -70px -140px auto;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.22),transparent 65%)}
.hero-row{position:relative;display:flex;align-items:center;gap:18px}
.back{width:72px;height:72px;border-radius:24px;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.16);display:grid;place-items:center;font-size:42px;font-weight:300;color:#111827;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,.25)}
.hero-kicker{font-weight:950;letter-spacing:3.5px;font-size:15px;opacity:.78;margin-bottom:2px}
.hero h1{font-size:48px;line-height:.95;margin:0;font-weight:1000;letter-spacing:-1.8px;text-shadow:0 3px 0 rgba(0,0,0,.05)}
.hero p{font-size:20px;margin:12px 0 0;opacity:.92}
.hero-logo{margin-left:auto;width:68px;height:68px;border-radius:26px;background:linear-gradient(145deg,rgba(255,255,255,.18),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.25);display:grid;place-items:center;box-shadow:inset 0 0 0 8px rgba(255,255,255,.08)}
.hero-dot{width:26px;height:26px;border-radius:50%;background:var(--orange);box-shadow:0 0 30px rgba(255,93,70,.85)}
.content{padding:0 26px}
.screen{display:none}.screen.active{display:block}
.info-card{position:relative;margin:0 0 24px;border-radius:28px;padding:22px 24px;background:linear-gradient(135deg,#fff7d8,#fff);border:1px solid rgba(255,201,40,.42);box-shadow:0 12px 28px rgba(255,201,40,.13)}
.info-card b{display:block;color:#a77100;font-size:18px;letter-spacing:1.6px;font-weight:1000;margin-bottom:8px}
.info-card p{margin:0;color:#4d5868;font-size:16px;font-weight:700;line-height:1.45}
.close-info{position:absolute;right:17px;top:13px;border:0;background:rgba(255,201,40,.15);color:#a77100;border-radius:15px;width:36px;height:36px;font-size:22px;font-weight:800;cursor:pointer}
.home-grid{display:grid;gap:20px;margin-top:0;transform:translateY(-1px)}
@media(min-width:760px){.home-grid{grid-template-columns:1fr 1fr}}
.menu-card{position:relative;display:grid;grid-template-columns:74px 1fr auto auto;align-items:center;gap:18px;background:var(--card);border:1px solid rgba(255,255,255,.92);border-radius:32px;padding:25px 24px 25px 20px;box-shadow:var(--shadow);min-height:132px;cursor:pointer;transition:.22s ease;overflow:hidden}
.menu-card:before{content:"";position:absolute;inset:0;background:linear-gradient(110deg,rgba(151,75,209,.07),transparent 50%);opacity:0;transition:.25s}
.menu-card:hover{transform:translateY(-3px);box-shadow:0 30px 70px rgba(86,41,132,.22)}
.menu-card:hover:before{opacity:1}
.icon-box{width:74px;height:74px;border-radius:22px;display:grid;place-items:center;font-size:34px;border:1px solid #ece9f2;background:linear-gradient(145deg,#fff8f2,#f7efff);box-shadow:0 14px 28px rgba(45,36,66,.08)}
.icon-box.gold{background:linear-gradient(145deg,#fff8e2,#fff2bf)}
.icon-box.green{background:linear-gradient(145deg,#f4fff7,#def8e5)}
.icon-box.blue{background:linear-gradient(145deg,#f4f7ff,#e2ebff)}
.icon-box.pink{background:linear-gradient(145deg,#fff4fb,#f5e2ff)}
.menu-title{font-size:29px;font-weight:1000;color:#05060a;line-height:1;letter-spacing:-.8px;margin-bottom:10px}
.menu-desc{font-size:18px;line-height:1.35;color:#465366;font-weight:650}
.star,.chev{font-size:34px;color:#647084;font-weight:300;z-index:1}
.chev{font-weight:900}
.top-mini{display:flex;align-items:center;gap:12px;margin:20px 0 14px;flex-wrap:wrap}
.top-mini .back{width:46px;height:46px;border-radius:16px;font-size:32px;color:#fff;background:linear-gradient(135deg,var(--purple2),var(--purple))}
.tool-shell{background:rgba(255,255,255,1);border:1px solid rgba(255,255,255,.9);border-radius:34px;padding:18px;box-shadow:var(--shadow);}
.tabs{display:flex;gap:10px;overflow:auto;padding:4px 2px 15px}
.tab{white-space:nowrap;border:1px solid #eadff6;background:#fff;color:#61397f;padding:12px 16px;border-radius:999px;font-weight:900;letter-spacing:.5px;box-shadow:0 7px 18px rgba(86,41,132,.08);cursor:pointer;user-select:none}
.tab.active{background:linear-gradient(135deg,var(--purple2),var(--purple));color:#fff;border-color:transparent}
.panel{background:#fff;border:1px solid #efe8f5;border-radius:28px;padding:22px;box-shadow:var(--shadow2);margin-bottom:18px}
.placeholder{border:1px dashed #d9c9ee;background:linear-gradient(135deg,#fff,#fbf7ff);border-radius:26px;padding:26px;text-align:center}
.placeholder-icon{width:86px;height:86px;margin:0 auto 14px;border-radius:28px;display:grid;place-items:center;background:linear-gradient(145deg,#fff8f2,#f7efff);font-size:42px;border:1px solid #ece9f2;box-shadow:0 14px 28px rgba(45,36,66,.08)}
.placeholder h2{margin:0 0 10px;font-size:30px;font-weight:1000;color:#111827}
.placeholder p{max-width:680px;margin:0 auto;color:#647084;font-size:17px;line-height:1.5;font-weight:700}
.module-note{margin-top:18px;text-align:left;background:linear-gradient(135deg,#fff7d8,#fff);border:1px solid rgba(255,201,40,.44);border-radius:22px;padding:18px}
.module-note b{color:#a77100;letter-spacing:1.2px}
.module-note ul{margin:10px 0 0;padding-left:20px;color:#465366;font-weight:750;line-height:1.55}
.btn-row{display:grid;gap:12px;margin-top:18px}
@media(min-width:760px){.btn-row{grid-template-columns:1fr 1fr}}
.btn{border:0;border-radius:20px;min-height:58px;padding:0 18px;font-weight:1000;letter-spacing:1px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;font-size:16px;box-shadow:0 16px 28px rgba(70,38,116,.14)}
.btn.primary{background:linear-gradient(135deg,#ffd43e,#ffbf19);color:#17120b}
.btn.dark{background:linear-gradient(135deg,#263451,#141b2d);color:#fff}
.btn.ghost{background:#f7f1ff;color:#6930b5;border:1px solid #e7d9ff;box-shadow:none}
.lock-note{display:inline-flex;align-items:center;gap:7px;padding:9px 12px;border-radius:999px;background:#f3ecff;color:#6930b5;font-weight:950;font-size:12px;margin-top:0}
.lock-note.ready{background:#ebfff2;color:#0c8c42}
.ob-grid{display:grid;gap:18px}
@media(min-width:980px){.ob-grid{grid-template-columns:1.15fr .85fr}}
.ob-card{background:linear-gradient(135deg,#ffffff 0%,#fbf7ff 58%,#fff8df 100%);border-radius:28px;padding:18px;border:1px solid rgba(112,37,223,.12);box-shadow:var(--shadow);color:#172033}
.ob-card h3{margin:0 0 14px;font-size:22px;letter-spacing:.2px}
.ob-card p{margin:0;color:#647084;line-height:1.5;font-weight:650}
.form-stack{display:grid;gap:14px;margin-top:14px}
.field{position:relative}
.field input{width:100%;border:1.5px solid #eadff6;background:#ffffff;color:#172033;border-radius:18px;padding:24px 16px 16px;font-size:22px;outline:none;transition:.18s;box-shadow:inset 0 1px 0 rgba(255,255,255,.65),0 10px 22px rgba(86,41,132,.06)}
.field input:focus{border-color:rgba(112,37,223,.55);box-shadow:0 0 0 4px rgba(112,37,223,.10),0 10px 24px rgba(86,41,132,.10)}
.field label{position:absolute;left:14px;top:9px;color:#61397f;font-size:13px;letter-spacing:.8px;font-weight:900;text-transform:uppercase}
.field small{display:block;color:#647084;margin-top:7px;font-size:12px;line-height:1.4;padding-left:2px;font-weight:650}
.form-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px}
.form-actions .btn{min-height:54px;border-radius:16px;font-size:14px;padding:0 12px}
.ob-note{margin-top:15px;background:linear-gradient(135deg,#fff7d8,#fff);border:1px solid rgba(255,201,40,.36);border-radius:18px;padding:14px;color:#4d5868;font-size:13px;line-height:1.5;font-weight:650}
.kpi-grid{display:grid;gap:14px}
.kpi{background:#fff;border:1px solid #eee5f8;border-radius:22px;padding:18px;box-shadow:var(--shadow2)}
.kpi .label{font-size:12px;font-weight:900;letter-spacing:1.1px;color:#7a6a94;text-transform:uppercase}
.kpi .value{font-size:32px;font-weight:1000;color:#101626;margin:7px 0 2px;line-height:1}
.kpi .meta{color:#627086;font-size:13px;font-weight:700}
.analysis-card,.chart-card,.report-card,.formula-card{background:#fff;border:1px solid #eee5f8;border-radius:24px;padding:18px;box-shadow:var(--shadow2)}
.analysis-card h4,.chart-card h4,.report-card h4,.formula-card h4{margin:0 0 12px;font-size:18px;color:#111827}
.analysis-list{display:grid;gap:10px}
.analysis-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:16px;background:#f8f5ff;border:1px solid #eee5f8}
.analysis-dot{width:12px;height:12px;border-radius:50%;margin-top:4px;flex:0 0 12px}
.analysis-text b{display:block;margin-bottom:3px}
.analysis-text{font-size:14px;color:#445064;line-height:1.45;font-weight:650}
.badge{display:inline-flex;align-items:center;gap:6px;padding:8px 11px;border-radius:999px;font-weight:900;font-size:12px;letter-spacing:.5px;text-transform:uppercase;background:#f2ebff;color:#6f3ab8}
.badge.ok{background:#ebfff2;color:#0b8a3f}
.badge.warn{background:#fff6e8;color:#ba6b00}
.badge.danger{background:#fff0ed;color:#bf422e}
.bar-list{display:grid;gap:13px}
.bar-row{display:grid;grid-template-columns:84px 1fr auto;align-items:center;gap:12px}
.bar-row span{font-weight:900;color:#314056;font-size:13px;letter-spacing:.7px}
.bar-track{position:relative;height:12px;border-radius:999px;background:#eee8fa;overflow:hidden}
.bar-fill{position:absolute;inset:0 auto 0 0;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--purple2),var(--purple))}
.bar-fill.gold{background:linear-gradient(90deg,#ffd54f,#ffb300)}
.bar-fill.orange{background:linear-gradient(90deg,#ff8a65,#ff5d46)}
.bar-val{font-size:13px;color:#4d5870;font-weight:900}
.impact-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.impact-box{background:#f7f3ff;border:1px solid #ece4fb;border-radius:18px;padding:14px}
.impact-box .big{display:block;font-size:22px;font-weight:1000;color:#161a28;margin-top:4px}
.report-text{background:#f8f5ff;border:1px solid #eee5f8;border-radius:18px;padding:14px;color:#445064;line-height:1.65;font-size:14px;font-weight:650;white-space:pre-line}
.ref-list{display:grid;gap:10px}
.ref-item{padding:14px 16px;background:#faf7ff;border:1px solid #eee5f8;border-radius:18px}
.ref-item b{display:block;color:#111827;margin-bottom:6px}
.ref-item p{margin:0;color:#4a566d;font-size:14px;line-height:1.5;font-weight:650}
.tab-panel{display:none}
.tab-panel.active{display:block}
.hidden{display:none!important}
@media(max-width:640px){
  .hero{padding:20px 24px 26px}.hero h1{font-size:42px}.hero p{font-size:18px}.hero-logo{display:none}
  .content{padding:0 18px}.menu-card{grid-template-columns:74px 1fr auto;gap:16px;padding:22px 18px;border-radius:28px}.star{display:none}.menu-title{font-size:28px}.menu-desc{font-size:17px}.tool-shell{padding:14px;border-radius:28px}.panel{padding:18px;border-radius:24px}
  .lock-note{display:none}.field input{font-size:18px}.form-actions{grid-template-columns:1fr}.kpi .value{font-size:27px}.bar-row{grid-template-columns:72px 1fr}.bar-val{grid-column:2/4}.impact-grid{grid-template-columns:1fr}
}

.converter-embed-wrap{border-radius:30px;overflow:hidden;background:#fff;border:1px solid #efe8f5;box-shadow:var(--shadow2)}
.converter-iframe{width:100%;min-height:82vh;border:0;display:block;background:#f8f3fb}
.converter-reco-grid{display:grid;gap:12px;margin-top:14px}
@media(min-width:860px){.converter-reco-grid{grid-template-columns:repeat(3,1fr)}}
.converter-reco{background:linear-gradient(135deg,#fff,#fbf7ff);border:1px solid #eee5f8;border-radius:20px;padding:16px;color:#465366;font-weight:700;line-height:1.5}
.converter-reco b{display:block;color:#111827;margin-bottom:6px;font-size:15px}
.converter-status-list{display:grid;gap:10px;margin-top:12px}
.converter-status-list .analysis-item{background:#fbf8ff}


/* Konverter compact embedded mode */
.tool-screen-konverter .top-mini{display:none!important}
.tool-screen-konverter .tool-shell{
  padding:0!important;
  border:0!important;
  box-shadow:none!important;
  background:transparent!important;
  backdrop-filter:none!important;
}
.tool-screen-konverter .content{padding-top:0}
.converter-embed-wrap{
  height:calc(100vh - 118px);
  min-height:720px;
  border-radius:28px;
  overflow:hidden;
  border:1px solid rgba(112,37,223,.10);
  box-shadow:var(--shadow);
  background:#fff;
}
.converter-iframe{
  width:100%;
  height:100%;
  border:0;
  display:block;
  background:#fff;
}
@media(max-width:640px){
  .tool-screen-konverter .content{padding:0 10px}
  .converter-embed-wrap{height:calc(100vh - 96px);min-height:650px;border-radius:22px}
}


.alert-box{border-radius:20px;padding:16px 18px;margin:14px 0;font-weight:800;line-height:1.45;border:1px solid}
.alert-box.ok{background:#ebfff2;color:#0b8a3f;border-color:#b9f3cc}
.alert-box.warn{background:#fff7e8;color:#ba6b00;border-color:#ffe0aa}
.alert-box.danger{background:#fff0ed;color:#bf422e;border-color:#ffc9bf}



/* PATCH: Header utama ungu pada halaman Kalkulator Mining disembunyikan.
   Rumus dan fungsi JavaScript tidak diubah. Elemen judul tetap ada di DOM
   agar script yang memakai mainTitle/mainSubtitle tetap aman. */
body > .app > header.hero{
  display:none!important;
}
body > .app > main.content{
  padding-top:24px;
}
@media(max-width:640px){
  body > .app > main.content{
    padding-top:18px;
  }
}
</style>
<link rel="stylesheet" href="../shared-home-theme.css" />
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="hero-row">
      <button class="back" onclick="showHome()" aria-label="Kembali">‹</button>
      <div>
        <div class="hero-kicker">TOOLS</div>
        <h1 id="mainTitle">Kalkulator Mining</h1>
        <p id="mainSubtitle">Volume, tonase, hauling, grade jalan, koordinat, dan utilitas tambang</p>
      </div>
      <div class="hero-logo"><div class="hero-dot"></div></div>
    </div>
  </header>

  <main class="content">
    <section id="homeScreen" class="screen active">
      <div class="info-card" id="infoCard">
        <button class="close-info" onclick="document.getElementById('infoCard').style.display='none'">×</button>
        <b>GUNAKAN KALKULATOR SESUAI KEBUTUHAN</b>
        <p>Pilih menu kalkulator mining sesuai kebutuhan operasional, estimasi teknis, atau pengambilan keputusan di lapangan.</p>
      </div>

      <div id="homeGrid" class="home-grid"></div>
    </section>

    <section id="toolScreen" class="screen">
      <div class="top-mini">
        <button class="back" onclick="showHome()">‹</button>
        <strong id="toolMiniTitle">Menu</strong>
        <span class="lock-note" id="toolStatus">BELUM DIISI</span>
      </div>
      <div class="tool-shell">
        <div class="tabs" id="toolTabs"></div>
        <div id="toolContent"></div>
      </div>
    </section>
  </main>
</div>


<script>
const MENUS = [
  {title:'OB Volume', icon:'⛰️', color:'gold', desc:'Hitung volume overburden bank dan loose', tags:'ob volume overburden bank loose bcm lcm volume tambang'},
  {title:'Tonase Coal/Ore', icon:'🪨', color:'green', desc:'Estimasi tonase ROM dan clean coal/ore', tags:'tonase coal ore rom clean coal ton density batu bara bijih recovery sr stripping ratio'},
  {title:'Stripping Ratio', icon:'▰', color:'blue', desc:'Evaluasi rasio pengupasan OB terhadap coal/ore', tags:'stripping ratio sr pengupasan ob coal ore bcm ton'},
  {title:'Hauling Cycle', icon:'🚚', color:'pink', desc:'Hitung siklus, trip, dan potensi produksi hauling', tags:'hauling cycle truck trip produksi ritase jarak speed'},
  {title:'Road Grade', icon:'📈', color:'blue', desc:'Evaluasi grade jalan dan statusnya', tags:'road grade jalan tanjakan slope persen elevasi jarak'},
  {title:'Clinometer', icon:'🧭', color:'gold', desc:'Slope bench dan strike dip batu bara', tags:'clinometer slope bench strike dip batu bara kemiringan'},
  {title:'Cut & Fill', icon:'⛏️', color:'green', desc:'Volume cut, fill, dan net balance', tags:'cut fill volume galian timbunan balance earthwork'},
  {title:'Konverter Koordinat', icon:'▣', color:'blue', desc:'Konversi LatLong, UTM, dan DMS', tags:'koordinat coordinate converter lat long utm dms mgrs'},
  {title:'Air Limpasan', icon:'🌧️', color:'gold', desc:'Estimasi debit limpasan permukaan', tags:'air limpasan runoff debit hujan catchment drainase'}
];

let currentMenuIndex = null;
let currentTab = 'input';
let currentResult = null;

const grid = document.getElementById('homeGrid');
const toolTabs = document.getElementById('toolTabs');
const toolContent = document.getElementById('toolContent');
const statusPill = document.getElementById('toolStatus');

function formatNum(value, digits=2){
  return Number(value).toLocaleString('id-ID',{minimumFractionDigits:digits,maximumFractionDigits:digits});
}

function renderMenus(list=MENUS){
  grid.innerHTML = list.map((m,i)=>`
    <article class="menu-card" onclick="openTool(${i})">
      <div class="icon-box ${m.color}">${m.icon}</div>
      <div><div class="menu-title">${m.title}</div><div class="menu-desc">${m.desc}</div></div>
      <div class="star">☆</div><div class="chev">›</div>
    </article>`).join('');
}

function setTabs(tabs){
  toolTabs.style.display = tabs.length ? 'flex' : 'none';
  toolTabs.innerHTML = tabs.map(tab => `<div class="tab ${tab.id===currentTab?'active':''}" data-tab="${tab.id}" onclick="activateTab('${tab.id}')">${tab.label}</div>`).join('');
}

function activateTab(tabId){
  currentTab = tabId;
  toolTabs.querySelectorAll('.tab').forEach(tab => tab.classList.toggle('active', tab.dataset.tab === currentTab));
  toolContent.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.panel === currentTab));
}

function setActiveStatus(active=true){
  statusPill.textContent = active ? 'AKTIF' : 'BELUM DIISI';
  statusPill.classList.toggle('ready', active);
}

function openTool(index){
  currentMenuIndex = index;
  currentResult = null;
  const m = MENUS[index];
  document.getElementById('homeScreen').classList.remove('active');
  document.getElementById('toolScreen').classList.add('active');
  document.getElementById('toolScreen').classList.toggle('tool-screen-konverter', m.title === 'Konverter Koordinat');
  document.getElementById('mainTitle').textContent = m.title;
  document.getElementById('mainSubtitle').textContent = m.desc;
  document.getElementById('toolMiniTitle').textContent = m.title;
  currentTab = 'input';

  if(m.title === 'OB Volume'){
    setActiveStatus(true);
    renderOBVolume();
  }else if(m.title === 'Tonase Coal/Ore'){
    setActiveStatus(true);
    renderTonaseCoalOre();
  }else if(m.title === 'Hauling Cycle'){
    setActiveStatus(true);
    renderHaulingCycle();
  }else if(m.title === 'Road Grade'){
    setActiveStatus(true);
    renderRoadGrade();
  }else if(m.title === 'Cut & Fill'){
    setActiveStatus(true);
    renderCutFill();
  }else if(m.title === 'Konverter Koordinat'){
    setActiveStatus(true);
    renderKonverterKoordinat();
  }else if(m.title === 'Stripping Ratio'){
    setActiveStatus(true);
    renderStrippingRatio();
  }else if(m.title === 'Clinometer'){
    setActiveStatus(true);
    renderClinometer();
  }else if(m.title === 'Air Limpasan'){
    setActiveStatus(true);
    renderAirLimpasan();
  }else{
    setActiveStatus(false);
    renderPlaceholder(m);
  }
  window.scrollTo({top:0,behavior:'auto'});
}

function showHome(){
  document.getElementById('homeScreen').classList.add('active');
  document.getElementById('toolScreen').classList.remove('active');
  document.getElementById('toolScreen').classList.remove('tool-screen-konverter');
  document.getElementById('mainTitle').textContent = 'Kalkulator Mining';
  document.getElementById('mainSubtitle').textContent = 'Volume, tonase, hauling, grade jalan, koordinat, dan utilitas tambang';
  window.scrollTo({top:0,behavior:'auto'});
}

abel><input id=\"crs_to\" value=\"23834\"></div>\n      </div>\n      <div class=\"row\">\n        <div><label>X / Easting / Longitude</label><input id=\"crs_x\" type=\"number\" step=\"any\" placeholder=\"\"></div>\n        <div><label>Y / Northing / Latitude</label><input id=\"crs_y\" type=\"number\" step=\"any\" placeholder=\"\"></div>\n      </div>\n      <div class=\"row\">\n        <div><label>Proj4 From manual optional</label><textarea id=\"proj_from\" placeholder=\"+proj=... +datum=... +units=m +no_defs\"></textarea></div>\n        <div><label>Proj4 To manual optional</label><textarea id=\"proj_to\" placeholder=\"+proj=... +datum=... +units=m +no_defs\"></textarea></div>\n      </div>\n      <div class=\"btns\">\n        <button class=\"btn-primary\" onclick=\"convertCRS()\">Convert CRS</button>\n        <button class=\"btn-ghost\" onclick=\"swapCRS()\">Swap</button>\n      </div>\n    </section>\n\n    <!-- 7. UTM ZONE -->\n    <section class=\"tool card hidden\" id=\"tool-zone\">\n      <h3><span class=\"icon\">↔️</span>7. UTM Zone Converter between UTM Zones WGS84</h3>\n      <div class=\"row3\">\n        <div><label>Input Easting</label><input id=\"zone_e\" type=\"number\" step=\"any\"></div>\n        <div><label>Input Northing</label><input id=\"zone_n\" type=\"number\" step=\"any\"></div>\n        <div><label>Hemisphere</label><select id=\"zone_hemi\"><option value=\"S\">S</option><option value=\"N\">N</option></select></div>\n      </div>\n      <div class=\"row\">\n        <div><label>From Zone</label><input id=\"zone_from\" type=\"number\" value=\"48\"></div>\n        <div><label>To Zone</label><input id=\"zone_to\" type=\"number\" value=\"49\"></div>\n      </div>\n      <button class=\"btn-primary\" onclick=\"convertUTMZone()\">Convert Zone</button>\n    </section>\n\n    <!-- 8A. HELMERT -->\n    <section class=\"tool card hidden\" id=\"tool-helmert\">\n      <h3><span class=\"icon\">↔️</span>8A. Global Coordinate Transformation - 2D Helmert 4 Parameter</h3>\n      <div class=\"notice\">Input minimal 2 point. 3 point atau lebih direkomendasikan untuk residual dan RMSE.</div>\n      <div class=\"btns\"><button class=\"btn-green\" onclick=\"addHelmertPoint()\">+ Add Point</button><button class=\"btn-primary\" onclick=\"solveHelmert()\">Hitung Helmert</button></div>\n      <div id=\"helmertPoints\"></div>\n      <h3 style=\"font-size:18px;margin-top:20px\">Test Transformation Source → Target</h3>\n      <div class=\"row\"><div><label>Source X</label><input id=\"helm_test_x\" type=\"number\" step=\"any\" value=\"0\"></div><div><label>Source Y</label><input id=\"helm_test_y\" type=\"number\" step=\"any\" value=\"0\"></div></div>\n      <button class=\"btn-primary\" onclick=\"testHelmert()\">Convert to Target</button>\n    </section>\n\n    <!-- 8B. BURSA WOLF -->\n    <section class=\"tool card hidden\" id=\"tool-bursa\">\n      <h3><span class=\"icon\">🌍</span>8B. Global Coordinate Transformation - 3D Bursa-Wolf 7 Parameter</h3>\n      <div class=\"notice\">Input minimal 3 point. 4 point atau lebih direkomendasikan untuk residual, DOF, RMSE.</div>\n      <div class=\"btns\"><button class=\"btn-green\" onclick=\"addBursaPoint()\">+ Add Point</button><button class=\"btn-primary\" onclick=\"solveBursa()\">Hitung Bursa-Wolf</button></div>\n      <div id=\"bursaPoints\"></div>\n      <h3 style=\"font-size:18px;margin-top:20px\">Test Transformation Source → Target</h3>\n      <div class=\"row3\"><div><label>X</label><input id=\"bursa_test_x\" type=\"number\" step=\"any\" value=\"0\"></div><div><label>Y</label><input id=\"bursa_test_y\" type=\"number\" step=\"any\" value=\"0\"></div><div><label>Z</label><input id=\"bursa_test_z\" type=\"number\" step=\"any\" value=\"0\"></div></div>\n      <button class=\"btn-primary\" onclick=\"testBursa()\">Convert to Target</button>\n    </section>\n\n    <!-- 9. HEIGHT -->\n    <section class=\"tool card hidden\" id=\"tool-height\">\n      <h3><span class=\"icon\">⇅</span>9. Height & Undulation</h3>\n      <div class=\"segment\">\n        <button id=\"heightCalcTab\" class=\"active\" onclick=\"heightTab('calc')\">▣ Calculate</button>\n        <button id=\"heightModelTab\" onclick=\"heightTab('model')\">🌐 Geoid Model <span id=\"heightModelDot\">●</span></button>\n      </div>\n\n      <div id=\"heightCalcPanel\">\n        <div id=\"heightInstallAlert\" class=\"geo-alert\">\n          <span>ⓘ</span>\n          <div><b>Geoid model belum terpasang</b>Download model geoid melalui internet atau restore/import dari file backup. Jika sudah tahu nilai N, tetap bisa isi manual.</div>\n        </div>\n\n        <div class=\"row\">\n          <div><label>Project</label><input id=\"h_project\" placeholder=\"e.g. Benchmark survey\"></div>\n          <div><label>Point ID</label><input id=\"h_id\" placeholder=\"e.g. BM-01\"></div>\n        </div>\n\n        <div class=\"card\" style=\"box-shadow:none;border:1px solid #f0e9f4;margin-top:18px;padding:18px\">\n          <div class=\"location-title\">\n            <h3 style=\"margin:0\"><span class=\"icon\">⌖</span>Position</h3>\n            <button class=\"locate-btn\" onclick=\"usePhoneLocation()\" title=\"Ambil lokasi HP otomatis\">⌾</button>\n          </div>\n          <div class=\"row\">\n            <div><label>Latitude (deg)</label><input id=\"h_lat\" type=\"number\" step=\"any\" placeholder=\"-6.0053411\"></div>\n            <div><label>Longitude (deg)</label><input id=\"h_lon\" type=\"number\" step=\"any\" placeholder=\"106.2830197\"></div>\n          </div>\n          <div class=\"small\" id=\"gpsStatus\">Lokasi bisa diisi manual atau klik tombol target untuk mengambil GPS HP.</div>\n        </div>\n\n        <div class=\"card\" style=\"box-shadow:none;border:1px solid #f0e9f4;margin-top:18px;padding:18px\">\n          <h3 style=\"margin:0 0 8px\">GNSS Ellipsoidal Height (h)</h3>\n          <div class=\"small\">Raw GPS altitude above WGS84 ellipsoid — bukan MSL.</div>\n          <input id=\"h_ell\" type=\"number\" step=\"any\" placeholder=\"0.000\">\n          <span class=\"pill green\" id=\"gpsHeightBadge\" style=\"display:none\">FROM GNSS</span>\n          <span class=\"pill orange\" id=\"gpsAccBadge\" style=\"display:none\">Vertical ±0 m</span>\n          <div class=\"small\" style=\"margin-top:12px\">Orthometric height (H) dihitung dari rumus <b>H = h - N</b>, memakai geoid model yang sudah di-download/import atau nilai N manual.</div>\n        </div>\n\n        <div class=\"row\">\n          <div><label>Manual Geoid Undulation N (m)</label><input id=\"h_n\" type=\"number\" step=\"any\" placeholder=\"optional jika model belum ada\"></div>\n          <div><label>Manual Orthometric Height H (m)</label><input id=\"h_H\" type=\"number\" step=\"any\" placeholder=\"optional jika sudah diketahui\"></div>\n        </div>\n        <div class=\"btns\">\n          <button class=\"btn-primary\" onclick=\"heightCompare()\">Calculate</button>\n          <button class=\"btn-danger\" onclick=\"resetHeightInput()\">Reset</button>\n          <button class=\"btn-green\" onclick=\"addHeightPoint()\">+ Add Point</button>\n        </div>\n      </div>\n\n      <div id=\"heightModelPanel\" class=\"hidden\">\n        <div class=\"model-card\">\n          <div class=\"model-head\">\n            <h3 style=\"margin:0\"><span class=\"icon\">🌐</span>EGM2008 / Local Geoid Model</h3>\n            <span id=\"geoidInstallStatus\" class=\"model-status\">NOT INSTALLED</span>\n          </div>\n          <p class=\"small\" style=\"font-size:15px;line-height:1.7;color:#374151\">Download model geoid melalui internet, atau restore/import file backup dari device. Untuk versi HTML GitHub, format yang paling aman adalah CSV/JSON lokal berisi grid <b>lat, lon, N</b>. File besar sebaiknya dipakai setelah aplikasi Android native dibuat.</p>\n          <label>URL model geoid online / backup server</label>\n          <input id=\"geoid_url\" placeholder=\"contoh: https://domain-anda.com/egm2008-indonesia.csv\">\n          <div class=\"btns\">\n            <button class=\"btn-primary\" onclick=\"downloadGeoidModel()\">☁ Download Geoid Model</button>\n            <button class=\"btn-green\" onclick=\"document.getElementById('geoid_import_file').click()\">↺ Restore / Import Backup</button>\n            <button class=\"btn-ghost\" onclick=\"exportGeoidBackup()\">Export Backup</button>\n            <button class=\"btn-danger\" onclick=\"clearGeoidModel()\">Hapus Model</button>\n          </div>\n          <input id=\"geoid_import_file\" type=\"file\" accept=\".csv,.json,.txt\" style=\"display:none\" onchange=\"restoreGeoidModel(event)\">\n          <div class=\"small\" id=\"geoidStatus\">Geoid model: belum ada file.</div>\n        </div>\n      </div>\n    </section>\n\n    <!-- IMPORT CSV -->\n    <section class=\"card hidden\" id=\"globalImportCsvRemoved\"></section>\n\n    <!-- OUTPUT -->\n    <section class=\"card\">\n      <h3><span class=\"icon\">✅</span>Hasil Output</h3>\n      <div class=\"notice\" style=\"margin-top:0\">Hasil ditampilkan langsung pada tabel di bawah. Gunakan tombol export untuk menyimpan data lapangan.</div>\n      <div id=\"singleResult\"></div>\n      <div class=\"map-card\">\n        <h4>Visual Lokasi Output</h4>\n        <div class=\"small\">Peta menampilkan titik hasil koordinat terbaru. Pilih tampilan default atau citra, lalu buka titik langsung ke Google Maps jika diperlukan.</div>\n        <div class=\"small\" id=\"outputMapStatus\">Belum ada koordinat visual untuk ditampilkan.</div>\n        <div id=\"outputMap\"></div>\n        <div class=\"btns\" style=\"margin-top:12px\">\n          <button class=\"btn-ghost\" type=\"button\" onclick=\"setMapLayer(\'default\')\">Map Default</button>\n          <button class=\"btn-warning\" type=\"button\" onclick=\"setMapLayer(\'satellite\')\">Map Citra</button>\n        </div>\n      </div>\n      <div class=\"table-wrap\"><table id=\"resultTable\"><thead></thead><tbody></tbody></table></div>\n      <div class=\"btns\" style=\"margin-top:14px\">\n        <button class=\"btn-ghost\" onclick=\"exportTXT()\">Export TXT</button>\n        <button class=\"btn-green\" onclick=\"exportExcel()\">Export Excel</button>\n        <button class=\"btn-primary\" onclick=\"exportPDF()\">Export PDF</button>\n        <button class=\"btn-danger\" onclick=\"resetAll()\">Reset Output</button>\n      </div>\n    </section>\n  </main>\n\n  <div class=\"footer-tools\">\n    <div class=\"footer-tools-inner\">\n      <button class=\"btn-ghost\" onclick=\"exportTXT()\">Export TXT</button>\n      <button class=\"btn-green\" onclick=\"exportExcel()\">Export Excel</button>\n      <button class=\"btn-primary\" onclick=\"exportPDF()\">Export PDF</button>\n      <button class=\"btn-danger\" onclick=\"resetAll()\">Reset Semua</button>\n    </div>\n  </div>\n\n<script>\n'use strict';\n\nconst tools = [\n  ['latlon','1 LatLon Decimal'], ['dms','2 DMS'], ['utm','3 UTM'], ['mgrs','4 MGRS'],\n  ['decimal-dms','5 Decimal ↔ DMS'], ['crs','6 CRS'], ['zone','7 UTM Zone'],\n  ['helmert','8A Helmert 2D'], ['bursa','8B Bursa-Wolf 3D'], ['height','9 Height']\n];\nlet results = [];\nlet helmertSolution = null;\nlet bursaSolution = null;\nlet geoidGrid = [];\nlet geoidModelText = '';\nlet geoidModelName = '';\nlet outputMap = null;\nlet outputMarker = null;\nlet outputMapLayers = {};\nlet latestMapPoint = null;\n\nfunction getActiveToolId(){\n  const active = [...document.querySelectorAll('.tool')].find(t => !t.classList.contains('hidden'));\n  if(!active) return 'latlon';\n  return active.id.replace('tool-','');\n}\nfunction fillIfExists(id, value){ const el=document.getElementById(id); if(el) el.value=value; }\nfunction addGpsButtons(){\n  const allow = ['latlon','dms','utm','mgrs','crs','zone','height','1','2','3','4','6','7','9'];\n  document.querySelectorAll('.tool').forEach(sec=>{\n    const id = sec.id.replace('tool-','');\n    if(!allow.includes(id) || sec.querySelector('.gps-mini')) return;\n    const h = sec.querySelector('h3');\n    if(!h) return;\n    const row = document.createElement('div');\n    row.className = 'gps-title-row';\n    h.parentNode.insertBefore(row,h);\n    row.appendChild(h);\n    const btn = document.createElement('button');\n    btn.type = 'button';\n    btn.className = 'gps-mini';\n    btn.title = 'Gunakan lokasi terkini';\n    btn.innerHTML = '◎';\n    btn.onclick = useCurrentLocation;\n    row.appendChild(btn);\n  });\n}\nfunction useCurrentLocation(){\n  if(!navigator.geolocation){ alert('GPS/lokasi tidak didukung browser ini. Jalankan di GitHub Pages HTTPS dan gunakan Chrome.'); return; }\n  const status = document.getElementById('statStatus'); if(status) status.textContent = 'GPS...';\n  navigator.geolocation.getCurrentPosition(function(pos){\n    const lat = pos.coords.latitude;\n    const lon = pos.coords.longitude;\n    const active = getActiveToolId();\n    const u = latlonToUTM(lat, lon);\n    const mg = toMgrs(lat, lon);\n\n    if(active==='latlon' || active==='1'){\n      fillIfExists('ll_lat', rawFmt(lat,8)); fillIfExists('ll_lon', rawFmt(lon,8)); fillIfExists('ll_epsg', u.epsg); convertLatLon();\n    }else if(active==='dms' || active==='2'){\n      fillIfExists('dms_lat', decimalToDMS(lat,'lat')); fillIfExists('dms_lon', decimalToDMS(lon,'lon')); if(document.getElementById('dms_epsg')) document.getElementById('dms_epsg').value = u.epsg; convertDMS();\n    }else if(active==='utm' || active==='3'){\n      fillIfExists('utm_e', rawFmt(u.easting,3)); fillIfExists('utm_n', rawFmt(u.northing,3)); fillIfExists('utm_zone', u.zone); fillIfExists('utm_hemi', u.hemisphere); fillIfExists('utm_epsg', u.epsg); convertUTM();\n    }else if(active==='mgrs' || active==='4'){\n      fillIfExists('mgrs_text', mg); convertMGRS();\n    }else if(active==='crs' || active==='6'){\n      fillIfExists('crs_x', rawFmt(lon,8)); fillIfExists('crs_y', rawFmt(lat,8)); fillIfExists('crs_from','4326');\n      showSingle('Lokasi GPS', [['Longitude',rawFmt(lon,8)],['Latitude',rawFmt(lat,8)],['Akurasi','± '+fmt(pos.coords.accuracy,2)+' m'],['Info','From EPSG 4326']]);\n    }else if(active==='zone' || active==='7'){\n      fillIfExists('zone_e', rawFmt(u.easting,3)); fillIfExists('zone_n', rawFmt(u.northing,3)); fillIfExists('zone_from', u.zone); fillIfExists('zone_hemi', u.hemisphere); convertUTMZone();\n    }else if(active==='height' || active==='9'){\n      fillIfExists('h_lat', rawFmt(lat,8)); fillIfExists('h_lon', rawFmt(lon,8));\n      showSingle('Lokasi GPS', [['Latitude',rawFmt(lat,8)],['Longitude',rawFmt(lon,8)],['Akurasi','± '+fmt(pos.coords.accuracy,2)+' m'],['Status','Lokasi terisi']]);\n    }\n    if(status) status.textContent = 'OK';\n  }, function(error){\n    let msg='GPS gagal. Aktifkan izin lokasi browser.';\n    if(error.code===1) msg='Izin lokasi ditolak. Aktifkan permission Location untuk browser.';\n    if(error.code===2) msg='Lokasi tidak tersedia. Aktifkan GPS / High Accuracy.';\n    if(error.code===3) msg='GPS timeout. Coba di area terbuka.';\n    alert(msg);\n    const status = document.getElementById('statStatus'); if(status) status.textContent = 'Error';\n  }, {enableHighAccuracy:true, timeout:15000, maximumAge:0});\n}\n\nfunction init(){\n  setTimeout(addGpsButtons, 0);\n  const tabs = document.getElementById('tabs');\n  tabs.innerHTML = tools.map((t,i)=>`<button class=\"tab ${i===0?'active':''}\" onclick=\"showTool('${t[0]}', this)\">${t[1]}</button>`).join('');\n  addHelmertPoint({name:'PF1',sx:287.852,sy:142.714,tx:749366.622,ty:2855425.224});\n  addHelmertPoint({name:'PF2',sx:287.852,sy:163.754,tx:749348.606,ty:2855436.099});\n  addHelmertPoint({name:'PF3',sx:287.852,sy:164.414,tx:749348.051,ty:2855436.450});\n  addBursaPoint({name:'CP1',sx:3907728.1,sy:295474.5,sz:5026059.1,tx:3907815.2,ty:295552.3,tz:5026121.9});\n  addBursaPoint({name:'CP2',sx:3917650.2,sy:310112.98,sz:5018342.1,tx:3917737.8,ty:310190.81,tz:5018404.318});\n  addBursaPoint({name:'CP3',sx:3895214.7,sy:281902.46,sz:5034876.1,tx:3895302.0,ty:281980.22,tz:5034938.0});\n  addBursaPoint({name:'CP4',sx:3922987.1,sy:320778.12,sz:5012445.8,tx:3923075.0,ty:320855.9,tz:5012508.0});\n  renderResults();\n  loadSavedGeoidModel();\n  updateGeoidUi();\n  setTimeout(initOutputMap, 120);\n}\nfunction showTool(id, btn){\n  document.querySelectorAll('.tool').forEach(x=>x.classList.add('hidden'));\n  document.getElementById('tool-'+id).classList.remove('hidden');\n  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));\n  btn.classList.add('active');\n}\nfunction n(v){ const x = Number(String(v).replace(',','.')); return Number.isFinite(x)?x:NaN; }\nfunction fmt(v,d=6){ return Number.isFinite(v)? Number(v).toFixed(d).replace('.',',') : ''; }\nfunction rawFmt(v,d=6){ return Number.isFinite(v)? Number(v).toFixed(d) : ''; }\nfunction toast(msg, ok=true){ document.getElementById('statStatus').textContent = ok?'OK':'Error'; if(!ok) alert(msg); }\nfunction addResult(obj){ results.push(obj); renderResults(); }\nfunction renderResults(){\n  document.getElementById('statPoints').textContent = results.length;\n  const table = document.getElementById('resultTable');\n  if(!results.length){\n    table.querySelector('thead').innerHTML = '<tr><th>Status</th></tr>';\n    table.querySelector('tbody').innerHTML = '<tr><td>Belum ada output. Isi data lalu tekan Convert / Calculate.</td></tr>';\n    return;\n  }\n  const preferred = ['tool','id','point','lat','lon','easting','northing','zone','hemisphere','epsg','mgrs','address','x_out','y_out','target_x','target_y','target_z','orthometric_H','geoid_N'];\n  const allKeysRaw = [...new Set(results.flatMap(o=>Object.keys(o)))];\n  const allKeys = [...preferred.filter(k=>allKeysRaw.includes(k)), ...allKeysRaw.filter(k=>!preferred.includes(k))];\n  table.querySelector('thead').innerHTML = '<tr>'+allKeys.map(k=>`<th>${k}</th>`).join('')+'</tr>';\n  table.querySelector('tbody').innerHTML = results.map(o=>'<tr>'+allKeys.map(k=>`<td>${o[k]??''}</td>`).join('')+'</tr>').join('');\n}\nfunction showSingle(title, rows){\n  // Tampilan kartu hijau dinonaktifkan agar layar HP lebih ringkas.\n  // Output utama tetap tersimpan dan tampil pada tabel Hasil Output.\n  document.getElementById('singleResult').innerHTML = '';\n}\n\nfunction initOutputMap(){\n  if(outputMap || typeof L === 'undefined') return;\n  const mapEl = document.getElementById('outputMap');\n  if(!mapEl) return;\n  outputMap = L.map(mapEl, {zoomControl:true});\n  outputMapLayers.default = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'&copy; OpenStreetMap contributors' });\n  outputMapLayers.satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution:'Tiles &copy; Esri' });\n  outputMapLayers.default.addTo(outputMap);\n  outputMap.setView([-2.5489,118.0149], 4);\n  setTimeout(()=>outputMap.invalidateSize(), 180);\n}\nfunction setMapLayer(mode){\n  initOutputMap();\n  if(!outputMap) return;\n  Object.values(outputMapLayers).forEach(layer=>{ if(layer && outputMap.hasLayer(layer)) outputMap.removeLayer(layer); });\n  (outputMapLayers[mode] || outputMapLayers.default).addTo(outputMap);\n  if(latestMapPoint) updateOutputMap(latestMapPoint.lat, latestMapPoint.lon, latestMapPoint.label, latestMapPoint.meta, true);\n}\nfunction updateOutputMap(lat, lon, label='Point', meta='', preserveView=false){\n  if(!Number.isFinite(lat) || !Number.isFinite(lon)) return;\n  initOutputMap();\n  if(!outputMap) return;\n  latestMapPoint = {lat, lon, label, meta};\n  if(outputMarker) outputMap.removeLayer(outputMarker);\n  const popup = `<b>${label}</b><br><small>${rawFmt(lat,7)}, ${rawFmt(lon,7)}${meta ? `<br>${meta}` : ''}</small>`;\n  outputMarker = L.marker([lat, lon]).addTo(outputMap).bindPopup(popup);\n  outputMarker.openPopup();\n  if(!preserveView) outputMap.setView([lat, lon], 17);\n  const status = document.getElementById('outputMapStatus');\n  if(status) status.innerHTML = `Koordinat terbaru: <b>${rawFmt(lat,7)}, ${rawFmt(lon,7)}</b>${meta ? ` • ${meta}` : ''}`;\n  setTimeout(()=>outputMap.invalidateSize(), 120);\n}\n\nfunction getUtmProj(zone, hemi){ return `+proj=utm +zone=${zone} ${hemi==='S'?'+south':''} +datum=WGS84 +units=m +no_defs`; }\nfunction lonToZone(lon){ return Math.floor((lon + 180) / 6) + 1; }\nfunction latToHem(lat){ return lat < 0 ? 'S' : 'N'; }\nfunction latlonToUTM(lat, lon){\n  const zone = lonToZone(lon); const hemi = latToHem(lat);\n  const p = proj4('EPSG:4326', getUtmProj(zone, hemi), [lon, lat]);\n  return {easting:p[0], northing:p[1], zone, hemisphere:hemi, epsg:(hemi==='S'?32700:32600)+zone};\n}\nfunction utmToLatlon(e,north,zone,hemi){\n  const p = proj4(getUtmProj(zone, hemi), 'EPSG:4326', [e, north]);\n  return {lon:p[0], lat:p[1]};\n}\nfunction toMgrs(lat, lon){\n  try {\n    if(window.mgrs && typeof mgrs.forward === 'function') return mgrs.forward([lon,lat], 5);\n    return '-';\n  } catch(e){ return '-'; }\n}\nfunction fromMgrs(txt){\n  const bbox = mgrs.toPoint(txt.trim());\n  return {lon:bbox[0], lat:bbox[1]};\n}\nasync function epsgDef(code){\n  const key='EPSG:'+code;\n  if(proj4.defs[key]) return key;\n  const manual = code === document.getElementById('crs_from')?.value ? document.getElementById('proj_from')?.value.trim() : document.getElementById('proj_to')?.value.trim();\n  if(manual){ proj4.defs(key, manual); return key; }\n  const url = `https://epsg.io/${code}.proj4`;\n  const res = await fetch(url);\n  if(!res.ok) throw new Error('Tidak bisa load definisi EPSG:'+code);\n  const def = await res.text();\n  if(!def || def.includes('404')) throw new Error('Definisi EPSG kosong:'+code);\n  proj4.defs(key, def.trim());\n  return key;\n}\n\nasync function geocodeAddress(lat, lon){\n  try{\n    const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`;\n    const res = await fetch(url,{headers:{'Accept':'application/json'}});\n    const data = await res.json();\n    return data.display_name || '';\n  }catch(e){\n    return '';\n  }\n}\n\nasync function convertLatLon(){\n  const id = document.getElementById('ll_id').value || 'P';\n  const lat=n(document.getElementById('ll_lat').value), lon=n(document.getElementById('ll_lon').value);\n  if(!Number.isFinite(lat)||!Number.isFinite(lon)) return toast('Latitude/Longitude belum valid', false);\n\n  document.getElementById('statStatus').textContent = 'Geocoding...';\n  const utm=latlonToUTM(lat,lon);\n  const mg=toMgrs(lat,lon);\n  const address = await geocodeAddress(lat,lon);\n\n  showSingle('LatLon', [\n    ['UTM',`${fmt(utm.easting,3)} E, ${fmt(utm.northing,3)} N`],\n    ['Zone',`${utm.zone}${utm.hemisphere}`],\n    ['MGRS',mg],\n    ['EPSG',utm.epsg],\n    ['Alamat', address || 'Alamat belum ditemukan']\n  ]);\n\n  updateOutputMap(lat, lon, id, 'LatLon Decimal');\n  addResult({\n    tool:'LatLon Decimal WGS84 to UTM/MGRS/Geocoding',\n    id,\n    lat:rawFmt(lat,8),\n    lon:rawFmt(lon,8),\n    easting:rawFmt(utm.easting,3),\n    northing:rawFmt(utm.northing,3),\n    zone:utm.zone,\n    hemisphere:utm.hemisphere,\n    epsg:utm.epsg,\n    mgrs:mg,\n    address:address || ''\n  });\n  document.getElementById('statStatus').textContent = 'OK';\n}\nfunction addLatLonPoint(){ convertLatLon(); }\nasync function reverseGeocodeCurrent(){\n  const lat=n(document.getElementById('ll_lat').value), lon=n(document.getElementById('ll_lon').value);\n  if(!Number.isFinite(lat)||!Number.isFinite(lon)) return toast('Latitude/Longitude belum valid', false);\n  const address = await geocodeAddress(lat,lon);\n  showSingle('Alamat',[['Alamat',address || 'Alamat belum ditemukan / koneksi geocoding gagal']]);\n  updateOutputMap(lat, lon, 'Reverse Geocode', address || 'Alamat belum ditemukan');\n}\nfunction parseDMS(str){\n  if(!str) return NaN;\n  let s=String(str).trim().toUpperCase();\n  const neg = /[SW-]/.test(s);\n  s=s.replace(/[NSEW]/g,'').replace(/-/g,' ').replace(/[°ºD]/g,' ').replace(/[′']/g,' ').replace(/[″\"]/g,' ').replace(/,/g,'.');\n  const parts=s.split(/\\s+/).filter(Boolean).map(Number);\n  if(parts.length===1) return neg ? -Math.abs(parts[0]) : parts[0];\n  const deg=Math.abs(parts[0]||0), min=parts[1]||0, sec=parts[2]||0;\n  const val=deg+min/60+sec/3600;\n  return neg?-val:val;\n}\nfunction decimalToDMS(value,type='ang'){\n  const sign = value<0 ? -1 : 1; let v=Math.abs(value);\n  const d=Math.floor(v); v=(v-d)*60; const m=Math.floor(v); const s=(v-m)*60;\n  let suf=''; if(type==='lat') suf=sign<0?'S':'N'; if(type==='lon') suf=sign<0?'W':'E'; if(type==='ang'&&sign<0) suf='-';\n  return `${type==='ang'&&sign<0?'-':''}${d}° ${m}' ${s.toFixed(4)}\"${suf}`;\n}\nfunction convertDMS(){\n  const id=document.getElementById('dms_id').value||'DMS'; const lat=parseDMS(document.getElementById('dms_lat').value); const lon=parseDMS(document.getElementById('dms_lon').value);\n  if(!Number.isFinite(lat)||!Number.isFinite(lon)) return toast('Format DMS belum valid', false);\n  const utm=latlonToUTM(lat,lon), mg=toMgrs(lat,lon);\n  showSingle('DMS',[['Decimal',`${rawFmt(lat,8)}, ${rawFmt(lon,8)}`],['UTM',`${fmt(utm.easting,3)} E, ${fmt(utm.northing,3)} N`],['Zone',`${utm.zone}${utm.hemisphere}`],['MGRS',mg]]);\n  updateOutputMap(lat, lon, id, 'DMS WGS84');\n  addResult({tool:'DMS to UTM/MGRS',id,lat:rawFmt(lat,8),lon:rawFmt(lon,8),easting:rawFmt(utm.easting,3),northing:rawFmt(utm.northing,3),zone:utm.zone,hemisphere:utm.hemisphere,mgrs:mg});\n}\nfunction addDmsPoint(){ convertDMS(); }\nfunction convertUTM(){\n  const id=document.getElementById('utm_id').value||'UTM'; const e=n(document.getElementById('utm_e').value), no=n(document.getElementById('utm_n').value), zone=Number(document.getElementById('utm_zone').value), hemi=document.getElementById('utm_hemi').value;\n  if(!Number.isFinite(e)||!Number.isFinite(no)||!zone) return toast('Input UTM belum valid', false);\n  const ll=utmToLatlon(e,no,zone,hemi); const mg=toMgrs(ll.lat,ll.lon);\n  showSingle('UTM',[['Lat Lon',`${rawFmt(ll.lat,8)}, ${rawFmt(ll.lon,8)}`],['DMS',`${decimalToDMS(ll.lat,'lat')} / ${decimalToDMS(ll.lon,'lon')}`],['MGRS',mg]]);\n  updateOutputMap(ll.lat, ll.lon, id, `UTM Zone ${zone}${hemi}`);\n  addResult({tool:'UTM to LatLon/MGRS',id,easting:rawFmt(e,3),northing:rawFmt(no,3),zone,hemisphere:hemi,lat:rawFmt(ll.lat,8),lon:rawFmt(ll.lon,8),mgrs:mg});\n}\nfunction addUtmPoint(){ convertUTM(); }\nfunction convertMGRS(){\n  const id=document.getElementById('mgrs_id').value||'MGRS'; const txt=document.getElementById('mgrs_text').value;\n  try{\n    const ll=fromMgrs(txt); const utm=latlonToUTM(ll.lat,ll.lon);\n    showSingle('MGRS',[['Lat Lon',`${rawFmt(ll.lat,8)}, ${rawFmt(ll.lon,8)}`],['UTM',`${fmt(utm.easting,3)} E, ${fmt(utm.northing,3)} N`],['Zone',`${utm.zone}${utm.hemisphere}`]]);\n    updateOutputMap(ll.lat, ll.lon, id, 'MGRS');\n    addResult({tool:'MGRS to UTM/LatLon',id,mgrs:txt,lat:rawFmt(ll.lat,8),lon:rawFmt(ll.lon,8),easting:rawFmt(utm.easting,3),northing:rawFmt(utm.northing,3),zone:utm.zone,hemisphere:utm.hemisphere});\n  }catch(e){ toast('MGRS tidak valid', false); }\n}\nfunction addMgrsPoint(){ convertMGRS(); }\nfunction decimalToDmsTool(){\n  const v=n(document.getElementById('dec_value').value), type=document.getElementById('dec_type').value;\n  if(!Number.isFinite(v)) return toast('Decimal belum valid', false);\n  const out=decimalToDMS(v,type); showSingle('Decimal ke DMS', [['DMS',out]]); addResult({tool:'Decimal to DMS',decimal:v,dms:out});\n}\nfunction dmsToDecimalTool(){\n  const v=parseDMS(document.getElementById('dms_single').value);\n  if(!Number.isFinite(v)) return toast('DMS belum valid', false);\n  showSingle('DMS ke Decimal', [['Decimal',rawFmt(v,10)]]); addResult({tool:'DMS to Decimal',dms:document.getElementById('dms_single').value,decimal:rawFmt(v,10)});\n}\nasync function convertCRS(){\n  try{\n    const from=document.getElementById('crs_from').value.trim(), to=document.getElementById('crs_to').value.trim();\n    const x=n(document.getElementById('crs_x').value), y=n(document.getElementById('crs_y').value);\n    if(!Number.isFinite(x)||!Number.isFinite(y)) return toast('X/Y belum valid', false);\n    const f=await epsgDef(from), t=await epsgDef(to); const out=proj4(f,t,[x,y]);\n    showSingle('CRS Transform', [['X',rawFmt(out[0],4)],['Y',rawFmt(out[1],4)],['From',from],['To',to]]);\n    if(String(to)==='4326'){ updateOutputMap(out[1], out[0], 'CRS Transform', `EPSG ${from} → ${to}`); }\n    else if(String(from)==='4326'){ updateOutputMap(y, x, 'CRS Transform', `EPSG ${from} → ${to}`); }\n    addResult({tool:'CRS Transform',from_epsg:from,to_epsg:to,x_in:x,y_in:y,x_out:rawFmt(out[0],4),y_out:rawFmt(out[1],4)});\n  }catch(e){ toast(e.message, false); }\n}\nfunction swapCRS(){ const a=document.getElementById('crs_from'), b=document.getElementById('crs_to'); [a.value,b.value]=[b.value,a.value]; }\nfunction convertUTMZone(){\n  const e=n(document.getElementById('zone_e').value), no=n(document.getElementById('zone_n').value), from=Number(document.getElementById('zone_from').value), to=Number(document.getElementById('zone_to').value), hemi=document.getElementById('zone_hemi').value;\n  if(!Number.isFinite(e)||!Number.isFinite(no)||!from||!to) return toast('Input zone belum valid', false);\n  const ll=utmToLatlon(e,no,from,hemi); const out=proj4('EPSG:4326', getUtmProj(to,hemi), [ll.lon,ll.lat]);\n  showSingle('UTM Zone Converter', [['Lat Lon',`${rawFmt(ll.lat,8)}, ${rawFmt(ll.lon,8)}`],['Target UTM',`${fmt(out[0],3)} E, ${fmt(out[1],3)} N`],['Zone',`${to}${hemi}`]]);\n  updateOutputMap(ll.lat, ll.lon, `Zone ${to}${hemi}`, `Dari zona ${from}${hemi}`);\n  addResult({tool:'UTM Zone Converter',from_zone:from,to_zone:to,hemisphere:hemi,easting_in:e,northing_in:no,lat:rawFmt(ll.lat,8),lon:rawFmt(ll.lon,8),easting_out:rawFmt(out[0],3),northing_out:rawFmt(out[1],3)});\n}\n\nfunction addHelmertPoint(val={}){\n  const box=document.getElementById('helmertPoints'); const i=box.children.length+1;\n  const html=`<div class=\"point-card helmert-point\"><div class=\"point-head\"><span class=\"point-no\">#${i}</span><input class=\"hp-name\" value=\"${val.name||'PF'+i}\" placeholder=\"Name\"><button class=\"delete-point\" onclick=\"this.closest('.point-card').remove()\">×</button></div><div class=\"row4\"><div><label>Source X</label><input class=\"hp-sx\" type=\"number\" step=\"any\" value=\"${val.sx??''}\"></div><div><label>Source Y</label><input class=\"hp-sy\" type=\"number\" step=\"any\" value=\"${val.sy??''}\"></div><div><label>Target X</label><input class=\"hp-tx\" type=\"number\" step=\"any\" value=\"${val.tx??''}\"></div><div><label>Target Y</label><input class=\"hp-ty\" type=\"number\" step=\"any\" value=\"${val.ty??''}\"></div></div></div>`;\n  box.insertAdjacentHTML('beforeend',html);\n}\nfunction getHelmertData(){ return [...document.querySelectorAll('.helmert-point')].map(p=>({name:p.querySelector('.hp-name').value,sx:n(p.querySelector('.hp-sx').value),sy:n(p.querySelector('.hp-sy').value),tx:n(p.querySelector('.hp-tx').value),ty:n(p.querySelector('.hp-ty').value)})).filter(p=>[p.sx,p.sy,p.tx,p.ty].every(Number.isFinite)); }\nfunction solveLinear(A,b){\n  const n=A[0].length; let M=A.map((r,i)=>[...r,b[i]]);\n  for(let i=0;i<n;i++){\n    let max=i; for(let k=i+1;k<n;k++) if(Math.abs(M[k][i])>Math.abs(M[max][i])) max=k;\n    [M[i],M[max]]=[M[max],M[i]]; const pivot=M[i][i]; if(Math.abs(pivot)<1e-15) throw new Error('Matrix singular');\n    for(let j=i;j<=n;j++) M[i][j]/=pivot;\n    for(let k=0;k<n;k++) if(k!==i){ const f=M[k][i]; for(let j=i;j<=n;j++) M[k][j]-=f*M[i][j]; }\n  }\n  return M.map(r=>r[n]);\n}\nfunction leastSquares(A,L){\n  const m=A.length,nc=A[0].length; const N=Array.from({length:nc},()=>Array(nc).fill(0)); const U=Array(nc).fill(0);\n  for(let i=0;i<m;i++){ for(let j=0;j<nc;j++){ U[j]+=A[i][j]*L[i]; for(let k=0;k<nc;k++) N[j][k]+=A[i][j]*A[i][k]; } }\n  return solveLinear(N,U);\n}\nfunction solveHelmert(){\n  const data=getHelmertData(); if(data.length<2) return toast('Minimal 2 control point', false);\n  const A=[], L=[]; data.forEach(p=>{ A.push([1,0,p.sx,-p.sy]); L.push(p.tx); A.push([0,1,p.sy,p.sx]); L.push(p.ty); });\n  let x; try{x=leastSquares(A,L);}catch(e){return toast('Helmert gagal: '+e.message,false)}\n  const [Tx,Ty,a,b]=x; const scale=Math.sqrt(a*a+b*b); const rot=Math.atan2(b,a); const residuals=data.map(p=>{const X=Tx+a*p.sx-b*p.sy; const Y=Ty+b*p.sx+a*p.sy; const vx=X-p.tx, vy=Y-p.ty; return {...p,vx,vy,total:Math.sqrt(vx*vx+vy*vy)};});\n  const dof=2*data.length-4; const ss=residuals.reduce((s,r)=>s+r.vx*r.vx+r.vy*r.vy,0); const rmse=Math.sqrt(ss/(2*data.length)); const stdev=dof>0?Math.sqrt(ss/dof):0;\n  helmertSolution={Tx,Ty,a,b,scale,rot,residuals,rmse,stdev,dof};\n  showSingle('Helmert Parameters', [['TX',fmt(Tx,3)],['TY',fmt(Ty,3)],['Scale',rawFmt(scale,9)],['Rotation',rawFmt(rot*180/Math.PI,6)+'°'],['A (s cosθ)',rawFmt(a,9)],['B (s sinθ)',rawFmt(b,9)],['RMSE',fmt(rmse,6)+' m'],['DOF',dof]]);\n  residuals.forEach(r=>addResult({tool:'Helmert Residual',point:r.name,Vx:rawFmt(r.vx,6),Vy:rawFmt(r.vy,6),total:rawFmt(r.total,6)}));\n}\nfunction testHelmert(){\n  if(!helmertSolution) solveHelmert(); if(!helmertSolution) return;\n  const sx=n(document.getElementById('helm_test_x').value), sy=n(document.getElementById('helm_test_y').value); const h=helmertSolution;\n  const X=h.Tx+h.a*sx-h.b*sy, Y=h.Ty+h.b*sx+h.a*sy;\n  showSingle('Test Helmert', [['Target X',fmt(X,3)],['Target Y',fmt(Y,3)]]); addResult({tool:'Test Helmert',source_x:sx,source_y:sy,target_x:rawFmt(X,3),target_y:rawFmt(Y,3)});\n}\n\nfunction addBursaPoint(val={}){\n  const box=document.getElementById('bursaPoints'); const i=box.children.length+1;\n  const html=`<div class=\"point-card bursa-point\"><div class=\"point-head\"><span class=\"point-no\">#${i}</span><input class=\"bp-name\" value=\"${val.name||'CP'+i}\" placeholder=\"Name\"><button class=\"delete-point\" onclick=\"this.closest('.point-card').remove()\">×</button></div><h4>Source (X,Y,Z)</h4><div class=\"row3\"><div><label>X</label><input class=\"bp-sx\" type=\"number\" step=\"any\" value=\"${val.sx??''}\"></div><div><label>Y</label><input class=\"bp-sy\" type=\"number\" step=\"any\" value=\"${val.sy??''}\"></div><div><label>Z</label><input class=\"bp-sz\" type=\"number\" step=\"any\" value=\"${val.sz??''}\"></div></div><h4>Target (X,Y,Z)</h4><div class=\"row3\"><div><label>X</label><input class=\"bp-tx\" type=\"number\" step=\"any\" value=\"${val.tx??''}\"></div><div><label>Y</label><input class=\"bp-ty\" type=\"number\" step=\"any\" value=\"${val.ty??''}\"></div><div><label>Z</label><input class=\"bp-tz\" type=\"number\" step=\"any\" value=\"${val.tz??''}\"></div></div></div>`;\n  box.insertAdjacentHTML('beforeend',html);\n}\nfunction getBursaData(){ return [...document.querySelectorAll('.bursa-point')].map(p=>({name:p.querySelector('.bp-name').value,sx:n(p.querySelector('.bp-sx').value),sy:n(p.querySelector('.bp-sy').value),sz:n(p.querySelector('.bp-sz').value),tx:n(p.querySelector('.bp-tx').value),ty:n(p.querySelector('.bp-ty').value),tz:n(p.querySelector('.bp-tz').value)})).filter(p=>[p.sx,p.sy,p.sz,p.tx,p.ty,p.tz].every(Number.isFinite)); }\nfunction solveBursa(){\n  const d=getBursaData(); if(d.length<3) return toast('Minimal 3 control point',false);\n  const A=[], L=[];\n  d.forEach(p=>{\n    const dx=p.tx-p.sx, dy=p.ty-p.sy, dz=p.tz-p.sz;\n    A.push([1,0,0,p.sx,0,p.sz,-p.sy]); L.push(dx);\n    A.push([0,1,0,p.sy,-p.sz,0,p.sx]); L.push(dy);\n    A.push([0,0,1,p.sz,p.sy,-p.sx,0]); L.push(dz);\n  });\n  let x; try{x=leastSquares(A,L);}catch(e){return toast('Bursa-Wolf gagal: '+e.message,false)}\n  const [Tx,Ty,Tz,s,rx,ry,rz]=x;\n  const residuals=d.map(p=>{\n    const X=p.sx+Tx+s*p.sx+rz*p.sy-ry*p.sz;\n    const Y=p.sy+Ty+s*p.sy-rz*p.sx+rx*p.sz;\n    const Z=p.sz+Tz+s*p.sz+ry*p.sx-rx*p.sy;\n    const vx=X-p.tx, vy=Y-p.ty, vz=Z-p.tz; return {...p,vx,vy,vz,total:Math.sqrt(vx*vx+vy*vy+vz*vz)};\n  });\n  const dof=3*d.length-7; const ss=residuals.reduce((a,r)=>a+r.vx*r.vx+r.vy*r.vy+r.vz*r.vz,0); const rmse=Math.sqrt(ss/(3*d.length)); const stdev=dof>0?Math.sqrt(ss/dof):0;\n  bursaSolution={Tx,Ty,Tz,s,rx,ry,rz,residuals,dof,rmse,stdev};\n  const arc=206264.80624709636;\n  showSingle('Bursa-Wolf Parameters', [['TX (m)',fmt(Tx,3)],['TY (m)',fmt(Ty,3)],['TZ (m)',fmt(Tz,3)],['Scale',rawFmt(s,9)],['Scale ppm',rawFmt(s*1e6,6)],['RX (\")',rawFmt(rx*arc,6)],['RY (\")',rawFmt(ry*arc,6)],['RZ (\")',rawFmt(rz*arc,6)],['RMSE',fmt(rmse,6)+' m'],['DOF',dof]]);\n  residuals.forEach(r=>addResult({tool:'Bursa Residual',point:r.name,Vx:rawFmt(r.vx,6),Vy:rawFmt(r.vy,6),Vz:rawFmt(r.vz,6),total:rawFmt(r.total,6)}));\n}\nfunction testBursa(){\n  if(!bursaSolution) solveBursa(); if(!bursaSolution) return;\n  const X=n(document.getElementById('bursa_test_x').value), Y=n(document.getElementById('bursa_test_y').value), Z=n(document.getElementById('bursa_test_z').value); const b=bursaSolution;\n  const xo=X+b.Tx+b.s*X+b.rz*Y-b.ry*Z;\n  const yo=Y+b.Ty+b.s*Y-b.rz*X+b.rx*Z;\n  const zo=Z+b.Tz+b.s*Z+b.ry*X-b.rx*Y;\n  showSingle('Test Bursa-Wolf', [['Target X',fmt(xo,3)],['Target Y',fmt(yo,3)],['Target Z',fmt(zo,3)]]); addResult({tool:'Test Bursa-Wolf',source_x:X,source_y:Y,source_z:Z,target_x:rawFmt(xo,3),target_y:rawFmt(yo,3),target_z:rawFmt(zo,3)});\n}\n\nfunction heightTab(tab){\n  document.getElementById('heightCalcPanel').classList.toggle('hidden', tab !== 'calc');\n  document.getElementById('heightModelPanel').classList.toggle('hidden', tab !== 'model');\n  document.getElementById('heightCalcTab').classList.toggle('active', tab === 'calc');\n  document.getElementById('heightModelTab').classList.toggle('active', tab === 'model');\n}\nfunction updateGeoidUi(){\n  const installed = geoidGrid.length > 0;\n  const status = document.getElementById('geoidInstallStatus');\n  const dot = document.getElementById('heightModelDot');\n  const alert = document.getElementById('heightInstallAlert');\n  if(status){ status.textContent = installed ? 'INSTALLED' : 'NOT INSTALLED'; status.classList.toggle('ready', installed); }\n  if(dot){ dot.style.color = installed ? '#22c55e' : '#6b7280'; }\n  if(alert){ alert.classList.toggle('hidden', installed); }\n  const label = installed ? `Geoid model: ${geoidGrid.length} titik terbaca${geoidModelName ? ' dari '+geoidModelName : ''}.` : 'Geoid model: belum ada file.';\n  const gs = document.getElementById('geoidStatus'); if(gs) gs.textContent = label;\n}\nfunction parseGeoidText(text, name='geoid-model'){\n  let rows = [];\n  try{\n    if(name.toLowerCase().endsWith('.json') || text.trim().startsWith('[')) rows = JSON.parse(text);\n    else rows = parseCSV(text);\n  }catch(e){ throw new Error('Format model geoid tidak terbaca. Gunakan CSV/JSON: lat,lon,N'); }\n  const grid = rows.map(r=>({\n    lat:n(r.lat ?? r.latitude ?? r.Latitude),\n    lon:n(r.lon ?? r.lng ?? r.longitude ?? r.Longitude),\n    N:n(r.N ?? r.n ?? r.geoid ?? r.undulation ?? r.Geoid)\n  })).filter(g=>[g.lat,g.lon,g.N].every(Number.isFinite));\n  if(!grid.length) throw new Error('Tidak ada data valid. Header minimal: lat, lon, N');\n  geoidGrid = grid;\n  geoidModelText = text;\n  geoidModelName = name;\n  try{ localStorage.setItem('geoidModelText', text); localStorage.setItem('geoidModelName', name); }catch(e){}\n  updateGeoidUi();\n}\nfunction loadSavedGeoidModel(){\n  const saved = localStorage.getItem('geoidModelText');\n  const name = localStorage.getItem('geoidModelName') || 'saved-geoid.csv';\n  if(saved){ try{ parseGeoidText(saved, name); }catch(e){ console.warn(e); } }\n}\nasync function downloadGeoidModel(){\n  const url = document.getElementById('geoid_url').value.trim();\n  if(!url) return toast('Masukkan URL model geoid terlebih dahulu. Format disarankan CSV/JSON lat,lon,N.', false);\n  try{\n    document.getElementById('geoidStatus').textContent = 'Mengunduh model geoid...';\n    const res = await fetch(url);\n    if(!res.ok) throw new Error('Download gagal. ccuracy)){\n      const b=document.getElementById('gpsAccBadge'); b.textContent='Vertical ±'+fmt(c.altitudeAccuracy,1)+' m'; b.style.display='inline-flex';\n    }\n    document.getElementById('gpsStatus').textContent = 'Lokasi otomatis berhasil diisi dari GPS HP. Akurasi horizontal ±'+fmt(c.accuracy,1)+' m.';\n    toast('Lokasi HP berhasil diambil.', true);\n  }, err=>{\n    const msg = err.code===1 ? 'Izin lokasi ditolak. Aktifkan permission location di browser.' : 'Lokasi gagal diambil. Pastikan GPS aktif dan halaman memakai HTTPS/GitHub Pages.';\n    document.getElementById('gpsStatus').textContent = msg;\n    toast(msg, false);\n  }, {enableHighAccuracy:true, timeout:15000, maximumAge:30000});\n}\nfunction loadGeoidCSV(ev){ restoreGeoidModel(ev); }\nfunction heightCompare(){\n  const id=document.getElementById('h_id').value||'BM';\n  const lat=n(document.getElementById('h_lat').value), lon=n(document.getElementById('h_lon').value);\n  let h=n(document.getElementById('h_ell').value);\n  let N=n(document.getElementById('h_n').value), H=n(document.getElementById('h_H').value);\n  if(!Number.isFinite(lat)||!Number.isFinite(lon)) return toast('Latitude/Longitude belum valid.', false);\n  if(!Number.isFinite(N)) N=nearestGeoid(lat,lon);\n  let sourceN = Number.isFinite(n(document.getElementById('h_n').value)) ? 'Manual N' : (Number.isFinite(N) ? 'Geoid Model' : 'Belum ada');\n  if(Number.isFinite(h)&&Number.isFinite(N)) H=h-N;\n  else if(Number.isFinite(h)&&Number.isFinite(H)) N=h-H;\n  else if(!Number.isFinite(h)&&Number.isFinite(H)&&Number.isFinite(N)){ h=H+N; document.getElementById('h_ell').value=rawFmt(h,3); }\n  if(!Number.isFinite(H) || !Number.isFinite(N)) return toast('Isi h dan N, atau pasang model geoid, atau isi H manual.', false);\n  showSingle('Height Compare', [['Ellipsoidal h',fmt(h,3)+' m'],['Orthometric H',fmt(H,3)+' m'],['Geoid N',fmt(N,3)+' m'],['N Source',sourceN],['Formula','H = h - N']]);\n  updateOutputMap(lat, lon, id, 'Height & Undulation');\n  addResult({tool:'Height Undulation',id,lat:rawFmt(lat,7),lon:rawFmt(lon,7),ellipsoidal_h:rawFmt(h,3),orthometric_H:rawFmt(H,3),geoid_N:rawFmt(N,3),geoid_source:sourceN,geoid_model:geoidModelName||''});\n}\nfunction resetHeightInput(){\n  ['h_project','h_id','h_lat','h_lon','h_ell','h_n','h_H'].forEach(id=>document.getElementById(id).value='');\n  ['gpsHeightBadge','gpsAccBadge'].forEach(id=>document.getElementById(id).style.display='none');\n  document.getElementById('gpsStatus').textContent='Lokasi bisa diisi manual atau klik tombol target untuk mengambil GPS HP.';\n}\nfunction addHeightPoint(){ heightCompare(); }\n\nfunction parseCSV(text){\n  const lines=text.trim().split(/\\r?\\n/).filter(Boolean); if(!lines.length) return [];\n  const headers=lines[0].split(',').map(h=>h.trim());\n  return lines.slice(1).map(line=>{ const vals=line.split(',').map(v=>v.trim()); const o={}; headers.forEach((h,i)=>o[h]=vals[i]); return o; });\n}\nfunction importCSV(ev){\n  const file=ev.target.files[0]; if(!file) return; const mode=document.getElementById('import_mode').value;\n  const reader=new FileReader(); reader.onload=()=>{\n    const rows=parseCSV(reader.result);\n    if(mode==='latlon') rows.forEach(r=>{ document.getElementById('ll_id').value=r.id||''; document.getElementById('ll_lat').value=r.lat||r.latitude||''; document.getElementById('ll_lon').value=r.lon||r.longitude||''; convertLatLon(); });\n    if(mode==='utm') rows.forEach(r=>{ document.getElementById('utm_id').value=r.id||''; document.getElementById('utm_e').value=r.easting||r.E||''; document.getElementById('utm_n').value=r.northing||r.Northing||''; document.getElementById('utm_zone').value=r.zone||''; document.getElementById('utm_hemi').value=(r.hemisphere||'S').toUpperCase(); convertUTM(); });\n    if(mode==='mgrs') rows.forEach(r=>{ document.getElementById('mgrs_id').value=r.id||''; document.getElementById('mgrs_text').value=r.mgrs||''; convertMGRS(); });\n    if(mode==='helmert') rows.forEach(r=>addHelmert function calculateStrippingRatio(){
  const ob=safeNum('srOB'), coal=safeNum('srCoal'), target=safeNum('srTarget'), daily=safeNum('srDailyCoal');
  if([ob,coal,target].some(v=>!isFinite(v)||v<=0)){ alert('Mohon isi OB BCM, Coal/Ore Ton, dan Target SR dengan angka lebih dari 0.'); return; }
  const sr=ob/coal, gap=sr-target, gapPct=(gap/target)*100, obPer1000=sr*1000, dailyOB=isFinite(daily)&&daily>0?daily*sr:null;
  let level='ok', status='SR Terkendali', alert='SR aktual masih dalam atau di bawah target. Produksi relatif aman dilanjutkan dengan monitoring sequence dan aktualisasi survey.';
  if(sr>target*1.2){ level='danger'; status='SR Tinggi'; alert='SR aktual jauh di atas target. Prioritas: evaluasi sequence, optimasi disposal/hauling, cek kembali boundary pit, dan validasi tonase recoverable.'; }
  else if(sr>target){ level='warn'; status='SR Melebihi Target'; alert='SR aktual sedikit di atas target. Perlu kontrol produksi OB, perbaiki sequence, dan evaluasi apakah target coal/ore harian masih realistis.'; }
  const econ=sr<3?'Rendah':sr<=6?'Moderat':'Tinggi';
  setText('kpiSRMain',formatNum(sr)); setText('kpiSRGap',`${gap>=0?'+':''}${formatNum(gap)}`); setText('kpiSRNeed',dailyOB?formatNum(dailyOB)+' BCM':'-');
  setHTML('srBadges',`<span class="badge ${level==='ok'?'ok':level==='warn'?'warn':'danger'}">${status}</span><span class="badge">${econ}</span><span class="badge">Target ${formatNum(target)}</span>`);
  setText('srQuick',`${formatNum(ob)} BCM OB terhadap ${formatNum(coal)} ton menghasilkan SR ${formatNum(sr)} BCM/ton. Gap terhadap target ${formatNum(target)} adalah ${gap>=0?'+':''}${formatNum(gap)}.`);
  const maxVal=Math.max(sr,target,1);
  setHTML('srBars',`<div class="bar-row"><span>AKTUAL</span><div class="bar-track"><div class="bar-fill ${level==='danger'?'orange':''}" style="width:${Math.max(8,(sr/maxVal)*100)}%"></div></div><div class="bar-val">${formatNum(sr)}</div></div><div class="bar-row"><span>TARGET</span><div class="bar-track"><div class="bar-fill gold" style="width:${Math.max(8,(target/maxVal)*100)}%"></div></div><div class="bar-val">${formatNum(target)}</div></div><div class="bar-row"><span>OB/1000t</span><div class="bar-track"><div class="bar-fill orange" style="width:100%"></div></div><div class="bar-val">${formatNum(obPer1000)} BCM</div></div>`);
  const alertEl=document.getElementById('srAlert'); alertEl.className=`alert-box ${level}`; alertEl.textContent=`${status}: ${alert}`;

function resetClinometer(){ renderClinometer(); }
function normAz(a){ return ((a%360)+360)%360; }
function azToCard(a){ const dirs=['N','NE','E','SE','S','SW','W','NW']; return dirs[Math.round(normAz(a)/45)%8]; }
function calculateClinometer(){
  const h=safeNum('clHeight'), run=safeNum('clRun'), limit=safeNum('clLimit'), strike=safeNum('clStrike'), dip=safeNum('clDip'); let dipDir=safeNum('clDipDir');
  if([h,run,limit,strike,dip].some(v=>!isFinite(v)||v<0)||run<=0||limit<=0||strike>360||dip>90){ alert('Mohon isi parameter dengan benar. Run dan limit harus > 0, strike 0-360, dip 0-90.'); return; }
  const angle=Math.atan(h/run)*180/Math.PI, pct=(h/run)*100; if(!isFinite(dipDir)) dipDir=normAz(strike+90); else dipDir=normAz(dipDir);
  let level='ok', status='Slope Aman/Terkontrol', alert='Slope bench masih di bawah limit input. Tetap cek retakan, rembesan air, dan kondisi material.';
  if(angle>limit){ level='danger'; status='Slope Melebihi Limit'; alert='Slope bench melebihi limit. Rekomendasi: inspeksi geoteknik, scaling, turunkan sudut lereng, perbaiki drainase, dan batasi aktivitas di area rawan.'; }
  else if(angle>limit*0.85){ level='warn'; status='Mendekati Limit'; alert='Slope bench mendekati batas. Rekomendasi: monitoring visual lebih sering, cek tension crack, kontrol air, dan validasi desain bench.'; }
  const dipClass=dip<10?'Landai':dip<=30?'Sedang':'Curam';
  setText('kpiClDeg',formatNum(angle)+'°'); setText('kpiClPct',formatNum(pct)+'%'); setText('kpiClDipDir',`${formatNum(dipDir,0)}° ${azToCard(dipDir)}`);
  setHTML('clBadges',`<span class="badge ${level==='ok'?'ok':level==='warn'?'warn':'danger'}">${status}</span><span class="badge">${dipClass}</span><span class="badge">Strike ${formatNum(normAz(strike),0)}°</span>`);
  setText('clQuick',`Slope bench ${formatNum(angle)}° (${formatNum(pct)}%). Strike ${formatNum(normAz(strike),0)}° dan dip ${formatNum(dip)}° menuju ${formatNum(dipDir,0)}° ${azToCard(dipDir)}.`);
  setHTML('clBars',`<div class="bar-row"><span>SLOPE</span><div class="bar-track"><div class="bar-fill ${level==='danger'?'orange':''}" style="width:${Math.min(100,Math.max(8,(angle/Math.max(limit,angle,1))*100))}%"></div></div><div class="bar-val">${formatNum(angle)}°</div></div><div class="bar-row"><span>LIMIT</span><div class="bar-track"><div class="bar-fill gold" style="width:${Math.min(100,(limit/Math.max(limit,angle,1))*100)}%"></div></div><div class="bar-val">${formatNum(limit)}°</div></div><div class="bar-row"><span>DIP</span><div class="bar-track"><div class="bar-fill orange" style="width:${Math.max(8,(dip/90)*100)}%"></div></div><div class="bar-val">${formatNum(dip)}°</div></div>`);
  const el=document.getElementById('clAlert'); el.className=`alert-box ${level}`; el.textContent=`${status}: ${alert}`;
  setHTML('clAnalysis',`<div class="analysis-item"><div class="analysis-dot" style="background:#7d58de"></div><div class="analysis-text"><b>Interpretasi slope</b>Tinggi ${formatNum(h)} m dan run ${formatNum(run)} m menghasilkan slope ${formatNum(angle)}°. Nilai ini dibandingkan dengan limit input ${formatNum(limit)}°.</div></div><div class="analysis-item"><div class="analysis-dot" style="background:#f7b500"></div><div class="analysis-text"><b>Interpretasi strike-dip</b>Strike ${formatNum(normAz(strike),0)}° dengan dip ${formatNum(dip)}° termasuk kategori ${dipClass}. Estimasi arah turun bidang adalah ${formatNum(dipDir,0)}° ${azToCard(dipDir)}.</div></div><div class="analysis-item"><div class="analysis-dot" style="background:#ff6a55"></div><div class="analysis-text"><b>Alert lapangan</b>${alert}</div></div><div class="analysis-item"><div class="analysis-dot" style="background:#1db954"></div><div class="analysis-text"><b>Tindakan</b>Catat titik ukur, foto kondisi bench, cek drainase crest-toe, dan laporkan perubahan retakan/longsoran kecil ke engineering-geoteknik.</div></div>`);
  setText('clReport',`RINGKASAN CLINOMETER\n\nInput:\n- Height/Rise: ${formatNum(h)} m\n- Horizontal Run: ${formatNum(run)} m\n- Limit Slope: ${formatNum(limit)}°\n- Strike: ${formatNum(normAz(strike),0)}°\n- Dip: ${formatNum(dip)}°\n- Dip Direction: ${formatNum(dipDir,0)}° ${azToCard(dipDir)}\n\nOutput:\n- Slope Bench: ${formatNum(angle)}°\n- Slope Percent: ${formatNum(pct)}%\n- Status: ${status}\n\nAnalisis: ${alert}`);
  activateTab('hasil');
}

function loadExampleRunoff(){ document.getElementById('runArea').value=25; document.getElementById('runRain').value=85; document.getElementById('runCoeff').value=0.75; document.getElementById('runCap').value=3.8; document.getElementById('runDuration').value=1; calculateRunoff(); }
function resetRunoff(){ renderAirLimpasan(); }
function calculateRunoff(){
  const area=safeNum('runArea'), rain=safeNum('runRain'), C=safeNum('runCoeff'), cap=safeNum('runCap'), dur=safeNum('runDuration');
  if([area,rain,C,dur].some(v=>!isFinite(v)||v<=0)||C>1){ alert('Mohon isi Area, Rainfall, C, dan Durasi dengan benar. C harus >0 sampai 1.'); return; }
  const Q=0.00278*C*rain*area, V=Q*dur*3600; const capOK=isFinite(cap)&&cap>0; const ratio=capOK?Q/cap:null;
  let level='ok', status='Kapasitas Cukup', alert='Debit limpasan masih di bawah kapasitas input. Tetap lakukan pembersihan drainase dan inspeksi setelah hujan.';
  if(!capOK){ level='warn'; status='Kapasitas Belum Diisi'; alert='Debit sudah dihitung, tetapi kapasitas drainase/sump belum diisi. Isi kapasitas untuk menentukan status cukup/tidak.'; }
  else if(ratio>1){ level='danger'; status='Kapasitas Tidak Cukup'; alert='Debit limpasan melebihi kapasitas. Prioritas: perbesar parit/sump, pompa tambahan, sediment pond, dan pembersihan jalur air.'; }
  else if(ratio>0.8){ level='warn'; status='Mendekati Kapasitas'; alert='Debit mendekati kapasitas. Siapkan pompa standby, bersihkan sedimentasi, dan pantau area low point saat hujan.'; }
  const rainClass=rain<50?'Ringan-Sedang':rain<=100?'Lebat':'Sangat Lebat';
  setText('kpiRunQ',formatNum(Q)); setText('kpiRunV',formatNum(V)); setText('kpiRunStatus',status);
  setHTML('runBadges',`<span class="badge ${level==='ok'?'ok':level==='warn'?'warn':'danger'}">${status}</span><span class="badge">${rainClass}</span><span class="badge">C ${formatNum(C,2)}</span>`);
  setText('runQuick',`Catchment ${formatNum(area)} ha, intensitas ${formatNum(rain)} mm/jam, C ${formatNum(C,2)} menghasilkan Q ${formatNum(Q)} m³/detik dan volume ${formatNum(V)} m³ selama ${formatNum(dur)} jam.`);
  const maxVal=Math.max(Q,capOK?cap:Q,1);
  setHTML('runBars',`<div class="bar-row"><span>DEBIT</span><div class="bar-track"><div class="bar-fill ${level==='danger'?'orange':''}" style="width:${Math.max(8,(Q/maxVal)*100)}%"></div></div><div class="bar-val">${formatNum(Q)}</div></div><div class="bar-row"><span>KAPASITAS</span><div class="bar-track"><div class="bar-fill gold" style="width:${capOK?Math.max(8,(cap/maxVal)*100):8}%"></div></div><div class="bar-val">${capOK?formatNum(cap):'-'}</div></div><div class="bar-row"><span>VOLUME</span><div class="bar-track"><div class="bar-fill orange" style="width:100%"></div></div><div class="bar-val">${formatNum(V)} m³</div></div>`);
  const el=document.getElementById('runAlert'); el.className=`alert-box ${level}`; el.textContent=`${status}: ${alert}`;
  setHTML('runAnalysis',`<div class="analysis-item"><div class="analysis-dot" style="background:#7d58de"></div><div class="analysis-text"><b>Interpretasi debit</b>Debit puncak estimasi metode rasional adalah ${formatNum(Q)} m³/detik. Volume limpasan untuk durasi ${formatNum(dur)} jam adalah ${formatNum(V)} m³.</div></div><div class="analysis-item"><div class="analysis-dot" style="background:#f7b500"></div><div class="analysis-text"><b>Status kapasitas</b>${capOK?`Kapasitas input ${formatNum(cap)} m³/detik. Utilisasi kapasitas ${formatNum(ratio*100)}%.`:'Kapasitas drainase/sump belum diisi sehingga status desain belum dapat divalidasi.'}</div></div><div class="analysis-item"><div class="analysis-dot" style="background:#ff6a55"></div><div class="analysis-text"><b>Alert tindakan</b>${alert}</div></div><div class="analysis-item"><div class="analysis-dot" style="background:#1db954"></div><div class="analysis-text"><b>Keterkaitan produksi</b>Jika limpasan tinggi, hauling speed dapat turun, road grade lebih licin, cycle time naik, dan produksi OB/coal terganggu. Prioritaskan drainase pada jalan hauling, sump, dan disposal.</div></div>`);
  setText('runReport',`RINGKASAN AIR LIMPASAN\n\nInput:\n- Catchment Area: ${formatNum(area)} ha\n- Rainfall Intensity: ${formatNum(rain)} mm/jam\n- Runoff Coefficient C: ${formatNum(C,2)}\n- Kapasitas Drainase/Sump: ${capOK?formatNum(cap)+' m³/detik':'Belum diisi'}\n- Durasi Hujan: ${formatNum(dur)} jam\n\nOutput:\n- Debit Q: ${formatNum(Q)} m³/detik\n- Volume Limpasan: ${formatNum(V)} m³\n- Status: ${status}\n\nAnalisis: ${alert}`);
  activateTab('hasil');
}
