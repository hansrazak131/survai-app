function getDensityClass(density){
  if(density < 1.8) return {label:'Ringan', badge:'warn'};
  if(density <= 2.4) return {label:'Sedang', badge:'ok'};
  return {label:'Padat', badge:'danger'};
}
function getVolumeScale(bcm){
  if(bcm < 500) return 'Kecil';
  if(bcm < 5000) return 'Menengah';
  return 'Besar';
}

function calculateOBVolume(){
  const area = parseFloat(document.getElementById('obArea').value);
  const thickness = parseFloat(document.getElementById('obThickness').value);
  const swell = parseFloat(document.getElementById('obSwell').value);
  const density = parseFloat(document.getElementById('obDensity').value);
  if([area, thickness, swell, density].some(v => !isFinite(v) || v <= 0)){
    alert('Mohon isi seluruh parameter dengan angka lebih dari 0.');
    return;
  }
  const bcm = area * thickness;
  const lcm = swell < 1 ? bcm / swell : bcm * swell;
  const ton = bcm * density;
  const swellImpact = ((lcm - bcm) / bcm) * 100;
  const densityClass = getDensityClass(density);
  const volumeScale = getVolumeScale(bcm);
  const factorMode = swell < 1 ? 'Fill/Load Factor' : 'Swell Coefficient';
  const factorDesc = swell < 1 ? `Karena faktor ${formatNum(swell,2)} < 1, sistem membaca input sebagai fill/load factor sehingga LCM dihitung dari BCM ÷ factor.` : `Karena faktor ${formatNum(swell,2)} > 1, sistem membaca input sebagai swell coefficient sehingga LCM dihitung dari BCM × factor.`;
  currentResult = {type:'ob', area, thickness, swell, density, bcm, lcm, ton, swellImpact, densityClass, volumeScale, factorMode, factorDesc};

  document.getElementById('kpiBCM').textContent = formatNum(bcm);
  document.getElementById('kpiLCM').textContent = formatNum(lcm);
  document.getElementById('kpiTON').textContent = formatNum(ton);
  document.getElementById('quickBadges').innerHTML = `<span class="badge ok">Skala ${volumeScale}</span><span class="badge ${densityClass.badge}">${densityClass.label}</span><span class="badge">${factorMode}</span>`;
  document.getElementById('quickInterpretation').textContent = `${formatNum(bcm)} BCM insitu menghasilkan ${formatNum(lcm)} LCM loose dan tonase ${formatNum(ton)} ton. ${factorDesc}`;

  const maxVal = Math.max(bcm,lcm,ton,1);
  const w1 = Math.max(6, (bcm/maxVal)*100);
  const w2 = Math.max(6, (lcm/maxVal)*100);
  const w3 = Math.max(6, (ton/maxVal)*100);
  document.getElementById('barList').innerHTML = `
    <div class="bar-row"><span>BCM</span><div class="bar-track"><div class="bar-fill" style="width:${w1}%"></div></div><div class="bar-val">${formatNum(bcm)}</div></div>
    <div class="bar-row"><span>LCM</span><div class="bar-track"><div class="bar-fill gold" style="width:${w2}%"></div></div><div class="bar-val">${formatNum(lcm)}</div></div>
    <div class="bar-row"><span>TON</span><div class="bar-track"><div class="bar-fill orange" style="width:${w3}%"></div></div><div class="bar-val">${formatNum(ton)}</div></div>`;
  document.getElementById('impactSwell').textContent = `${formatNum(swellImpact)}%`;
  document.getElementById('impactDensity').textContent = densityClass.label;
  document.getElementById('analysisList').innerHTML = `
    <div class="analysis-item"><div class="analysis-dot" style="background:#7d58de"></div><div class="analysis-text"><b>Volume insitu / bank material</b>Dengan luas ${formatNum(area)} m² dan ketebalan rata-rata ${formatNum(thickness)} m, volume bank overburden diperkirakan ${formatNum(bcm)} BCM.</div></div>
    <div class="analysis-item"><div class="analysis-dot" style="background:#f7b500"></div><div class="analysis-text"><b>Konversi loose volume</b>${factorDesc} Hasil loose volume yang direkomendasikan untuk kebutuhan loading/hauling adalah ${formatNum(lcm)} LCM.</div></div>
    <div class="analysis-item"><div class="analysis-dot" style="background:#ff6a55"></div><div class="analysis-text"><b>Estimasi tonase</b>Dengan density ${formatNum(density)} ton/m³ (bank), tonase overburden diperkirakan ${formatNum(ton)} ton.</div></div>
    <div class="analysis-item"><div class="analysis-dot" style="background:#1db954"></div><div class="analysis-text"><b>Implikasi operasional</b>Skala pekerjaan diklasifikasikan <b>${volumeScale}</b>. Gunakan hasil BCM untuk control volume pit, LCM untuk hauling, dan tonase untuk sinkronisasi laporan produksi.</div></div>`;
  const report = `RINGKASAN PERHITUNGAN OB VOLUME

Input:
- Area                  : ${formatNum(area)} m²
- Thickness             : ${formatNum(thickness)} m
- ${factorMode}     : ${formatNum(swell)}
- Density              : ${formatNum(density)} ton/m³

Output:
- Volume Insitu        : ${formatNum(bcm)} BCM
- Volume Loose         : ${formatNum(lcm)} LCM
- Tonnage              : ${formatNum(ton)} ton

Analisis:
- Klasifikasi volume: ${volumeScale}.
- Kategori density : ${densityClass.label}.
- Dampak swell/konversi loose: ${formatNum(swellImpact)}%.
- Catatan metode: ${factorDesc}`;
  document.getElementById('reportText').textContent = report;
  activateTab('hasil');
}

function getRecoveryClass(rec){
  if(rec >= 90) return {label:'Recovery Tinggi', badge:'ok'};
  if(rec >= 75) return {label:'Recovery Sedang', badge:'warn'};
  return {label:'Recovery Rendah', badge:'danger'};
}
function getSRClass(sr){
  if(!isFinite(sr) || sr <= 0) return {label:'Tidak ada', badge:'warn'};
  if(sr < 3) return {label:'SR Rendah', badge:'ok'};
  if(sr < 6) return {label:'SR Sedang', badge:'warn'};
  return {label:'SR Tinggi', badge:'danger'};
}
function getMaterialClass(density){
  if(density < 1.8) return {label:'Coal-Like', badge:'ok'};
  if(density < 2.5) return {label:'Transisi', badge:'warn'};
  return {label:'Ore-Like', badge:'danger'};
}

function calculateTonaseCoalOre(){
  const area = parseFloat(document.getElementById('coArea').value);
  const thickness = parseFloat(document.getElementById('coThickness').value);
  const density = parseFloat(document.getElementById('coDensity').value);
  const recovery = parseFloat(document.getElementById('coRecovery').value);
  const obInput = document.getElementById('coOBVolume').value.trim();
  const obVolume = obInput === '' ? null : parseFloat(obInput);

  if([area, thickness, density, recovery].some(v => !isFinite(v) || v <= 0)){
    alert('Mohon isi Area, Seam Thickness, Density, dan Recovery dengan angka lebih dari 0.');
    return;
  }
  if(recovery > 100){
    alert('Recovery sebaiknya tidak lebih dari 100%.');
    return;
  }
  if(obInput !== '' && (!isFinite(obVolume) || obVolume <= 0)){
    alert('OB Volume harus lebih dari 0 jika diisi.');
    return;
  }

  const romTon = area * thickness * density;
  const cleanTon = romTon * (recovery / 100);
  const lossTon = romTon - cleanTon;
  const sr = obVolume ? (obVolume / cleanTon) : null;
  const recoveryClass = getRecoveryClass(recovery);
  const srClass = getSRClass(sr || 0);
  const materialClass = getMaterialClass(density);
  const scaleClass = cleanTon < 1000 ? 'Kecil' : cleanTon < 10000 ? 'Menengah' : 'Besar';
  currentResult = {type:'tonase', area, thickness, density, recovery, obVolume, romTon, cleanTon, lossTon, sr, recoveryClass, srClass, materialClass, scaleClass};

  document.getElementById('kpiROM').textContent = formatNum(romTon);
  document.getElementById('kpiClean').textContent = formatNum(cleanTon);
  document.getElementById('kpiSR').textContent = sr ? formatNum(sr) : '-';
  const srBadge = sr ? `<span class="badge ${srClass.badge}">${srClass.label}</span>` : `<span class="badge warn">SR Belum dihitung</span>`;
  document.getElementById('quickBadgesTonase').innerHTML = `<span class="badge ok">Skala ${scaleClass}</span><span class="badge ${recoveryClass.badge}">${recoveryClass.label}</span><span class="badge ${materialClass.badge}">${materialClass.label}</span>${srBadge}`;
  document.getElementById('quickInterpretationTonase').textContent = sr ? `${formatNum(romTon)} ton ROM menghasilkan ${formatNum(cleanTon)} ton clean coal/ore pada recovery ${formatNum(recovery)}%, dengan stripping ratio ${formatNum(sr)} BCM/ton.` : `${formatNum(romTon)} ton ROM menghasilkan ${formatNum(cleanTon)} ton clean coal/ore pada recovery ${formatNum(recovery)}%. Isi OB Volume untuk menghitung stripping ratio.`;

  const obBarVal = obVolume || 0;
  const maxVal = Math.max(romTon, cleanTon, obBarVal, 1);
  const w1 = Math.max(6, (romTon/maxVal)*100);
  const w2 = Math.max(6, (cleanTon/maxVal)*100);
  const w3 = obVolume ? Math.max(6, (obBarVal/maxVal)*100) : 6;
  document.getElementById('barListTonase').innerHTML = `
    <div class="bar-row"><span>ROM</span><div class="bar-track"><div class="bar-fill" style="width:${w1}%"></div></div><div class="bar-val">${formatNum(romTon)} t</div></div>
    <div class="bar-row"><span>CLEAN</span><div class="bar-track"><div class="bar-fill gold" style="width:${w2}%"></div></div><div class="bar-val">${formatNum(cleanTon)} t</div></div>
    <div class="bar-row"><span>OB</span><div class="bar-track"><div class="bar-fill orange" style="width:${w3}%"></div></div><div class="bar-val">${obVolume ? formatNum(obBarVal)+' BCM' : '0.00'}</div></div>`;
  document.getElementById('impactLossTonase').textContent = `${formatNum(lossTon)} t`;
  document.getElementById('impactSRTonase').textContent = sr ? srClass.label : 'Belum ada';

  const srText = sr ? `Dengan OB volume ${formatNum(obVolume)} BCM, stripping ratio diperoleh sebesar ${formatNum(sr)} BCM/ton dan diklasifikasikan sebagai <b>${srClass.label}</b>.` : `SR belum dihitung karena OB volume belum diinput. Rekomendasinya, gunakan hasil BCM dari sub menu OB Volume lalu masukkan ke kolom OB Volume.`;
  document.getElementById('analysisListTonase').innerHTML = `
    <div class="analysis-item"><div class="analysis-dot" style="background:#7d58de"></div><div class="analysis-text"><b>ROM tonnage</b>Dengan luas ${formatNum(area)} m², ketebalan seam ${formatNum(thickness)} m, dan density ${formatNum(density)} ton/m³, estimasi tonase ROM adalah ${formatNum(romTon)} ton.</div></div>
    <div class="analysis-item"><div class="analysis-dot" style="background:#f7b500"></div><div class="analysis-text"><b>Recoverable / clean coal-ore</b>Recovery ${formatNum(recovery)}% menghasilkan clean coal/ore sebesar ${formatNum(cleanTon)} ton. Selisih sebesar ${formatNum(lossTon)} ton merepresentasikan potensi losses, dilution control, atau reject cleaning.</div></div>
    <div class="analysis-item"><div class="analysis-dot" style="background:#ff6a55"></div><div class="analysis-text"><b>Stripping ratio</b>${srText}</div></div>
    <div class="analysis-item"><div class="analysis-dot" style="background:#1db954"></div><div class="analysis-text"><b>Implikasi pelaporan</b>Gunakan ROM tonnage untuk laporan geologi/produksi awal, clean coal/ore untuk basis recoverable tonnage, dan SR sebagai indikator keekonomian pengupasan terhadap tonase jual/recoverable.</div></div>`;

  const report = `RINGKASAN PERHITUNGAN TONASE COAL/ORE

Input:
- Area                  : ${formatNum(area)} m²
- Seam Thickness        : ${formatNum(thickness)} m
- Density               : ${formatNum(density)} ton/m³
- Recovery              : ${formatNum(recovery)} %
- OB Volume             : ${obVolume ? formatNum(obVolume)+' BCM' : 'Belum diisi'}

Output:
- ROM Tonnage           : ${formatNum(romTon)} ton
- Clean Coal/Ore        : ${formatNum(cleanTon)} ton
- Stripping Ratio       : ${sr ? formatNum(sr)+' BCM/ton' : 'Belum dihitung'}

Analisis:
- Kategori material     : ${materialClass.label}.
- Kategori recovery     : ${recoveryClass.label}.
- Losses / rejection    : ${formatNum(lossTon)} ton.
- Klasifikasi skala     : ${scaleClass}.
- Catatan SR            : ${sr ? srClass.label : 'Isi OB Volume untuk menghitung SR.'}`;
  document.getElementById('reportTextTonase').textContent = report;
  activateTab('hasil');
}

}

function getCycleClass(cycle){
  if(cycle <= 12) return {label:'Cycle Cepat', badge:'ok'};
  if(cycle <= 25) return {label:'Cycle Normal', badge:'warn'};
  return {label:'Cycle Panjang', badge:'danger'};
}

function getQueueClass(queue, cycle){
  const ratio = cycle > 0 ? queue / cycle : 0;
  if(ratio <= 0.08) return {label:'Queue Rendah', badge:'ok'};
  if(ratio <= 0.18) return {label:'Queue Sedang', badge:'warn'};
  return {label:'Queue Tinggi', badge:'danger'};
}

function getProductionClass(prod){
  if(prod < 50) return {label:'Produksi Rendah', badge:'danger'};
  if(prod < 120) return {label:'Produksi Sedang', badge:'warn'};
  return {label:'Produksi Tinggi', badge:'ok'};
}

function calculateHaulingCycle(){
  const distanceM = parseFloat(document.getElementById('hcDistance').value);
  const speedLoaded = parseFloat(document.getElementById('hcSpeedLoaded').value);
  const speedEmpty = parseFloat(document.getElementById('hcSpeedEmpty').value);
  const loading = parseFloat(document.getElementById('hcLoading').value);
  const dumping = parseFloat(document.getElementById('hcDumping').value);
  const queue = parseFloat(document.getElementById('hcQueue').value);
  const capacity = parseFloat(document.getElementById('hcCapacity').value);
  const efficiencyPct = parseFloat(document.getElementById('hcEfficiency').value);

  if([distanceM, speedLoaded, speedEmpty, loading, dumping, queue, capacity, efficiencyPct].some(v => !isFinite(v) || v < 0) || distanceM <= 0 || speedLoaded <= 0 || speedEmpty <= 0 || capacity <= 0 || efficiencyPct <= 0){
    alert('Mohon isi seluruh parameter dengan angka valid. Distance, speed, capacity, dan efficiency harus lebih dari 0.');
    return;
  }
  if(efficiencyPct > 100){
    alert('Job Efficiency sebaiknya tidak lebih dari 100%.');
    return;
  }

  const distanceKm = distanceM / 1000;
  const travelLoaded = (distanceKm / speedLoaded) * 60;
  const travelEmpty = (distanceKm / speedEmpty) * 60;
  const cleanCycle = loading + travelLoaded + dumping + travelEmpty;
  const cycleTime = cleanCycle + queue;
  const tripHourRaw = 60 / cycleTime;
  const tripHour = tripHourRaw * (efficiencyPct / 100);
  const production = tripHour * capacity;
  const queueRatio = (queue / cycleTime) * 100;
  const loadingRatio = (loading / cycleTime) * 100;
  const haulRatio = (travelLoaded / cycleTime) * 100;
  const returnRatio = (travelEmpty / cycleTime) * 100;
  const cycleClass = getCycleClass(cycleTime);
  const queueClass = getQueueClass(queue, cycleTime);
  const prodClass = getProductionClass(production);
  const parts = [
    {name:'Loading', value:loading},
    {name:'Loaded Haul', value:travelLoaded},
    {name:'Dumping', value:dumping},
    {name:'Empty Return', value:travelEmpty},
    {name:'Queue', value:queue}
  ];
  const bottleneck = parts.reduce((a,b)=> b.value > a.value ? b : a, parts[0]);
  const utilization = (cleanCycle / cycleTime) * 100;

  currentResult = {type:'hauling', distanceM, speedLoaded, speedEmpty, loading, dumping, queue, capacity, efficiencyPct, travelLoaded, travelEmpty, cleanCycle, cycleTime, tripHour, production, queueRatio, loadingRatio, haulRatio, returnRatio, bottleneck, utilization, cycleClass, queueClass, prodClass};

  document.getElementById('kpiCycle').textContent = formatNum(cycleTime);
  document.getElementById('kpiTripHour').textContent = formatNum(tripHour);
  document.getElementById('kpiProdBCM').textContent = formatNum(production);

  document.getElementById('quickBadgesHauling').innerHTML = `<span class="badge ${cycleClass.badge}">${cycleClass.label}</span><span class="badge ${queueClass.badge}">${queueClass.label}</span><span class="badge ${prodClass.badge}">${prodClass.label}</span><span class="badge">Eff ${formatNum(efficiencyPct,0)}%</span>`;
  document.getElementById('quickInterpretationHauling').textContent = `Cycle time ${formatNum(cycleTime)} menit menghasilkan ${formatNum(tripHour)} trip/jam dan produksi ${formatNum(production)} BCM/jam. Bottleneck terbesar: ${bottleneck.name}.`;

  const maxVal = Math.max(loading, travelLoaded, dumping, travelEmpty, queue, 1);
  document.getElementById('barListHauling').innerHTML = `
    <div class="bar-row"><span>LOAD</span><div class="bar-track"><div class="bar-fill" style="width:${Math.max(6,(loading/maxVal)*100)}%"></div></div><div class="bar-val">${formatNum(loading)} min</div></div>
    <div class="bar-row"><span>HAUL</span><div class="bar-track"><div class="bar-fill gold" style="width:${Math.max(6,(travelLoaded/maxVal)*100)}%"></div></div><div class="bar-val">${formatNum(travelLoaded)} min</div></div>
    <div class="bar-row"><span>RETURN</span><div class="bar-track"><div class="bar-fill orange" style="width:${Math.max(6,(travelEmpty/maxVal)*100)}%"></div></div><div class="bar-val">${formatNum(travelEmpty)} min</div></div>
    <div class="bar-row"><span>QUEUE</span><div class="bar-track"><div class="bar-fill" style="width:${Math.max(6,(queue/maxVal)*100)}%"></div></div><div class="bar-val">${formatNum(queue)} min</div></div>`;
  document.getElementById('impactBottleneck').textContent = bottleneck.name;
  document.getElementById('impactUtilitas').textContent = `${formatNum(utilization)}%`;

  const queueAdvice = queueRatio > 18
    ? 'Queue tinggi; rekomendasi lapangan: evaluasi match factor loader-hauler, lebar disposal, manajemen traffic, dan waktu spotting.'
    : queueRatio > 8
      ? 'Queue masih perlu dikontrol; evaluasi ritme loading, traffic simpang, dan kapasitas dumping.'
      : 'Queue relatif rendah; fokus optimasi berikutnya pada speed, kondisi jalan, dan konsistensi loading.';
  const speedAdvice = speedLoaded < speedEmpty ? 'Speed empty lebih tinggi dari loaded, pola ini normal karena truck kembali tanpa muatan.' : 'Speed loaded tidak lebih rendah dari empty; cek kembali data speed, kondisi grade, atau pembatasan kecepatan di jalur return.';
  document.getElementById('analysisListHauling').innerHTML = `

function getRoadGradeCondition(absGrade, limit){
  const warnLimit = limit * 0.8;
  if(absGrade <= warnLimit) return {label:'AMAN', badge:'ok', desc:'Grade masih berada pada zona aman terhadap batas rekomendasi.'};
  if(absGrade <= limit) return {label:'WASPADA', badge:'warn', desc:'Grade mendekati batas rekomendasi; perlu kontrol speed, surface, dan drainase.'};
  return {label:'TIDAK IDEAL', badge:'danger', desc:'Grade melebihi batas rekomendasi; perlu evaluasi desain ramp atau rekayasa jalan.'};
}

function updateRoadGradeProfile(elevStart, elevEnd, distance, grade, direction){
  const svg = document.getElementById('profileSvgRG');
  if(!svg) return;
  const absGrade = Math.abs(grade || 0);
  const yStart = 120;
  let yEnd = yStart - Math.max(-80, Math.min(80, (elevEnd - elevStart) * 4));
  if(!isFinite(yEnd)) yEnd = 120;
  yEnd = Math.max(35, Math.min(125, yEnd));
  svg.innerHTML = `
    <defs>
      <linearGradient id="rgLine" x1="0" x2="1">
        <stop offset="0%" stop-color="#9b4fc8"/>
        <stop offset="100%" stop-color="#7025df"/>
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="640" height="170" rx="18" fill="#ffffff"/>
    <line x1="50" y1="130" x2="590" y2="130" stroke="#eee5f8" stroke-width="3"/>
    <line x1="50" y1="30" x2="50" y2="130" stroke="#eee5f8" stroke-width="3"/>
    <polyline points="70,${yStart} 570,${yEnd}" fill="none" stroke="url(#rgLine)" stroke-width="9" stroke-linecap="round"/>
    <line x1="70" y1="${yStart}" x2="570" y2="${yStart}" stroke="#ffc928" stroke-width="3" stroke-dasharray="9 9" opacity=".85"/>
    <circle cx="70" cy="${yStart}" r="9" fill="#ffc928"/>
    <circle cx="570" cy="${yEnd}" r="9" fill="#ff5d46"/>
    <text x="70" y="150" text-anchor="middle" fill="#647084" font-size="18" font-weight="800">${formatNum(elevStart)} m</text>
    <text x="570" y="150" text-anchor="middle" fill="#647084" font-size="18" font-weight="800">${formatNum(elevEnd)} m</text>
    <text x="320" y="38" text-anchor="middle" fill="#172033" font-size="22" font-weight="900">${direction} • ${formatNum(absGrade)}%</text>
    <text x="320" y="64" text-anchor="middle" fill="#647084" font-size="15" font-weight="800">Distance ${formatNum(distance)} m</text>`;
}

function calculateRoadGrade(){
  const distance = parseFloat(document.getElementById('rgDistance').value);
  const elevStart = parseFloat(document.getElementById('rgElevStart').value);
  const elevEnd = parseFloat(document.getElementById('rgElevEnd').value);
  const limit = parseFloat(document.getElementById('rgLimit').value);

  if([distance, elevStart, elevEnd, limit].some(v => !isFinite(v)) || distance <= 0 || limit <= 0){
    alert('Mohon isi Horizontal Distance dan Grade Limit lebih dari 0, serta elevasi dengan angka valid.');
    return;
  }

  const sigma = elevEnd - elevStart;
  const grade = (sigma / distance) * 100;
  const absGrade = Math.abs(grade);
  const direction = sigma > 0 ? 'TANJAKAN' : sigma < 0 ? 'TURUNAN' : 'DATAR';
  const condition = getRoadGradeCondition(absGrade, limit);
  const margin = limit - absGrade;
  const recommendedDistance = absGrade > limit && Math.abs(sigma) > 0 ? Math.abs(sigma) / (limit / 100) : distance;

  currentResult = {type:'roadgrade', distance, elevStart, elevEnd, limit, sigma, grade, absGrade, direction, condition, margin, recommendedDistance};

  document.getElementById('kpiConditionRG').textContent = condition.label;
  document.getElementById('kpiGradeRG').textContent = `${formatNum(grade)}%`;
  document.getElementById('kpiSigmaRG').textContent = formatNum(sigma);
  document.getElementById('quickBadgesRG').innerHTML = `<span class="badge ${condition.badge}">${condition.label}</span><span class="badge">${direction}</span><span class="badge">Limit ${formatNum(limit)}%</span>`;
  document.getElementById('quickInterpretationRG').textContent = `ΔH sebesar ${formatNum(sigma)} m pada jarak ${formatNum(distance)} m menghasilkan grade ${formatNum(grade)}%. ${condition.desc}`;

  const maxBar = Math.max(absGrade, limit, Math.abs(sigma), 1);
  document.getElementById('barListRG').innerHTML = `
    <div class="bar-row"><span>GRADE</span><div class="bar-track"><div class="bar-fill" style="width:${Math.max(6,(absGrade/maxBar)*100)}%"></div></div><div class="bar-val">${formatNum(absGrade)}%</div></div>
    <div class="bar-row"><span>LIMIT</span><div class="bar-track"><div class="bar-fill gold" style="width:${Math.max(6,(limit/maxBar)*100)}%"></div></div><div class="bar-val">${formatNum(limit)}%</div></div>
    <div class="bar-row"><span>ΔH</span><div class="bar-track"><div class="bar-fill orange" style="width:${Math.max(6,(Math.abs(sigma)/maxBar)*100)}%"></div></div><div class="bar-val">${formatNum(sigma)} m</div></div>`;
  document.getElementById('impactDirectionRG').textContent = direction;
  document.getElementById('impactMarginRG').textContent = `${formatNum(margin)}%`;
  updateRoadGradeProfile(elevStart, elevEnd, distance, grade, direction);

  const alertColor = condition.badge === 'danger' ? '#ff5d46' : condition.badge === 'warn' ? '#ff9b2f' : '#1db954';
  const improvement = absGrade > limit
    ? `Agar memenuhi limit ${formatNum(limit)}%, jarak horizontal ideal minimum untuk ΔH ${formatNum(sigma)} m adalah sekitar ${formatNum(recommendedDistance)} m. Artinya jalur perlu diperpanjang sekitar ${formatNum(recommendedDistance - distance)} m atau dibuat segmentasi/switchback.`
    : `Grade masih berada dalam batas ${formatNum(limit)}%. Tetap lakukan kontrol surface, drainase, rolling resistance, dan rambu kecepatan.`;
  const safetyAdvice = absGrade > limit
    ? 'Prioritas rekomendasi: redesign ramp, perpanjang jarak horizontal, kurangi segmen curam, perbaiki drainase, dan batasi speed truck terutama saat loaded downhill.'
    : absGrade > limit * 0.8
      ? 'Rekomendasi: pasang warning sign, kontrol speed, inspeksi rutin surface, dan hindari genangan karena grade sudah mendekati batas.'
      : 'Rekomendasi: kondisi relatif aman, namun tetap jaga crossfall, drainase, compaction, dan rolling resistance agar performa hauling stabil.';

  document.getElementById('analysisListRG').innerHTML = `
    <div class="analysis-item"><div class="analysis-dot" style="background:#7d58de"></div><div class="analysis-text"><b>Grade jalan</b>Selisih elevasi dari ${formatNum(elevStart)} m ke ${formatNum(elevEnd)} m adalah ${formatNum(sigma)} m. Dengan jarak horizontal ${formatNum(distance)} m, grade jalan adalah ${formatNum(grade)}%.</div></div>
    <div class="analysis-item"><div class="analysis-dot" style="background:${alertColor}"></div><div class="analysis-text"><b>Kondisi</b>Status jalan: <b>${condition.label}</b>. ${condition.desc}</div></div>
    <div class="analysis-item"><div class="analysis-dot" style="background:#f7b500"></div><div class="analysis-text"><b>Evaluasi terhadap limit</b>Margin terhadap limit adalah ${formatNum(margin)}%. ${improvement}</div></div>
    <div class="analysis-item"><div class="analysis-dot" style="background:#1db954"></div><div class="analysis-text"><b>Saran lapangan</b>${safetyAdvice}</div></div>`;

  const report = `RINGKASAN PERHITUNGAN ROAD GRADE\n\nInput:\n- Horizontal Distance   : ${formatNum(distance)} m\n- Elevation Start       : ${formatNum(elevStart)} m\n- Elevation End         : ${formatNum(elevEnd)} m\n- Grade Limit           : ${formatNum(limit)} %\n\nOutput:\n- Kondisi               : ${condition.label}\n- Grade                 : ${formatNum(grade)} %\n- Elevation Sigma / ΔH  : ${formatNum(sigma)} m\n- Arah Jalan            : ${direction}\n- Margin terhadap limit : ${formatNum(margin)} %\n\nAnalisis:\n- ${condition.desc}\n- ${improvement}\n- ${safetyAdvice}`;
  document.getElementById('reportTextRG').textContent = report;
  activateTab('hasil');
}

  document.getElementById('cfExisting').value = 105.40;
  document.getElementById('cfTarget').value = 103.80;
  document.getElementById('cfWidth').value = 35;
  document.getElementById('cfLength').value = 80;
  document.getElementById('cfBulking').value = 1.00;

}

function resetCutFill(){
  document.getElementById('cfExisting').value = '';
  document.getElementById('cfTarget').value = '';
  document.getElementById('cfWidth').value = '';
  document.getElementById('cfLength').value = '';
  document.getElementById('cfBulking').value = 1.00;
  currentResult = null;
  document.getElementById('kpiCutCF').textContent = '0.00';
  document.getElementById('kpiFillCF').textContent = '0.00';
  document.getElementById('kpiNetCF').textContent = '0.00';
  document.getElementById('quickBadgesCF').innerHTML = '<span class="badge">Belum dihitung</span>';
  document.getElementById('quickInterpretationCF').textContent = 'Masukkan existing elevation, target elevation, front width, front length, dan factor.';
  document.getElementById('barListCF').innerHTML = `
    <div class="bar-row"><span>CUT</span><div class="bar-track"><div class="bar-fill orange" style="width:0%"></div></div><div class="bar-val">0.00</div></div>
    <div class="bar-row"><span>FILL</span><div class="bar-track"><div class="bar-fill gold" style="width:0%"></div></div><div class="bar-val">0.00</div></div>
    <div class="bar-row"><span>NET</span><div class="bar-track"><div class="bar-fill" style="width:0%"></div></div><div class="bar-val">0.00</div></div>`;
  document.getElementById('impactBalanceCF').textContent = '-';
  document.getElementById('impactDeltaCF').textContent = '0.00 m';
  document.getElementById('analysisListCF').innerHTML = `<div class="analysis-item"><div class="analysis-dot" style="background:#cdbbf5"></div><div class="analysis-text"><b>Belum ada analisis</b>Jalankan perhitungan terlebih dahulu untuk melihat interpretasi cut, fill, dan net volume.</div></div>`;
  document.getElementById('reportTextCF').textContent = 'Belum ada ringkasan. Lakukan perhitungan terlebih dahulu.';
  updateCutFillProfile(0, 0, 'BALANCE');

function getCutFillCondition(net, totalVol){
  const absNet = Math.abs(net);
  const tolerance = Math.max(totalVol * 0.05, 0.01);
  if(absNet <= tolerance) return {label:'BALANCE', badge:'ok', desc:'Cut dan fill relatif seimbang terhadap toleransi 5%.'};
  if(net > 0) return {label:'SURPLUS CUT', badge:'warn', desc:'Material cut lebih besar dari kebutuhan fill; perlu rencana disposal, stockpile, atau pemanfaatan material.'};
  return {label:'DEFISIT FILL', badge:'danger', desc:'Kebutuhan fill lebih besar dari material cut; perlu borrow material atau redesign elevasi.'};
}

function updateCutFillProfile(existing, target, status){
  const svg = document.getElementById('profileSvgCF');
  if(!svg) return;
  const delta = existing - target;
  let yTarget = 112;
  let yExisting = yTarget - Math.max(-60, Math.min(60, delta * 18));
  yExisting = Math.max(38, Math.min(142, yExisting));
  const fillColor = delta > 0 ? '#ff5d46' : delta < 0 ? '#ffc928' : '#1db954';
  const midY = Math.min(yExisting, yTarget);
  const height = Math.abs(yTarget - yExisting);
  svg.innerHTML = `
    <rect x="0" y="0" width="640" height="180" rx="18" fill="#ffffff"/>
    <rect x="95" y="${midY}" width="450" height="${height}" rx="10" fill="${fillColor}" opacity=".16"/>
    <line x1="70" y1="${yTarget}" x2="570" y2="${yTarget}" stroke="#ffc928" stroke-width="5" stroke-dasharray="10 9"/>
    <line x1="70" y1="${yExisting}" x2="570" y2="${yExisting}" stroke="#7025df" stroke-width="8" stroke-linecap="round"/>
    <text x="82" y="${yExisting - 10}" fill="#7025df" font-size="16" font-weight="900">EXISTING ${formatNum(existing)} m</text>
    <text x="82" y="${yTarget + 24}" fill="#a77100" font-size="16" font-weight="900">TARGET ${formatNum(target)} m</text>
    <text x="320" y="34" text-anchor="middle" fill="#172033" font-size="22" font-weight="900">${status} • ΔH ${formatNum(delta)} m</text>
    <text x="320" y="162" text-anchor="middle" fill="#647084" font-size="15" font-weight="800">Ungu = existing, Gold = target design</text>`;
}

function calculateCutFill(){
  const existing = parseFloat(document.getElementById('cfExisting').value);
  const target = parseFloat(document.getElementById('cfTarget').value);
  const width = parseFloat(document.getElementById('cfWidth').value);
  const length = parseFloat(document.getElementById('cfLength').value);
  const factor = parseFloat(document.getElementById('cfBulking').value);

  if([existing, target, width, length, factor].some(v => !isFinite(v)) || width <= 0 || length <= 0 || factor <= 0){
    alert('Mohon isi elevasi dengan angka valid, serta width, length, dan factor lebih dari 0.');
    return;
  }

  const area = width * length;
  const deltaH = existing - target;
  const rawVolume = area * Math.abs(deltaH);
  const adjustedVolume = rawVolume * factor;
  const cutVolume = deltaH > 0 ? adjustedVolume : 0;
  const fillVolume = deltaH < 0 ? adjustedVolume : 0;
  const netVolume = cutVolume - fillVolume;
  const condition = getCutFillCondition(netVolume, adjustedVolume);
  const workType = deltaH > 0 ? 'CUT' : deltaH < 0 ? 'FILL' : 'BALANCE';
  const avgDepth = Math.abs(deltaH);

  currentResult = {type:'cutfill', existing, target, width, length, factor, area, deltaH, rawVolume, adjustedVolume, cutVolume, fillVolume, netVolume, condition, workType, avgDepth};

  document.getElementById('kpiCutCF').textContent = formatNum(cutVolume);
  document.getElementById('kpiFillCF').textContent = formatNum(fillVolume);
  document.getElementById('kpiNetCF').textContent = formatNum(netVolume);
  document.getElementById('quickBadgesCF').innerHTML = `<span class="badge ${condition.badge}">${condition.label}</span><span class="badge">${workType}</span><span class="badge">Area ${formatNum(area)} m²</span>`;
  document.getElementById('quickInterpretationCF').textContent = `Beda elevasi ${formatNum(deltaH)} m pada area ${formatNum(area)} m² menghasilkan cut ${formatNum(cutVolume)} m³, fill ${formatNum(fillVolume)} m³, dan net ${formatNum(netVolume)} m³. ${condition.desc}`;

  const maxBar = Math.max(cutVolume, fillVolume, Math.abs(netVolume), 1);
  document.getElementById('barListCF').innerHTML = `
    <div class="bar-row"><span>CUT</span><div class="bar-track"><div class="bar-fill orange" style="width:${Math.max(6,(cutVolume/maxBar)*100)}%"></div></div><div class="bar-val">${formatNum(cutVolume)} m³</div></div>
    <div class="bar-row"><span>FILL</span><div class="bar-track"><div class="bar-fill gold" style="width:${Math.max(6,(fillVolume/maxBar)*100)}%"></div></div><div class="bar-val">${formatNum(fillVolume)} m³</div></div>
    <div class="bar-row"><span>NET</span><div class="bar-track"><div class="bar-fill" style="width:${Math.max(6,(Math.abs(netVolume)/maxBar)*100)}%"></div></div><div class="bar-val">${formatNum(netVolume)} m³</div></div>`;
  document.getElementById('impactBalanceCF').textContent = condition.label;
  document.getElementById('impactDeltaCF').textContent = `${formatNum(deltaH)} m`;
  updateCutFillProfile(existing, target, condition.label);

  const alertColor = condition.badge === 'danger' ? '#ff5d46' : condition.badge === 'warn' ? '#ff9b2f' : '#1db954';
  const methodAdvice = avgDepth > 3
    ? 'Beda elevasi cukup besar; rekomendasi hitung ulang per bench/segmen dan validasi dengan cross section atau surface model agar volume tidak bias.'
    : avgDepth > 1
      ? 'Beda elevasi sedang; gunakan kontrol elevasi berkala dan bagi area menjadi beberapa grid jika permukaan tidak rata.'
      : 'Beda elevasi relatif kecil; tetap pastikan datum elevasi sama dan lakukan pengecekan titik kontrol agar tidak terjadi salah interpretasi cut/fill.';
  const operationAdvice = netVolume > 0
    ? 'Siapkan rencana hauling material surplus menuju disposal, stockpile, atau area fill lain. Periksa apakah material hasil cut layak dipakai kembali.'
    : netVolume < 0
      ? 'Siapkan kebutuhan borrow material atau revisi desain elevasi bila ingin mencapai balance. Pastikan material fill memenuhi spesifikasi compaction dan drainage.'
      : 'Volume relatif balance. Fokus pada kontrol elevasi finish grade dan pemadatan sesuai spesifikasi desain.';

  document.getElementById('analysisListCF').innerHTML = `
    <div class="analysis-item"><div class="analysis-dot" style="background:#7d58de"></div><div class="analysis-text"><b>Area front</b>Front width ${formatNum(width)} m dan front length ${formatNum(length)} m menghasilkan area kerja ${formatNum(area)} m².</div></div>
    <div class="analysis-item"><div class="analysis-dot" style="background:${alertColor}"></div><div class="analysis-text"><b>Kondisi cut/fill</b>Existing ${formatNum(existing)} m dan target ${formatNum(target)} m menghasilkan ΔH ${formatNum(deltaH)} m. Status pekerjaan: <b>${condition.label}</b>.</div></div>
    <div class="analysis-item"><div class="analysis-dot" style="background:#f7b500"></div><div class="analysis-text"><b>Volume pekerjaan</b>Volume dasar ${formatNum(rawVolume)} m³ dikoreksi factor ${formatNum(factor)} sehingga volume terpakai ${formatNum(adjustedVolume)} m³. Output cut ${formatNum(cutVolume)} m³, fill ${formatNum(fillVolume)} m³, net ${formatNum(netVolume)} m³.</div></div>
    <div class="analysis-item"><div class="analysis-dot" style="background:#1db954"></div><div class="analysis-text"><b>Saran lapangan</b>${methodAdvice} ${operationAdvice}</div></div>`;

  const report = `RINGKASAN PERHITUNGAN CUT & FILL\n\nInput:\n- Existing Elevation    : ${formatNum(existing)} m\n- Target Elevation      : ${formatNum(target)} m\n- Front Width           : ${formatNum(width)} m\n- Front Length          : ${formatNum(length)} m\n- Correction Factor     : ${formatNum(factor)}\n\nOutput:\n- Cut Volume            : ${formatNum(cutVolume)} m³\n- Fill Volume           : ${formatNum(fillVolume)} m³\n- Net Volume            : ${formatNum(netVolume)} m³\n- Elevation Delta / ΔH  : ${formatNum(deltaH)} m\n- Area Front            : ${formatNum(area)} m²\n- Kondisi               : ${condition.label}\n\nAnalisis:\n- ${condition.desc}\n- ${methodAdvice}\n- ${operationAdvice}`;
  document.getElementById('reportTextCF').textContent = report;
  activateTab('hasil');
}

</script>
